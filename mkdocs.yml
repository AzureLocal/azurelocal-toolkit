site_name: Azure Local Toolkit
site_description: Azure Local platform automation toolkit — deployment scripts, validation suites, and config management
site_url: https://azurelocal.github.io/azurelocal-toolkit/
repo_url: https://github.com/AzureLocal/azurelocal-toolkit
repo_name: AzureLocal/azurelocal-toolkit

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Deployment:
      - Overview: deployment/overview.md
      - Stage 02 — Azure Foundation: deployment/02-azure-foundation.md
      - Stage 03 — On-Prem Readiness: deployment/03-onprem-readiness.md
      - Stage 04 — Cluster Deployment: deployment/04-cluster-deployment.md
      - Stage 05 — Operational Foundations: deployment/05-operational-foundations.md
      - Stage 06 — Testing & Validation: deployment/06-testing-validation.md
      - Stage 07 — Validation & Handover: deployment/07-validation-handover.md
      - Stage 08 — Lifecycle Operations: deployment/08-lifecycle-operations.md
  - Configuration:
      - Variables: configuration/variables.md
  - Reference:
      - Variable Reference: reference/variables.md
  - Standards:
      - Overview: standards/index.md
      - Documentation: standards/documentation.md
      - Scripting: standards/scripting.md
      - Variables: standards/variables.md
      - Naming Conventions: standards/naming.md
      - Solutions: standards/solutions.md
      - Infrastructure: standards/infrastructure.md
      - Automation: standards/automation.md
      - Examples & IIC: standards/examples.md
  - Validation:
      - Test Suites: validation/test-suites.md
  - Roadmap: roadmap.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search
  - sitemap

extra:
  analytics:
    provider: google
    property: G-XXXXXXXXXX  # Replace with your GA4 Measurement ID
  social:
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/countrycloudboy
      name: CountryCloudBoy on X
    - icon: fontawesome/brands/github
      link: https://github.com/AzureLocal/azurelocal-toolkit
      name: GitHub Repository
    - icon: fontawesome/solid/globe
      link: https://azurelocal.cloud
      name: Azure Local Community
  homepage: https://azurelocal.cloud

copyright: >-
  Copyright &copy; 2025 Azure Local. Designed and maintained by
  <a href="https://www.hybridsolutions.cloud">Hybrid Cloud Solutions</a>.
