# =============================================================================
# validate-config.yml — Validate config files against schema
# =============================================================================
# Triggered on PRs and pushes that touch config/ or this workflow.
# Validates YAML syntax and JSON Schema compliance.
# =============================================================================

name: Validate Configuration

on:
  push:
    branches: [main]
    paths:
      - 'config/**'
      - '.github/workflows/validate-config.yml'
  pull_request:
    branches: [main]
    paths:
      - 'config/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Validate master registry structure
        shell: pwsh
        run: |
          ./config/variables/scripts/validate-registry.ps1

      - name: Validate variables against schema and registry
        shell: pwsh
        run: |
          ./config/variables/scripts/validate-variables.ps1 -StrictUnknown

      - name: Validate alias expiry
        shell: pwsh
        run: |
          ./config/variables/scripts/check-alias-expiry.ps1

      - name: Validate variables.example.yml syntax
        run: |
          python3 -c "
          import yaml, sys
          with open('config/variables/variables.example.yml') as f:
              data = yaml.safe_load(f)
          if data is None:
              print('❌ variables.example.yml is empty')
              sys.exit(1)
          print('✅ config/variables/variables.example.yml is valid YAML')
          "
