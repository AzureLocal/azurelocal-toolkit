# =============================================================================
# Solutions Definition File — AzureLocalCloud Cloud Management Platform
# =============================================================================
# Version: 1.0.0
# Last Updated: 2026-03-13
#
# PURPOSE:
#   Central definition mapping solution types → required variable sections →
#   validation rules. Used by Generate-SolutionConfig.ps1 to produce
#   deployment-specific YAML configs from master-registry.yaml + infrastructure-<env>.yml.
#
# ARCHITECTURE:
#   solutions.yaml          ← You are here (solution definitions)
#   master-registry.yaml    ← Variable metadata (types, descriptions, _meta tags)
#   infrastructure-<env>.yml← Environment-specific values
#   Generate-SolutionConfig.ps1 ← Generator tool → solutions/<name>/solution-<name>.yml
#
# USAGE:
#   .\tools\Generate-SolutionConfig.ps1 -Solution avd-azure-local -Environment azl-lab
#
# =============================================================================

# -----------------------------------------------------------------------------
# SHARED VARIABLE GROUPS
# -----------------------------------------------------------------------------
# These groups are automatically included with ANY solution. They provide the
# foundational Azure platform, identity, networking, and operations variables
# that every deployment requires.
shared_groups:
  - azure_tenants
  - management_groups
  - subscriptions
  - resource_groups
  - hub_spoke_networking
  - azure_vnets
  - vpn
  - bastion
  - azure_firewall
  - monitoring
  - keyvault
  - active_directory
  - policy
  - defender
  - bcdr_backup_recovery
  - storage
  - azure_vms
  - accounts
  - environment
  - site
  - tags

# -----------------------------------------------------------------------------
# SOLUTION DEFINITIONS
# -----------------------------------------------------------------------------
solutions:

  # ===========================================================================
  # AVD ON AZURE LOCAL
  # ===========================================================================
  avd-azure-local:
    description: "Azure Virtual Desktop session hosts on Azure Local infrastructure"
    display_name: "AVD on Azure Local"
    version: "1.0.0"
    status: "active"

    # Variable groups pulled from master-registry.yaml
    variable_groups:
      required:
        - compute.avd.azure_local        # All avd_azl_* variables
        - identity.active_directory      # Domain join config
        - security.keyvault              # Key Vault for credential resolution
      optional:
        - compute.avd.fslogix            # FSLogix profile containers
        - compute.avd.azure              # If hybrid AVD (cloud + local)

    # Variables that MUST have values (not empty/default)
    required_variables:
      - avd_azl_enabled
      - avd_azl_subscription_id
      - avd_azl_host_pool_name
      - avd_azl_host_pool_resource_group
      - avd_azl_host_pool_type
      - avd_azl_resource_group
      - avd_azl_session_host_count
      - avd_azl_vm_naming_prefix
      - avd_azl_vm_admin_username
      - avd_azl_vm_admin_password
      - avd_azl_custom_location_id
      - avd_azl_logical_network_id
      - avd_azl_gallery_image_id
      - avd_azl_storage_path_id
      - avd_azl_domain_join_username
      - avd_azl_domain_join_password
      - avd_azl_app_group_name
      - avd_azl_app_group_type
      - avd_azl_workspace_name

    # Validation rules applied during generation
    validations:
      - rule: "avd_azl_session_host_count >= 1"
        message: "At least 1 session host required"
      - rule: "avd_azl_vm_naming_prefix.length <= 11"
        message: "VM naming prefix max 11 chars (Azure appends 3-digit index)"
      - rule: "avd_azl_vm_admin_password matches keyvault://"
        message: "Admin password must be a Key Vault reference"
      - rule: "avd_azl_domain_join_password matches keyvault://"
        message: "Domain join password must be a Key Vault reference"

    # Infrastructure dependencies
    requires:
      - azure_local     # Cluster must exist
    conflicts_with: []

    # Deployment artifacts (relative to solutions/<name>/)
    artifacts:
      bicep:
        template: "demo/bicep/main.bicep"
        parameters: "demo/bicep/main.bicepparam"
        deploy_script: "demo/bicep/Deploy-AVDSessionHosts.ps1"
      arm:
        template: "demo/arm/azuredeploy.json"
        parameters: "demo/arm/azuredeploy.parameters.json"
        deploy_script: "demo/arm/Deploy-AVDSessionHosts-ARM.ps1"
      terraform:
        module: "terraform/"
        readme: "terraform/README.md"

    # Output config path
    output: "solutions/avd/solution-avd.yml"

  # ===========================================================================
  # SOFS — SCALE-OUT FILE SERVER (FSLOGIX PROFILES)
  # ===========================================================================
  sofs-azure-local:
    description: "Scale-Out File Server cluster on Azure Local for FSLogix profile storage"
    display_name: "SOFS on Azure Local"
    version: "1.0.0"
    status: "active"

    variable_groups:
      required:
        - compute.wsfc                   # Parent WSFC cluster config (cluster name, IP, domain)
        - compute.wsfc._meta_sofs        # SOFS-specific variables (wsfc_sofs_*)
        - compute.cluster_nodes          # Physical node specs
        - networking.vlans               # VLAN assignments
        - identity.active_directory      # Domain join config
        - security.keyvault              # Key Vault for credential resolution
      optional:
        - compute.avd.fslogix            # FSLogix profile config (if paired with AVD)

    required_variables:
      # --- Parent WSFC cluster vars ---
      - wsfc_cluster_name
      - wsfc_cluster_ip
      # --- SOFS core ---
      - wsfc_sofs_role_enabled
      - wsfc_sofs_name
      - wsfc_sofs_ip
      - wsfc_sofs_vm_ips
      - wsfc_sofs_dns_servers
      - wsfc_sofs_vm_count
      - wsfc_sofs_vm_prefix
      - wsfc_sofs_vm_processors
      - wsfc_sofs_vm_memory_mb
      - wsfc_sofs_vm_admin_username
      - wsfc_sofs_vm_admin_password
      - wsfc_sofs_data_disk_count
      - wsfc_sofs_data_disk_size_gb
      # --- Azure resource IDs ---
      - wsfc_sofs_subscription_id
      - wsfc_sofs_resource_group
      - wsfc_sofs_location
      - wsfc_sofs_custom_location_id
      - wsfc_sofs_logical_network_id
      - wsfc_sofs_gallery_image_name
      - wsfc_sofs_storage_path_id
      - wsfc_sofs_storage_path_ids
      # --- SOFS file share ---
      - wsfc_sofs_share_name
      - wsfc_sofs_s2d_volume_name
      - wsfc_sofs_s2d_volume_size_gb
      - wsfc_sofs_s2d_data_copies
      # --- Cluster config ---
      - wsfc_sofs_anti_affinity_rule_name
      - wsfc_sofs_azl_cluster_name
      - wsfc_sofs_cloud_witness_name
      - wsfc_sofs_cloud_witness_key_uri
      - wsfc_sofs_cloud_witness_kv_name
      - wsfc_sofs_cloud_witness_key_secret
      - wsfc_sofs_domain_fqdn
      - wsfc_sofs_domain_netbios
      # --- Deployment engine ---
      - wsfc_sofs_guest_config_engine
      - wsfc_sofs_ansible_controller_name
      - wsfc_sofs_ansible_controller_size
      - wsfc_sofs_ansible_controller_admin_username
      - wsfc_sofs_ansible_controller_hub_rg
      - wsfc_sofs_ansible_controller_hub_subnet_id
      - wsfc_sofs_ansible_existing_controller_ip
      - wsfc_sofs_ansible_existing_controller_user

    validations:
      - rule: "wsfc_sofs_role_enabled == true"
        message: "SOFS role must be enabled"
      - rule: "wsfc_sofs_vm_count >= 3"
        message: "Minimum 3 VMs required for S2D two-way mirror"
      - rule: "wsfc_sofs_vm_prefix.length <= 11"
        message: "VM naming prefix max 11 chars (suffix appends -01, -02, etc.)"
      - rule: "wsfc_sofs_vm_admin_password matches keyvault://"
        message: "Admin password must be a Key Vault reference"
      - rule: "wsfc_sofs_s2d_data_copies >= 2"
        message: "S2D requires at least 2 data copies (two-way mirror)"

    requires:
      - azure_local
    conflicts_with: []

    # Deployment artifacts (relative to solutions/sofs/)
    artifacts:
      bicep:
        template: "bicep/main.bicep"
        module: "bicep/sofs-resources.bicep"
        parameters: "bicep/main.bicepparam"
        deploy_script: "bicep/Deploy-SOFS-Azure.ps1"
      powershell:
        deploy: "powershell/Deploy-SOFS-Azure.ps1"
        configure: "powershell/Configure-SOFS-Cluster.ps1"
      terraform:
        main: "terraform/main.tf"
        variables: "terraform/variables.tf"
        locals: "terraform/locals.tf"
        sofs: "terraform/sofs.tf"
        witness: "terraform/witness.tf"
        resource_group: "terraform/resource-group.tf"
        outputs: "terraform/outputs.tf"
        tfvars_example: "terraform/terraform.tfvars.example"
      ansible:
        inventory: "ansible/inventory.yml"
        deploy_playbook: "ansible/deploy-azure-resources.yml"
        configure_playbook: "ansible/configure-sofs-cluster.yml"

    output: "solutions/sofs/solution-sofs.yml"

  # ===========================================================================
  # AZURE LOCAL (BASE CLUSTER)
  # ===========================================================================
  azure-local:
    description: "Azure Local cluster deployment (base infrastructure)"
    display_name: "Azure Local Cluster"
    version: "1.0.0"
    status: "active"

    variable_groups:
      required:
        - compute.azure_local            # Cluster config
        - compute.cluster_nodes          # Node specs
        - compute.cluster_arm_deployment # ARM deployment params
        - networking.network_intents     # Network intents
        - networking.logical_networks    # Logical networks
        - networking.vlans               # VLAN assignments
        - networking.dhcp                # DHCP scopes
      optional:
        - compute.scvmm                  # SCVMM integration
        - compute.arc_resource_bridge    # Arc Resource Bridge

    required_variables:
      - azl_cluster_name
      - azl_node_count

    validations:
      - rule: "azl_node_count >= 1"
        message: "At least 1 node required"
      - rule: "azl_node_count <= 16"
        message: "Maximum 16 nodes per cluster"

    requires: []
    conflicts_with:
      - wsfc-s2d
      - wsfc-san

    output: "solutions/azure-local/solution-azure-local.yml"

  # ===========================================================================
  # WSFC — STORAGE SPACES DIRECT
  # ===========================================================================
  wsfc-s2d:
    description: "Windows Server Failover Cluster with Storage Spaces Direct"
    display_name: "WSFC (S2D)"
    version: "0.1.0"
    status: "draft"

    variable_groups:
      required:
        - compute.wsfc
        - compute.cluster_nodes
        - networking.vlans
      optional: []

    required_variables:
      - wsfc_cluster_name
      - wsfc_node_count

    validations: []

    requires: []
    conflicts_with:
      - azure-local
      - wsfc-san

    output: "solutions/wsfc-s2d/solution-wsfc-s2d.yml"
