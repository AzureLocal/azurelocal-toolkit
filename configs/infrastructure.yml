      purpose: "Microsoft Defender maintenance window"
    management_infra_primary:
      name: "mc-mgmt-infra-azl-eus-01"
      resource_group: "rg-azrlmgmt-azl-eus-01"
      subscription: "demo"
      purpose: "Management infrastructure maintenance"
    management_infra_secondary:
      name: "mc-mgmt-infra-azl-eus-02"
      resource_group: "rg-azrlmgmt-azl-eus-01"
      subscription: "demo"
      purpose: "Management infrastructure maintenance (secondary)"

  # Log Analytics
  log_analytics:
    management:
      name: "log-azrlmgmt-azl-eus-01"
      resource_group: "rg-azrlmgmt-azl-eus-01"
      subscription: "demo"
      purpose: "Azure Monitor logs for all infrastructure (management VMs and Azure Local cluster observability)"
      retention_days: 90
      sku: "PerGB2018"

  # Data Collection Rules
  data_collection_rules:
    windows_perf:
      name: "dcr-azl-demo-windows-perf-eastus-001"
      resource_group: "rg-azl-demo-monitoring-eastus-001"
      subscription: "demo"
      purpose: "Windows performance counters"
      sampling_frequency: 60
      counters:
        - "\\Processor(_Total)\\% Processor Time"
        - "\\Memory\\Available Bytes"
        - "\\Memory\\% Committed Bytes In Use"
        - "\\LogicalDisk(_Total)\\% Free Space"
        - "\\LogicalDisk(_Total)\\Disk Reads/sec"
        - "\\LogicalDisk(_Total)\\Disk Writes/sec"
        - "\\Network Interface(*)\\Bytes Total/sec"
        - "\\System\\Processor Queue Length"
      destination_table: "Microsoft-Perf"
    windows_events:
      name: "dcr-azl-demo-windows-events-eastus-001"
      resource_group: "rg-azl-demo-monitoring-eastus-001"
      subscription: "demo"
      purpose: "Windows event logs"
      event_logs:
        - name: "Application"
          levels: ["Error", "Warning", "Critical"]
        - name: "System"
          levels: ["Error", "Warning", "Critical"]
        - name: "Security"
          levels: ["Audit Success", "Audit Failure"]
      destination_table: "Event"

