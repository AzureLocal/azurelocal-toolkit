_metadata:
  version: "1.0.0"
  schema_version: "4.0.0"
  last_updated: "2026-02-02"
  environment: "Azure Local Cloud Template"
  last_manual_edit: "2026-01-20T00:00:00Z"
  changelog:
    - date: "2026-01-20"
      change: "Merged all canonical sections from Azure Local Cloud Demos infrastructure.yml"
      reason: "Comprehensive infrastructure configuration aligned with master variable registry"
  discovery:
    azure:
      last_run: null
      source_file: null
    idrac:
      last_run: null
      source_file: null

# =============================================================================
# 2. INFRASTRUCTURE SCENARIOS
# =============================================================================
infrastructure_scenarios:
  deployment:
    identity_mode: "ad"
    azlocal_deployment_account:
      username: "Administrator"
      password_secret_name: "azlocal-admin-password"
      description: "Identical custom local admin created on all nodes for local identity deployment (NOT the built-in Administrator)"

# =============================================================================
# 3. SITE
# =============================================================================
site:
  code: "DEMO"
  name: "Azure Local Cloud Demos"
  location: "Portable Conference Deployment"
  environment: "Demo"
  owner: "AzureLocalCloud@Azure Local Cloud.com"

# =============================================================================
# 4. ENVIRONMENT
# =============================================================================
environment: "Azure Local Cloud Template"

# =============================================================================
# 5. TAGS
# =============================================================================
tags:

# =============================================================================
# 6. AZURE PLATFORM
# =============================================================================
azure_platform:
  # Azure tenant, subscriptions, and management groups
  tenant:
    id: "00000000-0000-0000-0000-000000000000"
    name: "Azure Local Cloud Demos"
    default_domain: "Azure Local Clouddemos.cloud"
  management_groups:
    tenant_root:
      name: "cmp-azl-demo-root"
      display_name: "Azure Local Cloud Root Management Group"
    landing_zone:
      name: "cmp-landing-zones-azl-demo"
      display_name: "Azure Local Cloud Demos Landing Zone Management Group"
  # Subscription 11111111-1111-1111-1111-111111111111 is in cmp-landing-zones-azl-demo
  subscriptions:
    demo:
      id: "11111111-1111-1111-1111-111111111111"
      name: "azl-demo-cmp-lz-azl-legacy-001"
      purpose: "Azure Local Cloud Demos management subscription (Azure Local cluster and Arc resources)"
      state: "Enabled"
      total_resource_groups: 13
      total_resources: 76
  region: "eastus"

  # Primary resource group
  resource_group_name: "rg-c01-azl-eus-01"

  # Platform Key Vault configuration
  platform:
    kv_platform_name: "kv-demos-platform"
    kv_platform_resource_group: "rg-azrlmgmt-azl-eus-01"
    kv_platform_location: "eastus"
    kv_platform_subscription_id: "11111111-1111-1111-1111-111111111111"
    kv_platform_tenant_id: "00000000-0000-0000-0000-000000000000"
    kv_platform_sku: "standard"
    kv_platform_enable_rbac: true
    kv_platform_enable_soft_delete: true
    kv_platform_soft_delete_retention_days: 90
    kv_platform_enable_purge_protection: true
    kv_platform_network_acls_default_action: "Deny"
    kv_platform_private_endpoint_enabled: true
    kv_platform_diagnostics_enabled: true
    kv_platform_logs_retention_days: 90

  resource_groups:
    management:
      - name: "rg-azrlmgmt-azl-eus-01"
        location: "eastus"
        purpose: "Azure Local management infrastructure (38 resources)"
        resources:
          - "4 Virtual Machines (DCs, Utility, NDM)"
          - "4 Network Interfaces"
          - "4 Managed Disks"
          - "1 VNet (vnet-azrl-azl-eus-01)"
          - "2 NSGs"
          - "1 Azure Bastion"
          - "1 VPN Gateway"
          - "1 NAT Gateway"
          - "1 Key Vault (kv-azl-eus-azl-demo)"
          - "1 Log Analytics Workspace"
    cluster:
      - name: "rg-c01-azl-eus-01"
        location: "eastus"
        purpose: "Azure Local cluster connectivity (5 resources)"
        resources:
          - "1 Local Network Gateway"
          - "1 VPN Connection"
          - "1 Storage Account (cloud witness)"
          - "1 Key Vault (kv-azl-demo-clus01-eus-01)"
          - "1 Log Analytics Workspace"
    cicd:
      - name: "Azure Local Cloud-mgmt-rg"
        location: "eastus"
        purpose: "CI/CD infrastructure (9 resources - GitLab runners)"
        resources:
          - "1 VNet (vnet-Azure Local Cloudcicd-sub_demos_01-eus-01)"
          - "1 NSG"
          - "1 NAT Gateway"
          - "1 VM Scale Set"
          - "1 Auto Scale Settings"
          - "1 Automation Account"
    monitoring:
      - name: "rg-monitor-azl-demo-eus-01"
        location: "eastus"
        purpose: "Azure Monitor and diagnostics (3 resources)"
    backup:
      - name: "rg-asr-azl-demo-eus-01"
        location: "eastus"
        purpose: "Azure Site Recovery (reserved)"
      - name: "rg-backup-azl-demo-eus-01"
        location: "eastus"
        purpose: "Azure Backup (reserved)"
    migration:
      - name: "rg-migrate-azl-demo-wus2-01"
        location: "westus2"
        purpose: "Azure Migrate (reserved)"
    network_watcher:
      - name: "NetworkWatcherRG"
        location: "eastus"
        purpose: "Azure Network Watcher (auto-created, 1 resource)"

  azure_local_resource_provider:
    display_name: "Microsoft.AzureStackHCI Resource Provider"
    object_id: "55555555-5555-5555-5555-555555555555"
    app_id: "66666666-6666-6666-6666-666666666666"
    purpose: "Microsoft-managed resource provider for Azure Local deployments"

# =============================================================================
# 7. IDENTITY
# =============================================================================
identity:

  accounts:
    account_lcm_username: "lcm-azl-demo-azl-clus01"
    account_lcm_password: "keyvault://kv-demos-platform/lcm-deployment-password"
    account_local_admin_username: "Administrator"
    account_local_admin_password: "keyvault://kv-demos-platform/azlocal-admin-password"

  entra_id:
    security_groups:
      demos_admins:
        name: "azl-demo-admins"
        purpose: "Azure Local Cloud Demos environment administrators"
        source: "azl-demo tenant"
      demos_contributors:
        name: "azl-demo-contributors"
        purpose: "Azure Local Cloud Demos environment contributors"
        source: "azl-demo tenant"
      demos_readers:
        name: "azl-demo-readers"
        purpose: "Azure Local Cloud Demos environment readers"
        source: "azl-demo tenant"

  active_directory:
    domain:
      fqdn: "azrl.mgmt"
      netbios: "mgmt"
    ad_domain_fqdn: "azrl.mgmt"
    ad_netbios_name: "MGMT"
    ad_ou_path: "OU=MGMT,DC=azrl,DC=mgmt"
    ad_computers_ou_path: "OU=Computers,OU=MGMT,DC=azrl,DC=mgmt"
    ad_servers_ou_path: "OU=Servers,OU=MGMT,DC=azrl,DC=mgmt"
    ad_clusters_ou_path: "OU=azl-demo-clus01,OU=AzureLocal,OU=Clusters,OU=Servers,OU=MGMT,DC=azrl,DC=mgmt"
    ad_service_accounts_ou_path: "OU=ServiceAccounts,OU=MGMT,DC=azrl,DC=mgmt"
    ad_security_groups_ou_path: "OU=Security Groups,OU=IAM,DC=azrl,DC=mgmt"
    security_groups:
      org_prefix: "TP"               # Organisation abbreviation — SG-{org_prefix}-{cluster_id}-AZL-{role}
      cluster_id: "azl-demo-clus01"   # Cluster short name — matches compute.azure_local.cluster_name
      azure_local_admins:
        name: "SG-azl-azl-demo-clus01-AZL-Administrators"
        description: "Full administrative access to cluster nodes"
        local_groups: ["Administrators"]
        members: "Domain Admins"
      operations:
        name: "SG-azl-azl-demo-clus01-AZL-Operations"
        description: "RDP and PSRemoting — manage services and monitor nodes; no full admin"
        local_groups: ["Remote Management Users", "Remote Desktop Users"]
        members: "Domain Users"
      read_only:
        name: "SG-azl-azl-demo-clus01-AZL-ReadOnly"
        description: "RDP view, perf counters, event logs — cannot PSRemote or change config"
        local_groups: ["Remote Desktop Users", "Performance Monitor Users", "Event Log Readers"]
        members: "Domain Users"
      wac_admins:
        name: "SG-azl-azl-demo-clus01-AZL-WAC-Administrators"
        description: "WAC full admin — assigned on WAC server only, NOT on cluster nodes"
        local_groups: []
        note: "Assigned on WAC server — not applied to cluster nodes"
        members: "Domain Admins"
      wac_users:
        name: "SG-azl-azl-demo-clus01-AZL-WAC-Users"
        description: "WAC standard users — assigned on WAC server only, NOT on cluster nodes"
        local_groups: []
        note: "Assigned on WAC server — not applied to cluster nodes"
        members: "Domain Users"
      hyperv_admins:
        name: "SG-azl-azl-demo-clus01-AZL-HyperV-Administrators"
        description: "Hyper-V VM management via PSRemoting — no node-level admin rights"
        local_groups: ["Hyper-V Administrators", "Remote Management Users"]
        members: "Domain Admins"
      storage_admins:
        name: "SG-azl-azl-demo-clus01-AZL-Storage-Administrators"
        description: "CSV and Storage Spaces Direct management — requires local admin"
        local_groups: ["Administrators"]
        members: "Domain Admins"

  deployment_user:
    display_name: "Deployment Engineer"
    upn: "deploy@azl-demo.local"
    object_id: "00000000-0000-0000-0000-000000000000"
    purpose: "Azure Local deployment via portal and ARM templates"
    roles:
      subscription:
        - "Contributor"
        - "Azure Stack HCI Administrator"
        - "Reader"
      resource_group:
        - "Key Vault Data Access Administrator"
        - "Key Vault Secrets Officer"
        - "Key Vault Contributor"
        - "Storage Account Contributor"

  service_principal:
    name: "sp-azurelocal-deploy"
    client_id: "00000000-0000-0000-0000-000000000000"
    object_id: "00000000-0000-0000-0000-000000000000"
    purpose: "Azure Local cluster deployment and management automation"
    secret: "keyvault://kv-azl-demo-platform/sp-azurelocal-deploy-secret"
    roles:
      subscription:
        - "Contributor"
        - "Azure Stack HCI Administrator"
        - "Azure Resource Bridge Deployment Role"
        - "Reader"
        - "Azure Connected Machine Onboarding"
        - "Azure Connected Machine Resource Administrator"
      resource_group:
        - "Key Vault Data Access Administrator"
        - "Key Vault Secrets Officer"
        - "Key Vault Contributor"
        - "Storage Account Contributor"

  azure_identity:
      # Azure AD/Entra ID Tenant ID (GUID)
      # Find: Azure Portal > Azure Active Directory > Properties > Tenant ID
      azure_tenant_id: "00000000-0000-0000-0000-000000000000"

      # Azure Subscription ID for resource deployment
      # Find: Azure Portal > Subscriptions > Select subscription > Overview
      azure_subscription_id: "22222222-2222-2222-2222-222222222222"

      # Service Principal / App Registration Client ID (optional, for automation)
      # Create: Azure Portal > App registrations > New registration
      # azure_client_id: "12345678-1234-1234-1234-123456789012"

    # =============================================================================
    # END OF INFRASTRUCTURE CONFIGURATION
    # =============================================================================

