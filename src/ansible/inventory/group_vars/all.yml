# =============================================================================
# Ansible Group Variables — All Hosts
# =============================================================================
# This file is generated from config/variables/variables.yml via:
#   Export-AnsibleVars -Config $config -OutputPath "src/ansible/inventory/group_vars/all.yml"
# DO NOT EDIT MANUALLY.
# =============================================================================

# --- Site ---
site_code: "IIC"
site_name: "Contoso Example Site"
site_location: "Dallas, TX"

# --- Azure Platform ---
azure_tenant_id: "00000000-0000-0000-0000-000000000000"
azure_location: "eastus"
azure_subscription_azure_local: "33333333-3333-3333-3333-333333333333"

# --- Identity / Active Directory ---
ad_domain_fqdn: "contoso.local"
ad_netbios_name: "IMPROBABLE"
ad_ou_path: "OU=AzureLocal,OU=Servers,DC=iic,DC=local"
ad_clusters_ou_path: "OU=Clusters,OU=Servers,DC=iic,DC=local"
ad_servers_ou_path: "OU=Servers,DC=iic,DC=local"
ad_dns_servers:
  - "192.168.10.10"
  - "192.168.10.11"
lcm_username: "lcm-iic-azl-clus01"
domain_admin_username: "IMPROBABLE\\admin.iic"

# --- Service Principal ---
spn_name: "sp-iic-azurelocal-deploy"
spn_client_id: "aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa"

# --- Key Vault ---
key_vault_name: "kv-iic-platform"
key_vault_resource_group: "rg-iic-security-01"

# --- Cluster ---
cluster_name: "azlocal-iic-01"
cluster_node_count: 2
cluster_resource_group: "rg-iic-compute-01"

# --- Networking (On-Prem) ---
onprem_mtu: 9000
onprem_vlans:
  management:
    id: 2203
    subnet: "10.0.0.0/24"
    gateway: "10.0.0.1"
  storage:
    id: 2204
    subnet: "10.0.1.0/24"
    gateway: "10.0.1.1"
  workload:
    id: 2205
    subnet: "10.0.2.0/24"
    gateway: "10.0.2.1"

# --- Security Groups (Cluster-Specific) ---
security_groups:
  - name: "SG-IIC-azlocal-iic-01-AZL-Administrators"
    scope: "Administrators"
  - name: "SG-IIC-azlocal-iic-01-AZL-Operations"
    scope: "Remote Management Users,Remote Desktop Users"
  - name: "SG-IIC-azlocal-iic-01-AZL-ReadOnly"
    scope: "Event Log Readers,Performance Monitor Users"
  - name: "SG-IIC-azlocal-iic-01-AZL-WAC-Administrators"
    scope: "WAC Administrators"
  - name: "SG-IIC-azlocal-iic-01-AZL-WAC-Users"
    scope: "WAC Users"
  - name: "SG-IIC-azlocal-iic-01-AZL-HyperV-Administrators"
    scope: "Hyper-V Administrators"
  - name: "SG-IIC-azlocal-iic-01-AZL-Storage-Administrators"
    scope: "Storage Administrators"

# --- Monitoring ---
log_analytics_workspace_name: "law-iic-monitor-01"
