# =============================================================================
# Ansible Collections Requirements
# =============================================================================
# Install: ansible-galaxy collection install -r collections/requirements.yml
# =============================================================================
collections:
  # Azure resource management (Ansible-only deployment path)
  - name: azure.azcollection
    version: ">=2.4.0"

  # Active Directory management (validated content)
  - name: microsoft.ad
    version: ">=1.5.0"

  # Core Windows modules
  - name: ansible.windows
    version: ">=2.3.0"

  # Community Windows modules (DNS, network adapters, etc.)
  - name: community.windows
    version: ">=2.2.0"

  # General community modules
  - name: community.general
    version: ">=9.0.0"
