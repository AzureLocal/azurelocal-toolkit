# =============================================================================
# variables.example.yml
# Central configuration — single source of truth for all deployment phases.
#
# Copy this file to variables.yml and fill in your values:
#   cp config/variables.example.yml config/variables.yml
#
# DO NOT commit variables.yml — it is excluded by .gitignore.
#
# Key Vault References:
#   Secrets use keyvault:// URIs and are resolved at runtime.
#   Format: keyvault://<vault-name>/<secret-name>
#   NEVER put actual passwords or secrets in this file.
#
# For the full variable reference, see:
#   - config/infrastructure.yml (complete 14-section schema)
#   - config/schema/master-registry.yaml (variable definitions)
# =============================================================================

# =============================================================================
# SITE
# =============================================================================
site:
  code: ""                          # Short site code (e.g., "NYC", "LAB01")
  name: ""                          # Descriptive site name
  location: ""                      # Physical location
  environment: ""                   # Environment type (Production, Staging, Lab, Demo)
  owner: ""                         # Contact email

# =============================================================================
# AZURE PLATFORM
# =============================================================================
azure:
  tenant_id: ""                     # Azure AD tenant ID
  subscription:
    id: ""                          # Azure subscription ID
    name: ""                        # Subscription display name
  resource_group:
    name: ""                        # Target resource group name
    location: ""                    # Azure region (e.g., eastus, westus2)
  keyvault:
    name: ""                        # Key Vault name for secrets

# =============================================================================
# IDENTITY
# =============================================================================
identity:
  domain:
    fqdn: ""                        # Active Directory domain FQDN
    netbios: ""                     # NetBIOS domain name
    ou_path: ""                     # OU for computer objects
  service_principal:
    app_id: ""                      # Service principal application ID
    object_id: ""                   # Service principal object ID

# =============================================================================
# NETWORKING
# =============================================================================
networking:
  management:
    vlan_id: 0                      # Management VLAN ID
    subnet: ""                      # Management subnet CIDR
    gateway: ""                     # Default gateway
    dns_servers: []                 # DNS server IPs

# =============================================================================
# COMPUTE (Cluster Nodes)
# =============================================================================
nodes: []
# Example:
#   - name: "node-01"
#     ipv4_address: "10.0.0.1"
#     bmc_address: "10.0.1.1"
#     serial_number: ""

# =============================================================================
# TAGS
# =============================================================================
tags:
  environment: ""
  project: ""
  owner: ""
