        example: 506

      vlan_workload_6_name:
        type: string
        description: "Workload VLAN 6 name"
        required: false
        example: "workload-dev"

      vlan_workload_6_cidr:
        type: string
        description: "Workload VLAN 6 CIDR"
        required: false
        format: cidr
        example: "192.168.55.0/24"

      vlan_workload_6_gateway:
        type: string
        description: "Workload VLAN 6 gateway"
        required: false
        format: ipv4
        example: "192.168.55.1"

      # ─── Nested VLAN aliases (used in example file) ───
      management:
        type: object
        description: "Management VLAN configuration (nested alias)"
        id:
          type: integer
          description: "Management VLAN ID (alias for vlan_management_compute_id)"
          alias_for: vlan_management_compute_id
        cidr:
          type: string
          description: "Management VLAN CIDR (alias for vlan_management_compute_cidr)"
          alias_for: vlan_management_compute_cidr
        gateway:
          type: string
          description: "Management VLAN gateway (alias for vlan_management_compute_gateway)"
          alias_for: vlan_management_compute_gateway
        subnet:
          type: string
          description: "Management VLAN subnet"

      storage:
        type: object
        description: "Storage VLAN configuration (nested alias)"
        id:
          type: integer
          description: "Storage VLAN ID (alias for vlan_storage_1_id)"
          alias_for: vlan_storage_1_id
        cidr:
          type: string
          description: "Storage VLAN CIDR (alias for vlan_storage_1_cidr)"
          alias_for: vlan_storage_1_cidr
        gateway:
          type: string
          description: "Storage VLAN gateway (alias for vlan_storage_1_gateway)"
          alias_for: vlan_storage_1_gateway
        subnet:
          type: string
