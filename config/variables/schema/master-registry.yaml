  # Enables Azure Local Cloud engineers to access customer Azure tenants via B2B collaboration.
  #
  # RELATED SECTIONS:
  #   - azure_tenants: (line 390+) - Tenant ID definitions
  #   - accounts: Service principal and user accounts
  #   - active_directory: AD integration for hybrid identity
  #
  # USAGE:
  #   - Stage 00 B2B Configuration: Configure CTS between Azure Local Cloud MGMT and customer tenant
  #   - Scripts: 02-Azure Local Cloud-cicd-infra/powershell/Configure-*.ps1
  # ─── sentinel ───
  # Azure Sentinel SIEM/SOAR configuration
  sentinel:
    _meta:
      solutions: ["all"]
