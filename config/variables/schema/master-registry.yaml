      required: false
      example: "azlc-automation-accounts"
      note: "Group for service principals and automation accounts with managed access"

    entraid_group_backup_operators:
      category: "identity"
      subcategory: "security-group"
      type: string
      description: "Entra ID security group for backup operators (object ID or display name)"
      required: false
      example: "azlc-backup-operators"
      note: "Group members can manage backup and recovery operations"

    # Azure Local Deployment RBAC Roles
    # Required roles for Azure Local (Azure Stack HCI) deployments via portal or ARM templates
    # Reference: https://learn.microsoft.com/azure-stack/hci/deploy/deployment-prerequisites
  
    azl_rbac_deployment_principals:
      category: "identity"
      subcategory: "rbac"
      type: array
      description: "Principals (users/groups/SPNs) requiring Azure Local deployment permissions"
      required: false
      items:
        type: object
        required:
          - principal_id
          - principal_type
        properties:
          principal_id:
            type: string
            description: "Object ID of user, group, or service principal"
            format: uuid
          principal_type:
            type: string
            description: "Type of principal"
            enum: ["User", "Group", "ServicePrincipal"]
          display_name:
            type: string
            description: "Display name for reference"
      example:
        - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
          principal_type: "ServicePrincipal"
          display_name: "AzureLocal-Deployment-SPN"
        - principal_id: "12345678-1234-1234-1234-123456789012"
          principal_type: "Group"
          display_name: "azlc-deployment-admins"

    azl_rbac_required_roles_subscription:
      category: "identity"
      subcategory: "rbac"
      type: array
      description: "Required RBAC roles at subscription scope for Azure Local deployment"
      required: true
      items:
        type: string
      default:
      - "Azure Stack HCI Administrator"
      - "Reader"
      - "Key Vault Secrets User"
      - "Key Vault Contributor"
      - "Storage Account Contributor"
      example:
      - "Azure Stack HCI Administrator"
      - "Reader"
      - "Key Vault Secrets User"
      - "Key Vault Contributor"
      - "Storage Account Contributor"
      note: "These roles must be assigned at subscription level for deployment user/SPN"

    azl_rbac_required_roles_resource_group:
      category: "identity"
      subcategory: "rbac"
      type: array
      description: "Required RBAC roles at resource group scope for Azure Local deployment"
      required: false
      items:
        type: string
      default:
      - "Contributor"
      - "Key Vault Secrets Officer"
      example:
      - "Contributor"
      - "Key Vault Secrets Officer"
      note: "These roles must be assigned at resource group level for deployment resources"

    azl_rbac_custom_role_arc_registration:
      category: "identity"
      subcategory: "rbac"
      type: object
      description: "Custom role definition for Azure Arc machine registration (required for cluster nodes)"
      required: false
      properties:
        name:
          type: string
          description: "Custom role name"
          example: "Azure Stack HCI registration role - custom"
        description:
          type: string
          description: "Role description"
        permissions:
          type: array
          description: "Required permissions for Arc registration"
          items:
            type: string
          default:
            - "Microsoft.HybridCompute/machines/read"
            - "Microsoft.HybridCompute/machines/write"
            - "Microsoft.HybridCompute/machines/delete"
            - "Microsoft.GuestConfiguration/guestConfigurationAssignments/read"
      example:
        name: "Azure Stack HCI registration role - custom"
        description: "Custom role for Arc-enabling cluster nodes"
        permissions:
          - "Microsoft.HybridCompute/machines/read"
          - "Microsoft.HybridCompute/machines/write"
          - "Microsoft.HybridCompute/machines/delete"
          - "Microsoft.GuestConfiguration/guestConfigurationAssignments/read"
        note: "Required for Arc-enabling cluster nodes during deployment"

    azl_rbac_role_assignments:
      category: "identity"
      subcategory: "rbac"
      type: array
      description: "Complete RBAC role assignments for Azure Local deployment (declarative model)"
      required: false
      items:
        type: object
        required:
          - principal_id
          - role_definition_name
          - scope
        properties:
          principal_id:
            type: string
            description: "Object ID of principal (user/group/SPN)"
            format: uuid
          principal_type:
            type: string
            description: "Principal type"
            enum: ["User", "Group", "ServicePrincipal"]
            default: "ServicePrincipal"
          role_definition_name:
            type: string
            description: "Built-in or custom role name"
            example: "Azure Stack HCI Administrator"
          role_definition_id:
            type: string
            description: "Role definition resource ID (optional, use name instead)"
            format: azure_resource_id
          scope:
            type: string
            description: "Assignment scope (subscription, resource group, or resource)"
            format: azure_resource_id
          description:
            type: string
            description: "Assignment description/justification"
          condition:
            type: string
            description: "Role assignment condition (ABAC)"
      examples:
        minimal:
          # Simplest - SPN with required roles at subscription
          - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
            principal_type: "ServicePrincipal"
            role_definition_name: "Azure Stack HCI Administrator"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
            description: "Deployment SPN - HCI Administrator"
          - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
            principal_type: "ServicePrincipal"
            role_definition_name: "Key Vault Secrets User"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
            description: "Deployment SPN - Key Vault access"
      
        standard:
          # Production - SPN and admin group with full permissions
          # Deployment SPN roles
          - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
            principal_type: "ServicePrincipal"
            role_definition_name: "Azure Stack HCI Administrator"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
            description: "Deployment SPN - HCI Administrator at subscription"
          - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
            principal_type: "ServicePrincipal"
            role_definition_name: "Reader"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
            description: "Deployment SPN - Reader at subscription"
          - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
            principal_type: "ServicePrincipal"
            role_definition_name: "Key Vault Secrets User"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-AzureLocalCloud-eus-identity-mgmt/providers/Microsoft.KeyVault/vaults/kv-azlc-mgmt"
            description: "Deployment SPN - Key Vault secrets access"
          - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
            principal_type: "ServicePrincipal"
            role_definition_name: "Contributor"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-AzureLocalCloud-eus-landingzone-cluster"
            description: "Deployment SPN - Contributor at cluster resource group"
        
          # Admin group roles
          - principal_id: "12345678-1234-1234-1234-123456789012"
            principal_type: "Group"
            role_definition_name: "Azure Stack HCI Administrator"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
            description: "Deployment admins group - HCI Administrator"
          - principal_id: "12345678-1234-1234-1234-123456789012"
            principal_type: "Group"
            role_definition_name: "Key Vault Administrator"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-AzureLocalCloud-eus-identity-mgmt/providers/Microsoft.KeyVault/vaults/kv-azlc-mgmt"
            description: "Deployment admins group - Key Vault admin"
      
        complete:
          # Enterprise - Full RBAC with conditions and all required roles
          # Deployment SPN - Subscription level
          - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
            principal_type: "ServicePrincipal"
            role_definition_name: "Azure Stack HCI Administrator"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
            description: "Deployment SPN - Azure Stack HCI Administrator (required)"
          - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
            principal_type: "ServicePrincipal"
            role_definition_name: "Reader"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
            description: "Deployment SPN - Reader for resource discovery"
          - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
            principal_type: "ServicePrincipal"
            role_definition_name: "Storage Account Contributor"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
            description: "Deployment SPN - Storage Account management for cloud witness"
        
          # Deployment SPN - Resource group level
          - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
            principal_type: "ServicePrincipal"
            role_definition_name: "Contributor"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-AzureLocalCloud-eus-landingzone-cluster"
            description: "Deployment SPN - Contributor at cluster resource group"
        
          # Deployment SPN - Key Vault specific
          - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
            principal_type: "ServicePrincipal"
            role_definition_name: "Key Vault Secrets User"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-AzureLocalCloud-eus-identity-mgmt/providers/Microsoft.KeyVault/vaults/kv-azlc-mgmt"
            description: "Deployment SPN - Read secrets (domain credentials, SPN secrets)"
          - principal_id: "00000000-aaaa-bbbb-cccc-333333333333"
            principal_type: "ServicePrincipal"
            role_definition_name: "Key Vault Contributor"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-AzureLocalCloud-eus-identity-mgmt/providers/Microsoft.KeyVault/vaults/kv-azlc-mgmt"
            description: "Deployment SPN - Manage Key Vault (create secrets during deployment)"
        
          # Deployment admins group - Subscription level
          - principal_id: "12345678-1234-1234-1234-123456789012"
            principal_type: "Group"
            role_definition_name: "Azure Stack HCI Administrator"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
            description: "Deployment admins - HCI Administrator for portal/ARM deployments"
          - principal_id: "12345678-1234-1234-1234-123456789012"
            principal_type: "Group"
            role_definition_name: "User Access Administrator"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
            description: "Deployment admins - Manage RBAC assignments"
            condition: "@Resource[Microsoft.Authorization/roleAssignments:PrincipalType] StringEquals 'ServicePrincipal'"
        
          # Deployment admins group - Key Vault
          - principal_id: "12345678-1234-1234-1234-123456789012"
            principal_type: "Group"
            role_definition_name: "Key Vault Administrator"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-AzureLocalCloud-eus-identity-mgmt/providers/Microsoft.KeyVault/vaults/kv-azlc-mgmt"
            description: "Deployment admins - Full Key Vault access"
        
          # Operators group - Read-only
          - principal_id: "23456789-2345-2345-2345-234567890123"
            principal_type: "Group"
            role_definition_name: "Reader"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444"
            description: "Operators - Read-only subscription access"
          - principal_id: "23456789-2345-2345-2345-234567890123"
            principal_type: "Group"
            role_definition_name: "Azure Stack HCI VM Contributor"
            scope: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-AzureLocalCloud-eus-landingzone-cluster"
            description: "Operators - Manage VMs on Azure Local cluster"

    azl_rbac_validate_before_deployment:
      category: "identity"
      subcategory: "rbac"
      type: boolean
      description: "Validate RBAC assignments before starting Azure Local deployment"
      required: false
      default: true
      note: "Recommended to prevent deployment failures due to missing permissions"

    # Hardware Management Interfaces (iDRAC/BMC)
    account_idrac_username:
      type: string
      description: "iDRAC/BMC username (stored in Key Vault)"
      required: false
      sensitive: true
      example: "root"
      note: "Typically 'root' for Dell iDRAC, 'Administrator' for HPE iLO"

    account_idrac_password:
      type: string
      description: "iDRAC/BMC password (Key Vault reference)"
      required: false
      sensitive: true
      pattern: "^keyvault://[a-z0-9-]+/.+$"
      example: "keyvault://kv-azlc-mgmt/idrac-password"

    # iDRAC VNC Remote Console Settings
    idrac_vnc_enabled:
      type: boolean
      description: "Enable VNC on iDRAC for remote console access"
      required: false
      default: true
      example: true
      note: "Enables third-party VNC client access to iDRAC virtual console"

    idrac_vnc_port:
      type: integer
      description: "VNC port number for iDRAC virtual console"
      required: false
      default: 5901
      example: 5901
      note: "Standard VNC port offset from 5900"

    idrac_vnc_timeout:
      type: integer
      description: "VNC session timeout in seconds"
      required: false
      default: 1800
      example: 1800
      note: "30 minutes default timeout for VNC sessions"

    idrac_vnc_password:
      type: string
      description: "VNC password for third-party VNC clients (8 character max)"
      required: false
      sensitive: true
      maxLength: 8
      example: "keyvault://kv-iic-mgmt/idrac-vnc-password"
      note: "Dell iDRAC VNC passwords are limited to 8 characters — store in Key Vault, never plaintext"

    idrac_vnc_password_secret:
      type: string
      description: "VNC password Key Vault reference"
      required: false
      sensitive: true
      pattern: "^keyvault://[a-z0-9-]+/.+$"
      example: "keyvault://kv-azlc-mgmt/idrac-vnc-password"

    # Cloud Witness Storage Account Key
    cloud_witness_storage_key:
      type: string
      description: "Cloud witness storage account access key (Key Vault reference)"
      required: false
      sensitive: true
      pattern: "^keyvault://[a-z0-9-]+/.+$"
      example: "keyvault://kv-azlc-mgmt/cloud-witness-storage-key"
  # ─── active_directory ───
  active_directory:
    _meta:
      solutions: ["all"]
      tier: required
      description: "AD DS domain integration — included in all solutions"
    ad_enabled:
      category: "identity"
      subcategory: "active-directory"
      type: boolean
      description: "Active Directory enabled"
      required: false
      default: true

    ad_domain:
      category: "identity"
      subcategory: "active-directory"
      type: string
      description: "Active Directory domain (short name)"
      required: false
      example: "azlocal"

    ad_domain_fqdn:
      category: "identity"
      subcategory: "active-directory"
      type: string
      description: "Active Directory domain FQDN"
      required: false
      example: "azlocal.mgmt"

    ad_netbios_name:
      category: "identity"
      subcategory: "active-directory"
      type: string
      description: "Active Directory NetBIOS name"
      required: false
      maxLength: 15
      pattern: "^[A-Z][A-Z0-9-]*$"
      example: "MGMT"

    ad_ou_path:
      category: "identity"
      subcategory: "active-directory"
      type: string
      description: "Active Directory OU path"
      required: false
      example: "OU=MGMT,DC=azlocal,DC=mgmt"

    ad_computers_ou_path:
      category: "identity"
      subcategory: "active-directory"
      type: string
      description: "Active Directory computers OU path"
      required: false
      example: "OU=Computers,OU=MGMT,DC=azlocal,DC=mgmt"

    ad_servers_ou_path:
      type: string
      description: "Active Directory servers OU path"
      required: false
      example: "OU=Servers,OU=MGMT,DC=azlocal,DC=mgmt"

    ad_clusters_ou_path:
      type: string
      description: "Active Directory OU path for Azure Local cluster instance"
      required: false
      example: "OU=AzureLocal-Cluster01,OU=AzureLocal,OU=Clusters,OU=Clusters,OU=MGMT,DC=azlocal,DC=mgmt"

    ad_service_accounts_ou_path:
      type: string
      description: "Active Directory service accounts OU path"
      required: false
      example: "OU=ServiceAccounts,OU=MGMT,DC=azlocal,DC=mgmt"

    # ─── Nested structural aliases ───
    domain:
      type: object
      description: "Domain configuration (nested alias for ad_domain_fqdn, ad_netbios_name)"
      fqdn:
        type: string
        description: "Domain FQDN (alias for ad_domain_fqdn)"
        alias_for: ad_domain_fqdn
      netbios:
        type: string
        description: "Domain NetBIOS name (alias for ad_netbios_name)"
        alias_for: ad_netbios_name

    fqdn:
      type: string
      description: "Domain FQDN shorthand (alias for ad_domain_fqdn)"
      alias_for: ad_domain_fqdn

    organizational_units:
      type: object
      description: "Organizational unit paths"
      servers:
        type: string
        description: "Servers OU path (alias for ad_servers_ou_path)"
        alias_for: ad_servers_ou_path

    ad_dns_servers:
      type: array
      description: "Active Directory DNS server IP addresses"
      required: true
      items:
        type: string
      format: ipv4
      example:
      - "10.100.1.36"
      - "10.100.1.37"

    ad_dns_server_fqdns:
      type: array
      description: "Active Directory DNS server FQDNs (for NTP, replication, etc.)"
      required: false
      items:
        type: string
      example:
      - "azlc-dc01.azlocal.cloud"
      - "azlc-dc02.azlocal.cloud"

    # ─── Security Groups ─────────────────────────────────────────────────────
    # Naming convention: SG-{org_prefix}-{cluster_id}-AZL-{role}
    # Example: SG-IIC-clus01-AZL-Administrators
    # WAC groups (wac_admins, wac_users) are assigned on the WAC server ONLY
    # — they are NOT applied to cluster nodes.
    security_groups:
      org_prefix:
        type: string
        description: "Organisation abbreviation used in AD group names"
        required: true
        example: "IIC"
        note: "Group names follow: SG-{org_prefix}-{cluster_id}-AZL-{role}"
      cluster_id:
        type: string
        description: "Cluster short name — makes security groups unique per cluster in the domain"
        required: true
        example: "clus01"
      azure_local_admins:
        type: object
        description: "Full administrative access to cluster nodes"
        required: true
        properties:
          name:         { type: string, example: "SG-IIC-clus01-AZL-Administrators" }
          local_groups: { type: array,  example: ["Administrators"] }
          members:      { type: string }
      operations:
        type: object
        description: "RDP and PSRemoting — manage services and monitor nodes; no full admin"
        required: false
        properties:
          name:         { type: string, example: "SG-IIC-clus01-AZL-Operations" }
          local_groups: { type: array,  example: ["Remote Management Users", "Remote Desktop Users"] }
          members:      { type: string }
      read_only:
        type: object
        description: "RDP view, perf counters, event logs — cannot PSRemote or change config"
        required: false
        properties:
          name:         { type: string, example: "SG-IIC-clus01-AZL-ReadOnly" }
          local_groups: { type: array,  example: ["Remote Desktop Users", "Performance Monitor Users", "Event Log Readers"] }
          members:      { type: string }
      wac_admins:
        type: object
        description: "WAC full admin — assigned on WAC server only, NOT on cluster nodes"
        required: false
        properties:
          name:         { type: string, example: "SG-IIC-clus01-AZL-WAC-Administrators" }
          local_groups: { type: array,  example: [], note: "Assigned on WAC server — not applied to cluster nodes" }
          members:      { type: string }
      wac_users:
        type: object
        description: "WAC standard users — assigned on WAC server only, NOT on cluster nodes"
        required: false
        properties:
          name:         { type: string, example: "SG-IIC-clus01-AZL-WAC-Users" }
          local_groups: { type: array,  example: [], note: "Assigned on WAC server — not applied to cluster nodes" }
          members:      { type: string }
      hyperv_admins:
        type: object
        description: "Hyper-V VM management via PSRemoting — no node-level admin rights"
        required: false
        properties:
          name:         { type: string, example: "SG-IIC-clus01-AZL-HyperV-Administrators" }
          local_groups: { type: array,  example: ["Hyper-V Administrators", "Remote Management Users"] }
          members:      { type: string }
      storage_admins:
        type: object
        description: "CSV and Storage Spaces Direct management — requires local admin"
        required: false
        properties:
          name:         { type: string, example: "SG-IIC-clus01-AZL-Storage-Administrators" }
          local_groups: { type: array,  example: ["Administrators"] }
          members:      { type: string }

    ad_domain_controller_01_name:
      type: string
      description: "Active Directory Domain Controller 01 hostname"
      required: false
      maxLength: 15
      example: "AZLC-DC01"

    ad_domain_controller_02_name:
      type: string
      description: "Active Directory Domain Controller 02 hostname"
      required: false
      maxLength: 15
      example: "AZLC-DC02"
  # ─── managed_identities ───
  managed_identities:
    _meta:
      solutions: ["azure-local", "avd-azure-local"]
      tier: optional
      description: "User/system-assigned managed identities for RBAC"
    mi_user_assigned:
      description: "User-assigned managed identities"
      type: array
      required: false
      items:
        type: object
        properties:
          name: { type: string }
          resource_group: { type: string }
          subscription: { type: string }
          client_id: { type: string }
          principal_id: { type: string }
    mi_system_assigned:
      description: "System-assigned managed identities tracked for RBAC"
      type: array
      required: false
      items:
        type: object
        properties:
          resource_name: { type: string }
          principal_id: { type: string }
          role_assignments: { type: array }

  # ─── service_principal ───
  service_principal:
    _meta:
      solutions: ["azure-local", "avd-azure-local"]
      tier: optional
      description: "Service principal for deployment automation"
    name:
      type: string
      description: "Service principal display name"
      required: false
      example: "spn-azlc-deployment"
    client_id:
      type: string
      description: "Service principal client/application ID"
      required: false
      format: uuid
    app_id:
      type: string
      description: "Service principal application ID (alias for client_id)"
      required: false
      format: uuid
      alias_for: client_id
    object_id:
      type: string
      description: "Service principal object ID"
      required: false
      format: uuid
    secret:
      type: string
      description: "Service principal secret (Key Vault reference)"
      required: false
      sensitive: true
    roles:
      type: object
      description: "Role assignments for service principal"
      subscription:
        type: string
        description: "Subscription-level role assignment"
        required: false
        example: "Contributor"
      resource_group:
        type: string
        description: "Resource group-level role assignment"
        required: false
        example: "Contributor"

  # ─── break_glass_account_ids ───
  break_glass_account_ids:
    type: array
    description: "Emergency break-glass account object IDs"
    required: false
    items:
      type: string
      format: uuid

  # ─── b2b_configuration ───
  b2b_configuration:
    # ---------------------------------------------------------------------------
    # Azure Local Cloud MANAGEMENT TENANT (Source Tenant)
    # ---------------------------------------------------------------------------
    Azure Local Cloud_mgmt:
      b2b_Azure Local Cloud_mgmt_tenant_id:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Azure Local Cloud MGMT tenant ID (source tenant for cross-tenant sync)"
        required: true
        format: uuid
        example: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    
      b2b_Azure Local Cloud_mgmt_display_name:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Azure Local Cloud MGMT tenant display name"
        required: true
        example: "Azure Local Cloud MGMT"
    
      b2b_Azure Local Cloud_mgmt_primary_domain:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Azure Local Cloud MGMT tenant primary domain"
        required: true
        pattern: "^[a-z0-9-]+\\.onmicrosoft\\.com$"
        example: "Azure Local Cloud.onmicrosoft.com"

    # ---------------------------------------------------------------------------
    # TARGET TENANT (Customer/Destination Tenant)
    # ---------------------------------------------------------------------------
    target_tenant:
      b2b_target_tenant_id:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Target (customer) tenant ID for cross-tenant sync"
        required: true
        format: uuid
        example: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    
      b2b_target_display_name:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Target tenant display name"
        required: true
        example: "Customer Production"
    
      b2b_target_primary_domain:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Target tenant primary domain"
        required: true
        pattern: "^[a-z0-9-]+\\.onmicrosoft\\.com$"
        example: "customer.onmicrosoft.com"

    # ---------------------------------------------------------------------------
    # SERVICE TIER CONFIGURATION
    # ---------------------------------------------------------------------------
    service_configuration:
      b2b_service_tier:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Service tier purchased by customer (determines which groups are synced)"
        required: true
        allowedValues:
          - Professional
          - Premium
        default: "Professional"
        example: "Professional"
    
      b2b_additional_services:
        category: "identity"
        subcategory: "b2b-configuration"
        type: array
        description: "Additional services purchased beyond base tier"
        required: false
        items:
          type: string
        allowedValues:
          - SOC
          - AES
        example: ["SOC"]

    # ---------------------------------------------------------------------------
    # CROSS-TENANT SYNC TEMPLATE
    # ---------------------------------------------------------------------------
    cts_configuration:
      b2b_cts_template_id:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Cross-tenant synchronization template ID (Azure2Azure template)"
        required: true
        format: uuid
        default: "aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee"
        example: "aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee"
        note: "Default Azure2Azure CTS template ID from Microsoft"

    # ---------------------------------------------------------------------------
    # SERVICE TIER GROUPS (Source Groups in Azure Local Cloud MGMT)
    # ---------------------------------------------------------------------------
    service_tier_groups:
      b2b_source_groups_professional:
        category: "identity"
        subcategory: "b2b-configuration"
        type: array
        description: "Azure Local Cloud MGMT groups synced for Professional tier"
        required: false
        items:
          type: string
        example:
          - "Public Cloud Services"
          - "Public Cloud Support"
          - "Public Cloud Implementation Engineering"
    
      b2b_source_groups_premium:
        category: "identity"
        subcategory: "b2b-configuration"
        type: array
        description: "Azure Local Cloud MGMT groups synced for Premium tier (includes Professional + Premium)"
        required: false
        items:
          type: string
        example:
          - "Public Cloud Services"
          - "Public Cloud Support"
          - "Public Cloud Implementation Engineering"
          - "Public Cloud Premium"
    
      b2b_source_groups_admins:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Azure Local Cloud tenant group for admin-level sync (highest access)"
        required: false
        example: "TRP-ENG-HCS-L3"
    
      b2b_source_groups_contributors:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Azure Local Cloud tenant group for contributor-level sync"
        required: false
        example: "TRP-ENG-HCS-L2"
    
      b2b_source_groups_readers:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Azure Local Cloud tenant group for reader-level sync"
        required: false
        example: "TRP-ENG-HCS"
    
      b2b_source_groups_premium_team:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Azure Local Cloud tenant group for premium services team sync"
        required: false
        example: "TRP-ENG-HCS-PREMIUM"
        note: "Single group reference - see b2b_source_groups_premium for array of Premium tier groups"

    # ---------------------------------------------------------------------------
    # ADDITIONAL SERVICE GROUPS
    # ---------------------------------------------------------------------------
    additional_service_groups:
      b2b_additional_service_groups_soc:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Azure Local Cloud group for SOC services"
        required: false
        example: "SOC"
    
      b2b_additional_service_groups_aes:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Azure Local Cloud group for Advanced Engineering Services"
        required: false
        example: "SEC-SD Advanced Services"

    # ---------------------------------------------------------------------------
    # CUSTOMER TENANT GROUPS (Target Groups)
    # ---------------------------------------------------------------------------
    customer_groups:
      b2b_bootstrap_group_name:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Customer tenant bootstrap group (standard security group)"
        required: false
        default: "Azure Local Cloud"
        example: "Azure Local Cloud"
        note: "Initial group for Azure Local Cloud access before tiered groups are created"
    
      b2b_tiered_groups_admins:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Customer tenant admin group (role-assignable)"
        required: false
        example: "azl-b2b-env-admins"
        note: "Created with IsAssignableToRole:true for Entra directory role assignment"
    
      b2b_tiered_groups_contributors:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Customer tenant contributor group (role-assignable)"
        required: false
        example: "azl-b2b-env-contributors"
    
      b2b_tiered_groups_readers:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Customer tenant reader group (role-assignable)"
        required: false
        example: "azl-b2b-env-readers"

    # ---------------------------------------------------------------------------
    # SERVICE PRINCIPAL CONFIGURATION
    # ---------------------------------------------------------------------------
    service_principal:
      b2b_service_principal_name:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Service principal name for CI/CD automation in customer tenant"
        required: false
        example: "Azure Local Cloud-cicd"
    
      b2b_source_domain:
        category: "identity"
        subcategory: "b2b-configuration"
        type: string
        description: "Domain pattern for synced users (appears in UPN suffix)"
        required: false
        example: "azurelocalcloud.com"

    # ---------------------------------------------------------------------------
    # TRUST SETTINGS
    # ---------------------------------------------------------------------------
    trust_settings:
      b2b_trust_accept_mfa:
        category: "identity"
        subcategory: "b2b-configuration"
        type: boolean
        description: "Accept MFA claims from source tenant"
        required: false
        default: true
    
      b2b_trust_accept_compliant_devices:
        category: "identity"
        subcategory: "b2b-configuration"
        type: boolean
        description: "Accept compliant device claims from source tenant"
        required: false
        default: true
    
      b2b_trust_accept_hybrid_joined_devices:
        category: "identity"
        subcategory: "b2b-configuration"
        type: boolean
        description: "Accept hybrid Azure AD joined device claims from source tenant"
        required: false
        default: true
    
      b2b_trust_auto_redeem_invitations:
        category: "identity"
        subcategory: "b2b-configuration"
        type: boolean
        description: "Automatically redeem invitations for seamless access"
        required: false
        default: true

  # =============================================================================
  # GITLAB CI/CD CONFIGURATION
  # =============================================================================
  # GitLab CI/CD configuration for automated deployments.
  #
  # RELATED SECTIONS:
  #   - service_principals: Azure service principal for GitLab runners
  #   - keyvault: Secret storage for GitLab variables

# =============================================================================
# 8. NETWORKING
# =============================================================================
networking:
  # ═══════════════════════════════════════
  # AZURE NETWORKING
  # ═══════════════════════════════════════
  azure:
    _meta:
      solutions: ["all"]
      tier: required
      description: "Azure cloud networking (hub-spoke, VNets, subnets, NSGs) — included in all solutions"
    # ─── hub_spoke ───
    hub_spoke:
      hub_vnet_name:
        category: "networking"
        subcategory: "hub-spoke"
        type: string
        description: "Hub virtual network name"
        required: false
        pattern: "^vnet-[a-z0-9-]+$"
        example: "vnet-azlc-AzureLocalCloud-eus-connectivity-hub"

      vnet_name:
        type: string
        description: "VNet name shorthand (alias for hub_vnet_name)"
        required: false
        alias_for: hub_vnet_name

      hub_vnet_address_space:
        category: "networking"
        subcategory: "hub-spoke"
        type: array
        description: "Hub VNet address space (CIDR)"
        required: false
        items:
          type: string
        format: cidr
        example:
          - "192.168.0.0/16"

      hub_resource_group:
        category: "networking"
        subcategory: "hub-spoke"
        type: string
        description: "Hub resource group name"
        required: false
        pattern: "^rg-[a-z0-9-]+$"
        example: "rg-azlc-AzureLocalCloud-eus-connectivity-hub"

      hub_subscription:
        category: "networking"
        subcategory: "hub-spoke"
        type: string
        description: "Hub VNet subscription ID"
        required: false
        format: uuid
        example: "00000000-1111-2222-3333-444444444444"

      hub_location:
        type: string
        description: "Hub VNet location"
        required: false
        example: "East US"

      hub_enable_ddos_protection:
        type: boolean
        description: "Enable DDoS protection on hub VNet"
        required: false
        default: false

      hub_ddos_protection_plan_id:
        type: string
        description: "DDoS protection plan resource ID for hub"
        required: false
        depends_on:
        - variable: "hub_enable_ddos_protection"
          condition: "equals: true"
          message: "DDoS protection plan ID required when DDoS protection is enabled"
        format: azure_resource_id
        example: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-AzureLocalCloud-eus-connectivity-hub/providers/Microsoft.Network/ddosProtectionPlans/ddos-plan-azlc"

      hub_tags:
        type: object
        description: "Tags for hub VNet resources"
        required: false
        example:
          environment: "prod"
          function: "connectivity-hub"
          cost_center: "IT-Infrastructure"

      hub_gateway_subnet_name:
        type: string
        description: "Gateway subnet name"
        required: false
        default: "GatewaySubnet"

      hub_gateway_subnet_address:
        type: string
        description: "Gateway subnet address prefix (CIDR)"
        required: false
        format: cidr
        example: "192.168.0.0/24"

      hub_bastion_subnet_name:
        type: string
        description: "Bastion subnet name"
        required: false
        default: "AzureBastionSubnet"

      hub_bastion_subnet_address:
        type: string
        description: "Bastion subnet address prefix (CIDR)"
        required: false
        format: cidr
        example: "192.168.1.0/26"

      hub_firewall_subnet_name:
        type: string
        description: "Firewall subnet name"
        required: false
        default: "AzureFirewallSubnet"

      hub_firewall_subnet_address:
        type: string
        description: "Firewall subnet address prefix (CIDR)"
        required: false
        format: cidr
        example: "192.168.2.0/26"

      hub_management_subnet_name:
        type: string
        description: "Management subnet name"
        required: false
        pattern: "^snet-[a-z0-9-]+$"
        example: "snet-azlc-AzureLocalCloud-eus-connectivity-mgmt"

      hub_privateendpoint_subnet_name:
        type: string
        description: "Private endpoint subnet name"
        required: false
        pattern: "^snet-[a-z0-9-]+$"
        example: "snet-azlc-AzureLocalCloud-eus-connectivity-pep"

      hub_privateendpoint_subnet_address:
        type: string
        description: "Private endpoint subnet address prefix (CIDR)"
        required: false
        format: cidr
        example: "192.168.3.0/24"

      hub_monitoring_subnet_name:
        type: string
        description: "Monitoring subnet name"
        required: false
        pattern: "^snet-[a-z0-9-]+$"
        example: "snet-azlc-AzureLocalCloud-eus-connectivity-monitoring"

      hub_monitoring_subnet_address:
        type: string
        description: "Monitoring subnet address prefix (CIDR)"
        required: false
        format: cidr
        example: "192.168.4.0/24"

      hub_route_server_subnet_name:
        type: string
        description: "Azure Route Server subnet name (must be RouteServerSubnet)"
        required: false
        default: "RouteServerSubnet"

      hub_route_server_subnet_address:
        type: string
        description: "Route Server subnet address prefix (CIDR, minimum /27)"
        required: false
        format: cidr
        example: "192.168.5.0/27"

      hub_enable_route_server:
        type: boolean
        description: "Enable Azure Route Server in hub for BGP route propagation"
        required: false
        default: false

      hub_route_server_name:
        type: string
        description: "Azure Route Server name"
        required: false
        depends_on:
        - variable: "hub_enable_route_server"
          condition: "equals: true"
          message: "Route Server name required when Route Server is enabled"
        pattern: "^routeserver-[a-z0-9-]+$"
        example: "routeserver-azlc-AzureLocalCloud-eus"

      hub_route_server_allow_branch_to_branch:
        type: boolean
        description: "Allow branch-to-branch traffic through Route Server"
        required: false
        depends_on:
        - variable: "hub_enable_route_server"
          condition: "equals: true"
          message: "Branch-to-branch setting only applies when Route Server is enabled"
        default: true

      hub_nva_subnet_name:
        type: string
        description: "Network Virtual Appliance subnet name"
        required: false
        pattern: "^snet-[a-z0-9-]+$"
        example: "snet-azlc-AzureLocalCloud-eus-connectivity-nva"

      hub_nva_subnet_address:
        type: string
        description: "NVA subnet address prefix (CIDR)"
        required: false
        format: cidr
        example: "192.168.6.0/24"

      hub_subnets:
        type: array
        description: "Complete array of hub subnets with configurations"
        required: false
        items:
          type: object
        properties:
          name:
            type: string
          address_prefix:
            type: string
            format: cidr
          nsg:
            type: string
          route_table:
            type: string
          service_endpoints:
            type: array
          delegation:
            type: string
        example:
          minimal:
          # Simplest configuration - gateway and bastion only
          - name: "GatewaySubnet"
            address_prefix: "192.168.0.0/24"
          - name: "AzureBastionSubnet"
            address_prefix: "192.168.1.0/26"
      
        standard:
        # Production hub with firewall and management subnet
        - name: "GatewaySubnet"
          address_prefix: "192.168.0.0/24"
        - name: "AzureBastionSubnet"
          address_prefix: "192.168.1.0/26"
        - name: "AzureFirewallSubnet"
          address_prefix: "192.168.2.0/26"
        - name: "snet-azlc-AzureLocalCloud-eus-connectivity-mgmt"
          address_prefix: "192.168.3.0/24"
          nsg: "nsg-azlc-AzureLocalCloud-eus-connectivity-mgmt"
          route_table: "rt-azlc-AzureLocalCloud-eus-mgmt"
      
        complete:
        # Enterprise hub with all services and delegations
        - name: "GatewaySubnet"
          address_prefix: "192.168.0.0/24"
        - name: "AzureBastionSubnet"
          address_prefix: "192.168.1.0/26"
        - name: "AzureFirewallSubnet"
          address_prefix: "192.168.2.0/26"
        - name: "snet-azlc-AzureLocalCloud-eus-connectivity-mgmt"
          address_prefix: "192.168.3.0/24"
          nsg: "nsg-azlc-AzureLocalCloud-eus-connectivity-mgmt"
          route_table: "rt-azlc-AzureLocalCloud-eus-mgmt"
          service_endpoints:
            - "Microsoft.Storage"
            - "Microsoft.KeyVault"
        - name: "snet-azlc-AzureLocalCloud-eus-connectivity-pep"
          address_prefix: "192.168.4.0/24"
          nsg: "nsg-azlc-AzureLocalCloud-eus-connectivity-pep"
        - name: "snet-azlc-AzureLocalCloud-eus-connectivity-apim"
          address_prefix: "192.168.5.0/24"
          delegation: "Microsoft.ApiManagement/service"

      hub_vnet_additional_subnets:
        type: array
        description: "Additional hub subnets"
        required: false
        items:
          type: object
        properties:
          name:
            type: string
            description: "Subnet name"
          address_prefix:
            type: string
            format: cidr
            description: "Subnet address prefix"
        example:
        - name: "snet-custom"
          address_prefix: "192.168.5.0/24"

      hub_enable_virtual_wan:
        type: boolean
        description: "Use Azure Virtual WAN instead of traditional hub-spoke"
        required: false
        default: false

      hub_virtual_wan_name:
        type: string
        description: "Azure Virtual WAN name"
        required: false
        pattern: "^vwan-[a-z0-9-]+$"
        example: "vwan-azlc-AzureLocalCloud"

      hub_virtual_wan_type:
        type: string
        description: "Virtual WAN type"
        required: false
        allowedValues:
        - Basic
        - Standard
        default: "Standard"

      hub_virtual_hub_name:
        type: string
        description: "Virtual WAN hub name"
        required: false
        pattern: "^vhub-[a-z0-9-]+$"
        example: "vhub-azlc-AzureLocalCloud-eus"

      hub_virtual_hub_address_prefix:
        type: string
        description: "Virtual hub address prefix (CIDR, minimum /24)"
        required: false
        format: cidr
        example: "192.168.255.0/24"

      hub_virtual_hub_sku:
        type: string
        description: "Virtual hub SKU"
        required: false
        allowedValues:
        - Basic
        - Standard
        default: "Standard"

      hub_enable_routing_intent:
        type: boolean
        description: "Enable routing intent for Virtual WAN hub"
        required: false
        default: false

      hub_routing_preference:
        type: string
        description: "Hub routing preference"
        required: false
        allowedValues:
        - ExpressRoute
        - VpnGateway
        - ASPath
        default: "ExpressRoute"

      hub_spoke_vnets:
        type: array
        description: "Spoke virtual networks"
        required: false
        items:
          type: object
        properties:
          name:
            type: string
            pattern: "^vnet-[a-z0-9-]+$"
          address_space:
            type: string
            format: cidr
          subscription:
            type: string
            format: uuid
          resource_group:
            type: string
            pattern: "^rg-[a-z0-9-]+$"
        example:
        - name: "vnet-spoke1"
          address_space: "10.1.0.0/16"
          subscription: "sub-id"
          resource_group: "rg-spoke1"

      hub_spoke_vnet_address_range_base:
        type: string
        description: "Base address range for spoke VNets (CIDR)"
        required: false
        format: cidr
        example: "10.0.0.0/8"

      hub_spoke_subnet_address_range_base:
        type: string
        description: "Base address range for spoke subnets (CIDR)"
        required: false
        format: cidr
        example: "10.0.0.0/24"

      hub_spoke_enable_vpn_gateway:
        type: boolean
        description: "Enable VPN gateway in spoke VNets (branch connectivity)"
        required: false
        default: false

      hub_spoke_use_hub_gateway:
        type: boolean
        description: "Spoke VNets use hub gateway for external connectivity"
        required: false
        default: true

      hub_spoke_route_table_name:
        type: string
        description: "Default route table name for spoke subnets"
        required: false
        pattern: "^rt-[a-z0-9-]+$"
        example: "rt-azlc-AzureLocalCloud-eus-spoke-default"

      hub_spoke_nsg_name_prefix:
        type: string
        description: "NSG name prefix for spoke subnets"
        required: false
        pattern: "^nsg-[a-z0-9-]+$"
        example: "nsg-azlc-AzureLocalCloud-eus-spoke"

      hub_spoke_to_spoke_connectivity:
        type: string
        description: "Spoke-to-spoke connectivity method"
        required: false
        allowedValues:
        - None
        - HubFirewall
        - HubNVA
        - RouteServer
        - VirtualWAN
        default: "HubFirewall"

      hub_spoke_default_route_next_hop:
        type: string
        description: "Next hop for default route (0.0.0.0/0) from spokes"
        required: false
        example: "192.168.2.4"

      hub_spoke_default_route_next_hop_type:
        type: string
        description: "Next hop type for spoke default route"
        required: false
        allowedValues:
        - VirtualAppliance
        - VirtualNetworkGateway
        - Internet
        - None
        default: "VirtualAppliance"

      vnet_peering_configurations:
        type: array
        description: "VNet peering configurations"
        required: false
        items:
          type: object
        properties:
          name:
            type: string
          remote_vnet:
            type: string
          allow_forwarded_traffic:
            type: boolean
          allow_gateway_transit:
            type: boolean
          use_remote_gateways:
            type: boolean
        example:
        - name: "peer-hub-to-spoke1"
          remote_vnet: "vnet-spoke1"
          allow_forwarded_traffic: true
          allow_gateway_transit: true
          use_remote_gateways: false

      enable_transit_connectivity:
        type: boolean
        description: "Enable transit connectivity between spokes through hub"
        required: false
        default: true

      transit_nva_name:
        type: string
        description: "Network Virtual Appliance name for transit"
        required: false
        pattern: "^vm-[a-z0-9-]+$"
        example: "vm-azlc-AzureLocalCloud-eus-nva001"

      transit_nva_private_ip:
        type: string
        description: "NVA private IP for routing"
        required: false
        format: ipv4
        example: "192.168.6.4"

      transit_nva_bgp_asn:
        type: integer
        description: "NVA BGP ASN for route propagation"
        required: false
        minimum: 64512
        maximum: 65534
        example: 65001

      enable_forced_tunneling:
        type: boolean
        description: "Force all internet traffic through hub (0.0.0.0/0 to hub)"
        required: false
        default: true

      hub_internet_egress_type:
        type: string
        description: "Method for internet egress from hub"
        required: false
        allowedValues:
        - AzureFirewall
        - NVA
        - NATGateway
        - Direct
        default: "AzureFirewall"

      enable_vnet_injection:
        type: boolean
        description: "Enable VNet injection for Azure services (PaaS integration)"
        required: false
        default: true

      vnet_injection_subnets:
        type: array
        description: "Subnets configured for VNet injection"
        required: false
        items:
          type: object
        properties:
          name:
            type: string
          service:
            type: string
          delegation:
            type: string
        example:
        - name: "snet-azlc-AzureLocalCloud-eus-connectivity-apim"
          service: "API Management"
          delegation: "Microsoft.ApiManagement/service"

      nsg_management_name:
        category: "networking"
        subcategory: "security"
        type: string
        description: "Management NSG name"
        required: false
        pattern: "^nsg-[a-z0-9-]+$"
        example: "nsg-azlc-AzureLocalCloud-eus-connectivity-mgmt"

      nsg_privateendpoint_name:
        category: "networking"
        subcategory: "security"
        type: string
        description: "Private endpoint NSG name"
        required: false
        pattern: "^nsg-[a-z0-9-]+$"
        example: "nsg-azlc-AzureLocalCloud-eus-connectivity-pep"

      dns_zone_resource_group:
        category: "networking"
        subcategory: "dns"
        type: string
        description: "DNS zone resource group"
        required: false
        pattern: "^rg-[a-z0-9-]+$"
        example: "rg-azlc-AzureLocalCloud-eus-connectivity-dns"

      route_tables:
        type: array
        description: "Route tables for UDRs"
        required: false
        items:
          type: object
        properties:
          name:
            type: string
          routes:
            type: array
          disable_bgp_route_propagation:
            type: boolean
          associated_subnets:
            type: array
        example:
          minimal:
          # Simplest - single default route
          - name: "rt-hub"
            routes:
              - name: "default-route"
                address_prefix: "0.0.0.0/0"
                next_hop_type: "Internet"
      
        standard:
        # Production route table with firewall next hop
        - name: "rt-hub"
          disable_bgp_route_propagation: false
          routes:
            - name: "to-firewall"
              address_prefix: "0.0.0.0/0"
              next_hop_type: "VirtualAppliance"
              next_hop_ip: "192.168.2.4"
          associated_subnets:
            - "snet-azlc-AzureLocalCloud-eus-connectivity-mgmt"
      
        complete:
        # Enterprise with multiple routes and subnet associations
        - name: "rt-hub"
          disable_bgp_route_propagation: false
          routes:
            - name: "default-route"
              address_prefix: "0.0.0.0/0"
              next_hop_type: "VirtualAppliance"
              next_hop_ip: "192.168.2.4"
            - name: "to-spoke1"
              address_prefix: "10.1.0.0/16"
              next_hop_type: "VirtualNetworkGateway"
            - name: "to-onprem"
              address_prefix: "10.0.0.0/8"
              next_hop_type: "VirtualAppliance"
              next_hop_ip: "192.168.2.4"
          associated_subnets:
            - "snet-azlc-AzureLocalCloud-eus-connectivity-mgmt"
            - "snet-azlc-AzureLocalCloud-eus-connectivity-pep"

      default_route_table_name:
        type: string
        description: "Default route table for hub-spoke topology"
        required: false
        pattern: "^rt-[a-z0-9-]+$"
        example: "rt-azlc-AzureLocalCloud-eus-default"

      disable_bgp_route_propagation:
        type: boolean
        description: "Disable BGP route propagation on route tables"
        required: false
        default: false

      network_security_groups:
        type: array
        description: "Network security groups for subnets"
        required: false
        items:
          type: object
        properties:
        name:
          type: string
        rules:
          type: array
        example:
        - name: "nsg-web"
          rules:
          - name: "allow-http"
            priority: 100
            direction: "Inbound"
            access: "Allow"

      private_dns_zones:
        type: array
        description: "Private DNS zones"
        required: false
        items:
          type: string
        example:
          - "privatelink.blob.core.windows.net"
          - "privatelink.vaultcore.azure.net"

      private_dns_zone_links:
        type: array
        description: "VNet links for private DNS zones"
        required: false
        items:
          type: object
        properties:
        zone_name:
          type: string
        vnet_name:
          type: string
        registration_enabled:
          type: boolean
        example:
          minimal:
          # Single zone link to hub VNet
          - zone_name: "privatelink.vaultcore.azure.net"
            vnet_name: "vnet-azlc-AzureLocalCloud-eus-connectivity-hub"
            registration_enabled: false
      
        standard:
        # Multiple service zones linked to hub
        - zone_name: "privatelink.blob.core.windows.net"
          vnet_name: "vnet-azlc-AzureLocalCloud-eus-connectivity-hub"
          registration_enabled: false
        - zone_name: "privatelink.vaultcore.azure.net"
          vnet_name: "vnet-azlc-AzureLocalCloud-eus-connectivity-hub"
          registration_enabled: false
        - zone_name: "privatelink.database.windows.net"
          vnet_name: "vnet-azlc-AzureLocalCloud-eus-connectivity-hub"
          registration_enabled: false
      
        complete:
        # All Azure service zones with hub and spoke links
        - zone_name: "privatelink.blob.core.windows.net"
          vnet_name: "vnet-azlc-AzureLocalCloud-eus-connectivity-hub"
          registration_enabled: false
        - zone_name: "privatelink.vaultcore.azure.net"
          vnet_name: "vnet-azlc-AzureLocalCloud-eus-connectivity-hub"
          registration_enabled: false
        - zone_name: "privatelink.database.windows.net"
          vnet_name: "vnet-azlc-AzureLocalCloud-eus-connectivity-hub"
          registration_enabled: false
        - zone_name: "privatelink.azurecr.io"
          vnet_name: "vnet-azlc-AzureLocalCloud-eus-connectivity-hub"
          registration_enabled: false
        # Spoke VNet link
        - zone_name: "privatelink.blob.core.windows.net"
          vnet_name: "vnet-spoke1"
          registration_enabled: false
        - zone_name: "privatelink.blob.core.windows.net"
          vnet_name: "vnet-azlc-AzureLocalCloud-eus-connectivity-hub"
          registration_enabled: false

      enable_private_dns_resolver:
        type: boolean
        description: "Enable Azure DNS Private Resolver in hub"
        required: false
        default: false

      private_dns_resolver_name:
        type: string
        description: "DNS Private Resolver name"
        required: false
        pattern: "^dnspr-[a-z0-9-]+$"
        example: "dnspr-azlc-AzureLocalCloud-eus"

      private_dns_resolver_inbound_endpoint:
        type: string
        description: "Inbound endpoint IP for DNS Private Resolver"
        required: false
        format: ipv4
        example: "192.168.7.4"

      private_dns_resolver_outbound_endpoint:
        type: string
        description: "Outbound endpoint for DNS Private Resolver forwarding rules"
        required: false
        pattern: "^dnspr-[a-z0-9-]+-out$"
        example: "dnspr-azlc-AzureLocalCloud-eus-out"

      nat_gateways:
        type: array
        description: "NAT gateways for outbound connectivity"
        required: false
        items:
          type: object
        properties:
          name:
            type: string
        public_ip_prefixes:
          type: array
        example:
        - name: "nat-gw-spoke1"
          public_ip_prefixes:
          - "pip-prefix1"

      public_ip_prefixes:
        type: array
        description: "Public IP prefixes for scalable IPs"
        required: false
        items:
          type: object
        properties:
          name:
            type: string
        prefix_length:
          type: integer
        example:
        - name: "pip-prefix-bastion"
          prefix_length: 28

      ddos_protection_plans:
        type: array
        description: "DDoS protection plans per VNet"
        required: false
        items:
          type: object
        properties:
          name:
            type: string
        enabled:
          type: boolean
        example:
        - name: "ddos-plan-hub"
          enabled: true

      network_watchers:
        type: array
        description: "Network watchers per region"
        required: false
        items:
          type: object
        properties:
          name:
            type: string
        location:
          type: string
        example:
        - name: "nw-eastus"
          location: "East US"

      enable_network_watcher_flow_logs:
        type: boolean
        description: "Enable NSG flow logs through Network Watcher"
        required: false
        default: false

      enable_connection_monitor:
        type: boolean
        description: "Enable Network Watcher connection monitoring"
        required: false
        default: false

      connection_monitor_workspace:
        type: string
        description: "Log Analytics workspace for connection monitoring"
        required: false
        format: uuid
        example: "12345678-1234-1234-1234-123456789012"

      enable_network_topology_view:
        type: boolean
        description: "Enable Network Watcher topology visualization"
        required: false
        default: true

      hub_spoke_topology_name:
        type: string
        description: "Name/identifier for hub-spoke topology"
        required: false
        example: "azlc-AzureLocalCloud-hub-spoke-topology"
    # ─── vnets ───
    vnets:
      vnet_name:
        type: string
        description: "Virtual network name"
        required: true
        pattern: "^vnet-[a-z0-9-]+$"
        example: "vnet-azlc-AzureLocalCloud-eus-landingzone-prod"

      vnet_address_space:
        type: array
        description: "VNet address space (CIDR)"
        required: true
        items:
          type: string
        format: cidr
        example:
          - "10.0.0.0/16"

      vnet_resource_group:
        type: string
        description: "VNet resource group"
        required: true
        pattern: "^rg-[a-z0-9-]+$"
        example: "rg-azlc-AzureLocalCloud-eus-landingzone-prod"

      vnet_subscription:
        type: string
        description: "VNet subscription ID"
        required: true
        format: uuid
        example: "00000000-1111-2222-3333-444444444444"

      vnet_location:
        type: string
        description: "VNet location"
        required: true
        example: "East US"

      vnet_enable_ddos_protection:
        type: boolean
        description: "Enable DDoS protection plan (requires DDoS protection plan resource)"
        required: false
        default: false

      vnet_ddos_protection_plan_id:
