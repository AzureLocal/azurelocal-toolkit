      # SNMP UDP 161/162) and able to forward to Azure Monitor via AMA.
      # ---------------------------------------------------------------------------
      syslog:
        # --- Common (required regardless of deployment location) ---
        syslog_hostname:
          type: string
          description: "Syslog/SNMP server hostname"
          required: true
          maxLength: 64
          example: "syslog"

        syslog_ip:
          type: string
          description: "Syslog/SNMP server IP address"
          required: true
          format: ipv4
          example: "10.100.1.61"

        syslog_fqdn:
          type: string
          description: "Syslog/SNMP server fully qualified domain name"
          required: false
          example: "syslog.corp.local"

        syslog_deployment_target:
          type: string
          description: "Where the syslog/SNMP server is deployed"
          required: true
          enum: [azure, azurelocal, onprem]
          example: "azure"

        # --- Azure IaaS (when deployment_target: azure) ---
        azure_vm_syslog_vm_name:
          type: string
          description: "Syslog Azure VM resource name (azure deployment only)"
          required: false
          example: "vm-azlc-AzureLocalCloud-eus-syslog"

        azure_vm_syslog_vm_size:
          type: string
          description: "Syslog Azure VM size"
          required: false
          example: "Standard_B2s"

        azure_vm_syslog_image_publisher:
          type: string
          description: "Syslog image publisher"
          required: false
