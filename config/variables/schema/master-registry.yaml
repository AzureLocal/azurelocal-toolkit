# =============================================================================
# Master Variable Registry - AzureLocal Cloud Team Cloud Management Platform
# =============================================================================
# Version: 4.0.0
# Schema: variables.schema.json (v4.0.0)
# Last Updated: 2026-03-05
#
# This file defines ALL variable names, types, and descriptions used across
# the AzureLocal Cloud Team Cloud Management Platform (AzureLocalCloud-CMP) and all
# Azure Local environment repositories.
#
# STRUCTURE: 15 top-level sections organized hierarchically:
#   1.  _metadata              - File versioning and change tracking
#   2.  infrastructure_scenarios - Deployment type taxonomy and variable grouping
#   3.  site                   - Physical location metadata and hardware
#   4.  environment            - Environment classification
#   5.  tags                   - Azure resource tagging standards
#   6.  azure_platform         - Azure org hierarchy (tenants, subs, RGs)
#   7.  identity               - Accounts, AD, service principals, RBAC
#   8.  networking             - Azure / on-prem / hybrid networking
#   9.  compute                - VMs, clusters, nodes, ARM deployment, AVD
#   10. storage_accounts       - Azure Storage Account definitions
#   11. cluster_shared_volumes - S2D CSV volumes and Azure storage path registration
#   12. marketplace_images     - Azure Marketplace VM images registered to the cluster
#   13. security               - Key Vault, Defender, Sentinel
#   14. operations             - Monitoring, policy, patching, BCDR
#   15. devops                 - GitLab, Terraform
#
# Naming: snake_case, ^[a-z][a-z0-9_]*$, max 50 chars
# Registry is MASTER — scripts, infra files, schema, docs all conform to it.
#
# Change Log:
#   v4.0.0 (2026-03-05):
#     - BREAKING: Restructured from 40 flat sections → 13 hierarchical sections
#     - Dissolved 8 fragment sections (hardware_support, network_config,
#       cluster_networking, cluster_config, cross_reference, monitoring_extended,
#       snmp, arc_resource_bridge) — absorbed into parent sections
#     - Renamed: bcdr_backup_recovery → operations.bcdr
#     - Renamed: storage → storage_accounts
#     - Renamed: azure_firewall → networking.azure.firewall
#     - Renamed: hub_spoke_networking → networking.azure.hub_spoke
#     - Added: security.sentinel, identity.managed_identities,
#       identity.b2b_configuration, networking.azure.sdn, devops.terraform
#     - Merged 13 duplicate variables
#     - All variables mapped from 3 live infrastructure files + 156 scripts
#
#   v2.2.0 (2026-02-01):
#     - Added: B2B cross-tenant synchronization section (45+ variables)
#     - Added: GitLab CI/CD configuration variables (4 variables)
#     - Added: Arc Resource Bridge variables (3 variables)
#     - Source: Variable audit from 157 PowerShell scripts in azl-toolkit
#
#   v2.1.0 (2025-12-13):
# - Added: Hyper-V Host, Arc Resource Bridge for Arc Hybrid VMs
# - Added: WSFC enhancements enhancements, AVD cloud + Azure Local
#
#   v2.0.0 (2025-12-13):
#     - BREAKING: Renamed all variables with consistent prefixes
#     - Added variable categories, dependencies, triple-tier examples
#
#   v1.0.0 (2025-10-15):
#     - Initial variable registry creation
# =============================================================================

# =============================================================================
# 1. METADATA
# =============================================================================
_metadata:
  version: "4.0.0"
  schema_version: "4.0.0"
  last_updated: "2026-03-05"
  total_variables: "970+"
  maintainers:
    - name: "AzureLocal Cloud Team Team"
      email: "AzureLocalCloud@Azure Local Cloud.com"
  change_log:
    - date: "2026-03-05"
      version: "4.0.0"
      change: "Restructured from 40 flat sections to 13 hierarchical sections"
      reason: "Logical organization, dissolved fragment sections, eliminated duplicates"
    - date: "2026-02-01"
      version: "2.2.0"
      change: "Added B2B, GitLab, Arc Resource Bridge, cluster networking, monitoring extended"
      reason: "Variable audit from 157 PowerShell scripts"
  cross_references:
    - source: "variables.schema.json"
      relationship: "validates infrastructure files against these definitions"
    - source: "registry-reference.mdx"
      relationship: "human-readable documentation of this registry"
    - source: "technical-standards.mdx"
      relationship: "naming rules and conventions"

# =============================================================================
# 2. INFRASTRUCTURE SCENARIOS
# =============================================================================
infrastructure_scenarios:
  # ---------------------------------------------------------------------------
  # SHARED VARIABLE GROUPS (Always Included)
  # ---------------------------------------------------------------------------
  # These are automatically included with ANY infrastructure flag
  shared_groups:
    - azure_tenants         # Tenant, subscription, service principals
    - management_groups     # Management group hierarchy
    - subscriptions         # Subscription configuration
    - resource_groups       # Resource groups, locations, tags
    - hub_spoke_networking  # VNets, subnets, NSGs, hub-spoke
    - azure_vnets           # Virtual network configuration
    - vpn                   # VPN gateway configuration
    - bastion               # Azure Bastion configuration
    - azure_firewall        # Azure Firewall configuration
    - monitoring            # Log Analytics, Azure Monitor, Application Insights
    - keyvault              # Key Vault configurations (CMP platform and per-tenant)
    - active_directory      # AD DS domain integration
    - policy                # Azure Policy assignments
    - defender              # Defender for Cloud
    - bcdr_backup_recovery  # Recovery Services, backup policies
    - storage               # Storage accounts
    - azure_vms             # Management VMs (DCs, Jumpbox, WAC, Lighthouse, Syslog)
    - accounts              # Service accounts and credentials
    - environment           # Environment configuration
    - site                  # Site configuration
    - tags                  # Resource tagging standards
  
  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE TYPES
  # ---------------------------------------------------------------------------
  infrastructure_types:
    azure_local:
      description: "Azure Local (formerly Azure Stack HCI) cluster"
      variable_groups:
        - clusters
        - cluster_nodes
        - network_intents
        - logical_networks
        - vlans
        - dhcp
        - cluster_arm_deployment
      estimated_variables: "250-350"
      
    avd_azure:
      description: "Azure Virtual Desktop in Azure cloud"
      variable_groups:
        - avd
      conflicts_with: []
      requires: []
      estimated_variables: "50-100"
      
    avd_azure_local:
      description: "Azure Virtual Desktop on Azure Local"
      variable_groups:
        - avd
      conflicts_with: []
      requires:
        - azure_local
      estimated_variables: "50-100"
      

    sofs_azure_local:
      name: "Scale-Out File Server on Azure Local"
      description: "SOFS guest clusters on Azure Local for FSLogix profile storage"
      status: active
      solutions: ["sofs-azure-local"]
    aks_azure_local:
      name: "AKS on Azure Local"
      description: "Azure Kubernetes Service hybrid clusters on Azure Local"
      status: active
      solutions: ["aks-azure-local"]
    loadtools:
      name: "Load Testing Tools"
      description: "Performance and load testing tools for Azure Local workloads"
      status: active
      solutions: ["loadtools"]
    vm_conversion:
      name: "VM Conversion Toolkit"
      description: "Tools for converting VMs between generations and formats on Azure Local"
      status: active
      solutions: ["vm-conversion"]
    copilot:
      name: "Azure Local Copilot"
      description: "AI-assisted operations and management for Azure Local infrastructure"
      status: active
      solutions: ["copilot"]

# =============================================================================
# =============================================================================
# 3. SITE
# =============================================================================
site:
  _meta:
    solutions: ["all"]
    tier: required
    description: "Physical site metadata — included in all solutions"
  code:
    type: string
    description: "Site code"
    required: true
    maxLength: 5
    pattern: "^[A-Z]{2,5}$"
    example: "RAL"

  env_name:
    type: string
    description: "Site name"
    required: true
    example: "Azure Local Cloud Raleigh"

  location:
    type: string
    description: "Physical location"
    required: false
    example: "Raleigh, NC"

  datacenter:
    type: string
    description: "Datacenter code"
    required: false
    example: "RAL"

  site_code:
    type: string
    description: "Site code"
    required: true
    maxLength: 5
    pattern: "^[A-Z]{2,5}$"
    example: "AZL"

  site_datacenter:
    type: string
    description: "Site datacenter"
    required: true
    example: "Azure Local Cloud RAL"

  site_description:
    type: string
    description: "Site description"
    required: true
    example: "Azure Local cluster for AzureLocalCloud CMP"

  site_environment:
    type: string
    description: "Site environment"
    required: true
    example: "Production"

  site_location:
    type: string
    description: "Site location"
    required: true
    example: "Raleigh, NC"

  site_name:
    type: string
    description: "Site name"
    required: true
    example: "Azure Local Cloud"

  site_owner:
    type: string
    description: "Site owner"
    required: true
    example: "AzureLocal Cloud Team Team"

  # ─── short-form aliases (canonical nested convenience keys) ───
  name:
    type: string
    description: "Site display name (short alias for site_name)"
    required: false
    example: "Azure Local Cloud"

  owner:
    type: string
    description: "Site owner (short alias for site_owner)"
    required: false
    example: "AzureLocal Cloud Team Team"

  environment:
    type: string
    description: "Site environment label (short alias for site_environment)"
    required: false
    example: "Production"

  customer_name:
    type: string
    description: "Customer or tenant name associated with the site"
    required: false
    example: "contoso"

  # ─── hardware (absorbed from dissolved hardware_support) ───
  hardware:
    hw_vendor:
      description: "Hardware vendor for cluster nodes"
      type: string
      required: false
      example: "Dell"
    hw_model:
      description: "Server model"
      type: string
      required: false
      example: "Dell AX-760"
    hw_generation:
      description: "Hardware generation"
      type: string
      required: false
      example: "16G"
    hw_serial:
      description: "Chassis serial number"
      type: string
      required: false
    hw_sbe_version:
      description: "Solution Builder Extension version"
      type: string
      required: false
      example: "4.2.2506.1600"
    hw_network_adapter:
      description: "Network adapter model"
      type: string
      required: false
      example: "4x 25GbE SFP28 (Intel E810-XXV)"
    hw_network_adapter_type:
      description: "Network adapter type/driver"
      type: string
      required: false
      example: "Intel(R) Ethernet 25G 2P E810-XXV Adapter"
    dell_support:
      dell_support_username:
        description: "Dell support portal username"
        type: string
        required: false
      dell_support_password:
        description: "Dell support portal password (Key Vault reference)"
        type: string
        required: false
        sensitive: true
    gpu_enabled:
      type: boolean
      description: "GPU acceleration available on cluster nodes"
      required: false
      default: false
    gpu_model:
      type: string
      description: "GPU model installed in cluster nodes"
      required: false
      example: "NVIDIA A16"
    idrac:
      idrac_username:
        type: string
        description: "iDRAC default username for hardware management"
        required: false
        example: "root"
      idrac_password:
        type: string
        description: "iDRAC password (Key Vault reference)"
        required: false
        sensitive: true
        pattern: "^keyvault://[a-z0-9-]+/.+$"

# =============================================================================
# 4. ENVIRONMENT
# =============================================================================
environment:
  _meta:
    solutions: ["all"]
    tier: required
    description: "Environment classification — included in all solutions"
  env_name:
    type: string
    description: "Environment identifier"
    required: true
    allowedValues:
    - azurelocalcloud
    - ProjectIIC
    - iic-reference
    - Azure Local Cloudpoc
    - Azure Local Cloudproductlabs
    example: "azurelocalcloud"

  env_type:
    type: string
    description: "Environment type"
    required: true
    allowedValues:
    - management
    - lab
    - demo
    - poc
    - production
    example: "management"

  env_owner:
    type: string
    description: "Environment owner email"
    format: email
    required: false
    example: "AzureLocalCloud@contoso.cloud"

  env_description:
    type: string
    description: "Environment description"
    required: false
    example: "AzureLocal Cloud Team Cloud Management Platform"

# =============================================================================
# 5. TAGS
# =============================================================================
tags:
  _meta:
    solutions: ["all"]
    tier: required
    description: "Azure resource tagging standards — included in all solutions"
  Environment:
    type: string
    description: "Environment tag identifying the Azure Local environment"
    required: true
    allowedValues:
    - azurelocalcloud
    - ProjectIIC
    - iic-reference
    - Azure Local Cloudpoc
    - Azure Local Cloudproductlabs
    example: "azurelocalcloud"

  Project:
    type: string
    description: "Project name tag"
    required: true
    allowedValues:
    - "Azure Local Cloud Management"
    - "Project Phoenix"
    - "Azure Local Cloud Demos"
    - "Azure Local Cloud POC"
    - "Azure Local Cloud Product Labs"
    example: "AzureLocal Cloud Team Cloud Management Platform"

  ManagedBy:
    type: string
    description: "Management tool identifier"
    required: true
    allowedValues:
    - Terraform
    - PowerShell
    - Bicep
    - Ansible
    - "Azure CLI"
    - Manual
    default: "Infrastructure as Code"

  env_Owner:
    type: string
    description: "Owner tag"
    required: true
    example: "AzureLocal Cloud Team Team"

  CostCenter:
    type: string
    description: "Cost center tag"
    required: false
    example: "IT-AzureLocalCloud"

  tag_architecture_version:
    category: "operations"
    subcategory: "tagging"
    type: string
    description: "Tag architecture version"
    required: true
    example: "v2.0"

  # ─── lowercase tag aliases (canonical convenience keys) ───
  owner:
    type: string
    description: "Owner tag (lowercase alias for env_Owner)"
    required: false
    example: "AzureLocal Cloud Team Team"

  Owner:
    type: string
    description: "Owner tag (PascalCase alias for env_Owner)"
    required: false
    example: "AzureLocal Cloud Team Team"

  environment:
    type: string
    description: "Environment tag (lowercase alias for Environment)"
    required: false
    example: "azurelocalcloud"

  cost_center:
    type: string
    description: "Cost center tag (snake_case alias for CostCenter)"
    required: false
    example: "IT-AzureLocalCloud"

  project:
    type: string
    description: "Project tag (lowercase alias for Project)"
    required: false
    example: "Azure Local Cloud Management"

# =============================================================================
# 6. AZURE PLATFORM
# =============================================================================
azure_platform:
  # ─── azure_tenants ───
  azure_tenants:
    _meta:
      solutions: ["all"]
      tier: required
      description: "Azure tenant configuration — included in all solutions"
    # Primary Tenant - Azure Local Cloud
    aztenant_azurelocal_id:
      category: "identity"
      subcategory: "tenant"
      type: string
      description: "Azure AD/Entra ID Tenant ID (GUID)"
      required: true
      format: uuid
      example: "00000000-aaaa-bbbb-cccc-111111111111"

    aztenant_azurelocal_name:
      category: "identity"
      subcategory: "tenant"
      type: string
      description: "Azure tenant display name"
      required: true
      example: "Azure Local Cloud"

    aztenant_azurelocal_domain:
      category: "identity"
      subcategory: "tenant"
      type: string
      description: "Azure tenant domain"
      required: true
      pattern: "^[a-z0-9-]+\\.onmicrosoft\\.com$"
      example: "azurelocalcloud.onmicrosoft.com"

    aztenant_azurelocal_primary_domain:
      type: string
      description: "Primary custom domain"
      required: true
      example: "azurelocal.cloud"

    aztenant_region:
      category: "identity"
      subcategory: "region"
      type: string
      description: "Azure region code"
      required: true
      example: "eastus"

    aztenant_environment:
      type: string
      description: "Azure cloud environment"
      required: false
      allowedValues:
      - AzureCloud
      - AzureUSGovernment
      - AzureChinaCloud
      default: "AzureCloud"

    aztenant_location:
      category: "identity"
      subcategory: "region"
      type: string
      description: "Azure region (full name)"
      required: true
      allowedValues:
      - eastus
      - eastus2
      - westus
      - westus2
      - centralus
      - northeurope
      - westeurope
      example: "eastus"

    aztenant_location_short:
      type: string
      description: "Azure region (short form)"
      required: true
      pattern: "^[a-z]{2,5}[0-9]?$"
      example: "eus"

    # Tenant: Project Phoenix
    aztenant_ProjectIIC_id:
      type: string
      description: "Project Phoenix Tenant ID"
      required: false
      format: uuid
      example: "33333333-3333-3333-3333-333333333333"

    aztenant_ProjectIIC_domain:
      type: string
      description: "Project Phoenix tenant domain"
      required: false
      example: "ProjectIIC.onmicrosoft.com"

    aztenant_ProjectIIC_primary_domain:
      type: string
      description: "Project Phoenix primary domain"
      required: false
      example: "ProjectIIC.cloud"

    # Tenant: Azure Local Cloud Demos
    aztenant_iic-reference_id:
      type: string
      description: "Azure Local Cloud Demos Tenant ID"
      required: false
      format: uuid
      example: "12345678-1234-1234-1234-123456789012"

    aztenant_iic-reference_domain:
      type: string
      description: "Azure Local Cloud Demos tenant domain"
      required: false
      example: "iic-reference.onmicrosoft.com"

    aztenant_iic-reference_primary_domain:
      type: string
      description: "Azure Local Cloud Demos primary domain"
      required: false
      example: "iic-reference.cloud"

    # Tenant: Azure Local Cloud POC
    aztenant_Azure Local Cloudpoc_id:
      type: string
      description: "Azure Local Cloud POC Tenant ID"
      required: false
      format: uuid
      example: "12345678-1234-1234-1234-123456789013"

    aztenant_Azure Local Cloudpoc_domain:
      type: string
      description: "Azure Local Cloud POC tenant domain"
      required: false
      example: "Azure Local Cloudpoc.onmicrosoft.com"

    aztenant_Azure Local Cloudpoc_primary_domain:
      type: string
      description: "Azure Local Cloud POC primary domain"
      required: false
      example: "Azure Local Cloudpoc.cloud"

    # Tenant: Azure Local Cloud Product Labs
    aztenant_Azure Local Cloudproductlabs_id:
      type: string
      description: "Azure Local Cloud Product Labs Tenant ID"
      required: false
      format: uuid
      example: "12345678-1234-1234-1234-123456789014"

    aztenant_Azure Local Cloudproductlabs_domain:
      type: string
      description: "Azure Local Cloud Product Labs tenant domain"
      required: false
      example: "Azure Local Cloudproductlabs.onmicrosoft.com"

    aztenant_Azure Local Cloudproductlabs_primary_domain:
      type: string
      description: "Azure Local Cloud Product Labs primary domain"
      required: false
      example: "Azure Local Cloudproductlabs.cloud"
  # ─── management_groups ───
  management_groups:
    _meta:
      solutions: ["all"]
      tier: required
      description: "Management group hierarchy — included in all solutions"
    # =============================================================================
    # TENANT ROOT MANAGEMENT GROUP
    # =============================================================================

    tenant_root:
      mgtgrp_tenant_root_name:
        type: string
        description: "Tenant root management group name (top-level group for entire tenant)"
        required: false
        example: "Tenant Root Group"

    # =============================================================================
    # CUSTOM MANAGEMENT GROUPS
    # =============================================================================

    custom:
      # Root Management Group
      mgtgrp_root_name:
        category: "identity"
        subcategory: "management-group"
        type: string
        description: "Root management group name (varies by environment)"
        required: true
        pattern: "^mg-[a-z0-9-]+$"
        example: "mg-azlc-AzureLocalCloud"

      mgtgrp_root_display_name:
        type: string
        description: "Root management group display name (varies by environment)"
        required: true
        example: "Azure Local Cloud Management"

      mgtgrp_platform_name:
        type: string
        description: "Platform management group name (varies by environment)"
        required: false
        pattern: "^platform-[a-z0-9-]+$"
        example: "platform-connectivity"

      mgtgrp_platform_display_name:
        type: string
        description: "Platform management group display name (varies by environment)"
        required: false
        example: "Platform Connectivity"

      # Platform Management Groups
      mgtgrp_identity_name:
        type: string
        description: "Identity platform group name (varies by environment)"
        required: false
        pattern: "^platform-[a-z0-9-]+$"
        example: "platform-identity"

      mgtgrp_connectivity_name:
        type: string
        description: "Connectivity platform group name (varies by environment)"
        required: false
        pattern: "^platform-[a-z0-9-]+$"
        example: "platform-connectivity"

      mgtgrp_management_name:
        type: string
        description: "Management platform group name (varies by environment)"
        required: false
        pattern: "^platform-[a-z0-9-]+$"
        example: "platform-management"

      mgtgrp_platform_identity_name:
        type: string
        description: "Platform Identity management group name"
        required: false
        pattern: "^platform-[a-z0-9-]+$"
        example: "platform-identity"

      mgtgrp_platform_security_name:
        type: string
        description: "Platform Security management group name"
        required: false
        pattern: "^platform-[a-z0-9-]+$"
        example: "platform-security"

      mgtgrp_platform_connectivity_name:
        type: string
        description: "Platform Connectivity management group name"
        required: false
        pattern: "^platform-[a-z0-9-]+$"
        example: "platform-connectivity"

      mgtgrp_platform_management_name:
        type: string
        description: "Platform Management management group name"
        required: false
        pattern: "^platform-[a-z0-9-]+$"
        example: "platform-management"

      mgtgrp_security_name:
        type: string
        description: "Security platform group name (varies by environment)"
        required: false
        pattern: "^platform-[a-z0-9-]+$"
        example: "platform-security"

      # Landing Zones
      mgtgrp_landing_zones_name:
        type: string
        description: "Landing zones management group name (varies by environment)"
        required: false
        pattern: "^lz-[a-z0-9-]+$"
        example: "lz-azurelocalcloud"

      # Customer Branch Management Groups
      mgtgrp_customer_root_name:
        type: string
        description: "Customer environment root management group name"
        required: false
        example: "mg-cmp-labs-root"

      mgtgrp_customer_platform_connectivity_name:
        type: string
        description: "Customer platform connectivity management group name"
        required: false
        example: "platform-connectivity-labs"

      mgtgrp_customer_platform_identity_name:
        type: string
        description: "Customer platform identity management group name"
        required: false
        example: "platform-identity-labs"

      mgtgrp_customer_platform_management_name:
        type: string
        description: "Customer platform management management group name"
        required: false
        example: "platform-management-labs"

      mgtgrp_customer_platform_security_name:
        type: string
        description: "Customer platform security management group name"
        required: false
        example: "platform-security-labs"

      mgtgrp_customer_landing_zones_name:
        type: string
        description: "Customer landing zones management group name"
        required: false
        example: "landing-zones-labs"

      mgtgrp_customer_landing_zone_prod_name:
        type: string
        description: "Customer production landing zone management group name"
        required: false
        example: "lz-labs-demo-prod"

      mgtgrp_customer_sandbox_name:
        type: string
        description: "Customer sandbox management group name"
        required: false
        example: "sandbox-labs"

      mgtgrp_customer_decommissioned_name:
        type: string
        description: "Customer decommissioned resources management group name"
        required: false
        example: "decommissioned-labs"

      # Sandbox and Decommissioned
      mgtgrp_sandbox_name:
        type: string
        description: "Sandbox management group name"
        required: false
        pattern: "^sandbox(-[a-z0-9-]+)?$"
        example: "sandbox"

      mgtgrp_decommissioned_name:
        type: string
        description: "Decommissioned management group name"
        required: false
        pattern: "^decommissioned-[a-z0-9-]+$"
        example: "decommissioned-azlc"
  # ─── subscriptions ───
  subscriptions:
    _meta:
      solutions: ["all"]
      tier: required
      description: "Subscription configuration — included in all solutions"
    sub_bootstrap_id:
      category: "identity"
      subcategory: "subscription"
      type: string
      description: "Bootstrap subscription ID"
      required: false
      format: uuid
      example: "00000000-1111-2222-3333-444444444444"

    sub_bootstrap_name:
      type: string
      description: "Bootstrap subscription name"
      required: false
      example: "Azure Local Cloud Bootstrap"

    sub_connectivity_id:
      category: "identity"
      subcategory: "subscription"
      type: string
      description: "Connectivity subscription ID"
      required: false
      format: uuid
      example: "12345678-1234-1234-1234-123456789015"

    sub_connectivity_name:
      type: string
      description: "Connectivity subscription name"
      required: false
      example: "Azure Local Cloud Connectivity"

    sub_management_id:
      category: "identity"
      subcategory: "subscription"
      type: string
      description: "Management subscription ID"
      required: false
      format: uuid
      example: "12345678-1234-1234-1234-123456789016"

    sub_security_id:
      type: string
