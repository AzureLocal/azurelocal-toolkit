      description: "Sentinel watchlists"
      type: array
      required: false


# =============================================================================
# 14. OPERATIONS
# =============================================================================
operations:
  # ─── monitoring ───
  monitoring:
    _meta:
      solutions: ["all"]
      tier: required
      description: "Log Analytics, DCRs, alerts, and monitoring configuration"

    # ─── Nested aliases (used in example file) ───
    log_analytics:
      type: object
      description: "Log Analytics configuration (nested alias)"
      workspace_id:
        type: string
        description: "Log Analytics workspace ID"
        format: uuid
      workspace_name:
        type: string
        description: "Log Analytics workspace name (alias for monitoring_log_analytics_workspace_name)"
        alias_for: monitoring_log_analytics_workspace_name

    wac:
      type: object
      description: "Windows Admin Center configuration (nested alias)"
      server:
        type: string
        description: "WAC server FQDN (alias for monitoring_wac_server)"
        alias_for: monitoring_wac_server

    # ─── absorbed from dissolved monitoring_extended ───
    extended:
      # ─── Nested aliases (used in example file) ───
      datadog:
        monitoring_datadog_api_key:
          category: "monitoring"
          subcategory: "datadog"
          type: string
          description: "Datadog API key for agent configuration"
          required: false
          sensitive: true
          pattern: "^keyvault://[a-z0-9-]+/.+$"
          example: "keyvault://kv-azlc-AzureLocalCloud-secrets/datadog-api-key"

        api_key:
          type: string
          description: "Datadog API key shorthand (alias for monitoring_datadog_api_key)"
          alias_for: monitoring_datadog_api_key
          sensitive: true

        monitoring_datadog_site:
          category: "monitoring"
          subcategory: "datadog"
          type: string
          description: "Datadog site URL (region-specific)"
          required: false
          allowedValues:
            - "datadoghq.com"
            - "us3.datadoghq.com"
            - "us5.datadoghq.com"
            - "datadoghq.eu"
          default: "datadoghq.com"
          example: "datadoghq.com"

        site:
          type: string
          description: "Datadog site shorthand (alias for monitoring_datadog_site)"
          alias_for: monitoring_datadog_site

      scom:
        monitoring_scom_server:
          category: "monitoring"
          subcategory: "scom"
          type: string
          description: "SCOM management server FQDN"
          required: false
          example: "scom-mgmt01.azlocal.cloud"

        server:
          type: string
          description: "SCOM server shorthand (alias for monitoring_scom_server)"
          alias_for: monitoring_scom_server

      wac_monitoring:
        monitoring_wac_server:
          category: "monitoring"
          subcategory: "wac"
          type: string
          description: "Windows Admin Center server FQDN for monitoring integration"
          required: false
          example: "wac01.azlocal.cloud"
          note: "For WAC VM configuration, see azure_jumpbox_vm.wac section"

    monitoring_log_analytics_workspace_name:
      category: "monitoring"
      subcategory: "log-analytics"
      type: string
      description: "Log Analytics workspace name"
      required: false
      pattern: "^law-[a-z0-9-]+$"
      example: "law-azlc-AzureLocalCloud-eus-monitoring"

    monitoring_log_analytics_workspace_sku:
      category: "monitoring"
      subcategory: "log-analytics"
      type: string
      description: "Log Analytics workspace SKU"
      required: false
      allowedValues:
      - Free
      - PerGB2018
      - PerNode
      - Premium
      - Standard
      - Standalone
      default: "PerGB2018"

    monitoring_log_analytics_retention_days:
      category: "monitoring"
      subcategory: "retention"
