          alias_for: vlan_workload_1_id
        cidr:
          type: string
          description: "Workload VLAN CIDR (alias for vlan_workload_1_cidr)"
          alias_for: vlan_workload_1_cidr
        gateway:
          type: string
          description: "Workload VLAN gateway (alias for vlan_workload_1_gateway)"
          alias_for: vlan_workload_1_gateway
        subnet:
          type: string
          description: "Workload VLAN subnet"
        start:
          type: string
          description: "Workload VLAN IP range start"
          format: ipv4
        end:
          type: string
          description: "Workload VLAN IP range end"
          format: ipv4

    # ─── dhcp ───
    dhcp:
      infrastructure_type: ["azure_local"]
      _meta:
        solutions: ["azure-local"]
        tier: optional
        description: "DHCP service configuration"
      # ---------------------------------------------------------------------------
      dhcp_service_enabled:
        type: boolean
        description: "Enable DHCP service globally"
        required: false
        default: true

      dhcp_service_platform:
        type: string
        description: "DHCP service platform"
        required: false
        options:
        - "windows_server"
        - "fortigate"
        - "cisco_ios"
        - "linux_isc_dhcp"
        - "infoblox"
        example: "fortigate"

      dhcp_server_ip:
        type: string
        description: "DHCP server IP address (for relay/helper configuration)"
        required: false
        format: ipv4
        example: "192.168.211.5"

      # DHCP SCOPES (Array-Based, Multiple Scopes per Network)
      # ---------------------------------------------------------------------------
      dhcp_scopes:
        type: array
        description: "DHCP scopes for all networks (platform-agnostic)"
        required: false
        items:
          type: object
          properties:
            scope_name:
              type: string
            vlan_id:
              type: integer
            network:
              type: string
              format: cidr
            subnet_mask:
              type: string
              format: ipv4
            gateway:
              type: string
              format: ipv4
            range_start:
              type: string
              format: ipv4
            range_end:
              type: string
              format: ipv4
            dns_servers:
              type: array
              items:
                type: string
                format: ipv4
            domain_name:
              type: string
            ntp_servers:
              type: array
              items:
                type: string
                format: ipv4
            lease_time:
              type: integer
            enabled:
              type: boolean
            reservations:
              type: array
              items:
                type: object
                properties:
                  mac_address:
                    type: string
                  ip_address:
                    type: string
                    format: ipv4
                  hostname:
                    type: string
            exclusions:
              type: array
              items:
                type: object
                properties:
                  start_ip:
                    type: string
                    format: ipv4
                  end_ip:
                    type: string
                    format: ipv4
        example:
        - scope_name: "management-compute"
          vlan_id: 211
          network: "192.168.211.0/24"
          subnet_mask: "255.255.255.0"
          gateway: "192.168.211.1"
          range_start: "192.168.211.100"
          range_end: "192.168.211.200"
          dns_servers: ["10.100.1.36", "10.100.1.37"]
          domain_name: "azlocal.cloud"
          ntp_servers: ["10.100.1.36"]
          lease_time: 86400
          enabled: true
          reservations:
            - mac_address: "00:15:5D:00:00:01"
              ip_address: "192.168.211.10"
              hostname: "azlc-node01"
          exclusions:
            - start_ip: "192.168.211.1"
              end_ip: "192.168.211.50"
        - scope_name: "workload-web"
          vlan_id: 501
          network: "192.168.100.0/24"
          subnet_mask: "255.255.255.0"
          gateway: "192.168.100.1"
          range_start: "192.168.100.100"
          range_end: "192.168.100.200"
          dns_servers: ["10.100.1.36", "10.100.1.37"]
          domain_name: "azlocal.cloud"
          lease_time: 43200
          enabled: true

      # MANAGEMENT-COMPUTE DHCP SCOPE
      # ---------------------------------------------------------------------------
      dhcp_management_compute_enabled:
        type: boolean
        description: "Enable DHCP for management-compute network"
        required: false
        default: true

      dhcp_management_compute_range_start:
        type: string
        description: "Management-compute DHCP range start"
        required: false
        format: ipv4
        example: "192.168.211.100"

      dhcp_management_compute_range_end:
        type: string
        description: "Management-compute DHCP range end"
        required: false
        format: ipv4
        example: "192.168.211.200"

      dhcp_management_compute_lease_time:
        type: integer
        description: "Management-compute DHCP lease time (seconds)"
        required: false
        minimum: 300
        maximum: 31536000
        default: 86400

      dhcp_management_compute_dns_servers:
        type: array
        description: "Management-compute DHCP DNS servers"
        required: false
        items:
          type: string
        format: ipv4
        example:
        - "10.100.1.36"
        - "10.100.1.37"

      dhcp_management_compute_domain:
        type: string
        description: "Management-compute DHCP domain name"
        required: false
        example: "azlocal.cloud"

      dhcp_management_compute_ntp_servers:
        type: array
        description: "Management-compute DHCP NTP servers"
        required: false
        items:
          type: string
        format: ipv4
        example:
        - "10.100.1.36"

      dhcp_management_compute_exclusions:
        type: array
        description: "Management-compute DHCP exclusion ranges"
        required: false
        items:
          type: object
          properties:
            start_ip:
              type: string
              format: ipv4
            end_ip:
              type: string
              format: ipv4
        example:
        - start_ip: "192.168.211.1"
          end_ip: "192.168.211.50"  # OUT-OF-BAND DHCP SCOPE
      # ---------------------------------------------------------------------------
      dhcp_oob_enabled:
        type: boolean
        description: "Enable DHCP for out-of-band network"
        required: false
        default: true

      dhcp_oob_range_start:
        type: string
        description: "Out-of-band DHCP range start"
        required: false
        format: ipv4
        example: "192.168.210.100"

      dhcp_oob_range_end:
        type: string
        description: "Out-of-band DHCP range end"
        required: false
        format: ipv4
        example: "192.168.210.200"

      dhcp_oob_lease_time:
        type: integer
        description: "Out-of-band DHCP lease time (seconds)"
        required: false
        minimum: 300
        maximum: 31536000
        default: 86400

      dhcp_oob_dns_servers:
        type: array
        description: "Out-of-band DHCP DNS servers"
        required: false
        items:
          type: string
        format: ipv4
        example:
        - "8.8.8.8"
        - "8.8.4.4"

      # WORKLOAD DHCP SCOPES (1-6)
      # ---------------------------------------------------------------------------
      dhcp_workload_1_enabled:
        type: boolean
        description: "Enable DHCP for workload network 1"
        required: false
        default: false

      dhcp_workload_1_range_start:
        type: string
        description: "Workload 1 DHCP range start"
        required: false
        format: ipv4
        example: "192.168.100.100"

      dhcp_workload_1_range_end:
        type: string
        description: "Workload 1 DHCP range end"
        required: false
        format: ipv4
        example: "192.168.100.200"

      dhcp_workload_1_lease_time:
        type: integer
        description: "DHCP lease duration in seconds for workload network 1 (recommended: 86400 for static devices, 3600 for dynamic clients)"
        required: false
        minimum: 600
        maximum: 2592000
        default: 43200
        note: "Default 43200 (12 hours). Min 600 (10 min), Max 2592000 (30 days)"

      dhcp_workload_2_enabled:
        type: boolean
        description: "Enable DHCP for workload network 2"
        required: false
        default: false

      dhcp_workload_2_range_start:
        type: string
        description: "Workload 2 DHCP range start"
        required: false
        format: ipv4
        example: "192.168.51.100"

      dhcp_workload_2_range_end:
        type: string
        description: "Workload 2 DHCP range end"
        required: false
        format: ipv4
        example: "192.168.51.200"

      dhcp_workload_2_lease_time:
        type: integer
        description: "DHCP lease duration in seconds for workload network 2 (recommended: 86400 for static devices, 3600 for dynamic clients)"
        required: false
        minimum: 600
        maximum: 2592000
        default: 43200
        note: "Default 43200 (12 hours). Min 600 (10 min), Max 2592000 (30 days)"

      dhcp_workload_3_enabled:
        type: boolean
        description: "Enable DHCP for workload network 3"
        required: false
        default: false

      dhcp_workload_3_range_start:
        type: string
        description: "Workload 3 DHCP range start"
        required: false
        format: ipv4
        example: "192.168.52.100"

      dhcp_workload_3_range_end:
        type: string
        description: "Workload 3 DHCP range end"
        required: false
        format: ipv4
        example: "192.168.52.200"

      dhcp_workload_3_lease_time:
        type: integer
        description: "DHCP lease duration in seconds for workload network 3 (recommended: 86400 for static devices, 3600 for dynamic clients)"
        required: false
        minimum: 600
        maximum: 2592000
        default: 43200
        note: "Default 43200 (12 hours). Min 600 (10 min), Max 2592000 (30 days)"

      dhcp_workload_4_enabled:
        type: boolean
        description: "Enable DHCP for workload network 4"
        required: false
        default: false

      dhcp_workload_4_range_start:
        type: string
        description: "Workload 4 DHCP range start"
        required: false
        format: ipv4
        example: "192.168.53.100"

      dhcp_workload_4_range_end:
        type: string
        description: "Workload 4 DHCP range end"
        required: false
        format: ipv4
        example: "192.168.53.200"

      dhcp_workload_4_lease_time:
        type: integer
        description: "DHCP lease duration in seconds for workload network 4 (recommended: 86400 for static devices, 3600 for dynamic clients)"
        required: false
        minimum: 600
        maximum: 2592000
        default: 43200
        note: "Default 43200 (12 hours). Min 600 (10 min), Max 2592000 (30 days)"

      dhcp_workload_5_enabled:
        type: boolean
        description: "Enable DHCP for workload network 5"
        required: false
        default: false

      dhcp_workload_5_range_start:
        type: string
        description: "Workload 5 DHCP range start"
        required: false
        format: ipv4
        example: "192.168.54.100"

      dhcp_workload_5_range_end:
        type: string
        description: "Workload 5 DHCP range end"
        required: false
        format: ipv4
        example: "192.168.54.200"

      dhcp_workload_5_lease_time:
        type: integer
        description: "DHCP lease duration in seconds for workload network 5 (recommended: 86400 for static devices, 3600 for dynamic clients)"
        required: false
        minimum: 600
        maximum: 2592000
        default: 43200
        note: "Default 43200 (12 hours). Min 600 (10 min), Max 2592000 (30 days)"

      dhcp_workload_6_enabled:
        type: boolean
        description: "Enable DHCP for workload network 6"
        required: false
        default: false

      dhcp_workload_6_range_start:
        type: string
        description: "Workload 6 DHCP range start"
        required: false
        format: ipv4
        example: "192.168.55.100"

      dhcp_workload_6_range_end:
        type: string
        description: "Workload 6 DHCP range end"
        required: false
        format: ipv4
        example: "192.168.55.200"

      dhcp_workload_6_lease_time:
        type: integer
        description: "DHCP lease duration in seconds for workload network 6 (recommended: 86400 for static devices, 3600 for dynamic clients)"
        required: false
        minimum: 600
        maximum: 2592000
        default: 43200
        note: "Default 43200 (12 hours). Min 600 (10 min), Max 2592000 (30 days)"

      # DHCP RESERVATIONS (Global)
      # ---------------------------------------------------------------------------
      dhcp_reservations:
        type: array
        description: "DHCP reservations across all scopes"
        required: false
        items:
          type: object
          properties:
            scope_name:
              type: string
            mac_address:
              type: string
              pattern: "^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$"
            ip_address:
              type: string
              format: ipv4
            hostname:
              type: string
            description:
              type: string
        example:
        - scope_name: "management-compute"
          mac_address: "00:15:5D:00:00:01"
          ip_address: "192.168.211.10"
          hostname: "azlc-node01"
          description: "Azure Local Node 1"
        - scope_name: "management-compute"
          mac_address: "00:15:5D:00:00:02"
          ip_address: "192.168.211.11"
          hostname: "azlc-node02"
          description: "Azure Local Node 2"  # DHCP OPTIONS (Global)
      # ---------------------------------------------------------------------------
      dhcp_option_domain_name:
        type: string
        description: "DHCP option 15 - Domain name"
        required: false
        example: "azlocal.cloud"

      dhcp_option_tftp_server:
        type: string
        description: "DHCP option 66 - TFTP server (for PXE boot)"
        required: false
        format: ipv4
        example: "192.168.211.5"

      dhcp_option_bootfile_name:
        type: string
        description: "DHCP option 67 - Bootfile name (for PXE boot)"
        required: false
        example: "pxeboot.n12"

      dhcp_relay_agent_enabled:
        type: boolean
        description: "Enable DHCP relay agent (IP helper)"
        required: false
        default: false

      dhcp_relay_server_ips:
        type: array
        description: "DHCP relay server IP addresses"
        required: false
        items:
          type: string
        format: ipv4
        example:
        - "192.168.211.5"

      # ─── Nested DHCP aliases (used in example file) ───
      management_compute:
        type: object
        description: "Management-compute DHCP scope (nested alias)"
        dns_primary:
          type: string
          description: "Primary DNS server for management-compute scope"
          format: ipv4

      server:
        type: string
        description: "DHCP server IP (alias for dhcp_server_ip)"
        alias_for: dhcp_server_ip

    # ─── dns ───
    dns:
      type: object
      description: "DNS configuration"
      servers:
        type: array
        description: "DNS server IP addresses"
        items:
          type: string
          format: ipv4

    # ─── mtu ───
    mtu:
      type: integer
      description: "MTU size for on-premises network"
      required: false
      default: 9014
      minimum: 1500
      maximum: 9216

    # =============================================================================
    # CLUSTERS (ORCHESTRATION & MANAGEMENT)
    # =============================================================================
    # Parent section for cluster orchestration technologies. Contains both Azure
    # Local (modern hyper-converged infrastructure) and Windows Server Failover
    # Clustering (traditional clustering) configurations.
    #
    # CHILD SECTIONS:
    #   - azure_local: Azure Local clusters (formerly Azure Stack HCI)
    #   - wsfc: Windows Server Failover Clustering
    #
    # SHARED INFRASTRUCTURE:
    #   - cluster_nodes: (line 5218+) Generic physical node configurations used by both technologies
    # ─── network_intents ───
    network_intents:
      infrastructure_type: ["azure_local"]
      _meta:
        solutions: ["azure-local"]
        tier: required
        description: "Azure Local network intent configurations (ATC-based)"
      description: "Network intent configurations (1-16 intents supported). Each intent defines traffic types, adapters, and network settings."
      required: true
      minItems: 1
      maxItems: 16
      items:
        type: object
        required:
          - name
          - traffic_types
          - adapter_names
        properties:
          # Intent Identification
          name:
            type: string
            description: "Intent name (e.g., 'MgmtCompute', 'Storage', 'Converged')"
            required: true
            example: "MgmtCompute"
      
          # Traffic Types (Microsoft ARM parameter: intentList[].trafficType)
          traffic_types:
            type: array
            description: "Traffic types for this intent (ARM parameter: trafficType)"
            required: true
            items:
              type: string
            enum: ["Management", "Compute", "Storage"]
            minItems: 1
            maxItems: 3
            example: ["Management", "Compute"]
      
          # Physical Adapters (Microsoft ARM parameter: intentList[].adapter)
          adapter_names:
            type: array
            description: "Physical network adapter names (minimum 2 for HA, ARM parameter: adapter)"
            required: true
            items:
              type: string
            minItems: 2
            example: ["Slot 2 Port 1", "Slot 2 Port 2"]
      
          # Management/Compute Network Settings
          subnet:
            type: string
            description: "Network subnet (CIDR) for management/compute traffic"
            required: false
            format: cidr
            example: "192.168.211.0/24"
      
          gateway:
            type: string
            description: "Network gateway for management/compute traffic"
            required: false
            format: ipv4
            example: "192.168.211.1"
      
          vlan_id:
            type: integer
            description: "VLAN ID for management/compute traffic"
            required: false
            minimum: 0
            maximum: 4094
            example: 211
      
          dns_servers:
            type: array
            description: "DNS servers for management traffic"
            required: false
            items:
              type: string
              format: ipv4
            example:
              - "192.168.211.10"
              - "192.168.211.11"
      
          # Storage Network Settings (Microsoft ARM parameter: storageNetworkList)
          storage_networks:
            type: array
            description: "Storage network configurations (ARM parameter: storageNetworkList)"
            required: false
            items:
              type: object
              properties:
                subnet:
                  type: string
                  description: "Storage network subnet (CIDR)"
                  format: cidr
                  example: "10.71.212.0/24"
                vlan_id:
                  type: integer
                  description: "Storage VLAN ID"
                  minimum: 1
                  maximum: 4094
                  example: 712
            minItems: 1
            maxItems: 4
            example:
              - subnet: "10.71.212.0/24"
                vlan_id: 712
              - subnet: "10.71.213.0/24"
                vlan_id: 713
      
          # Storage Configuration (Microsoft ARM parameters)
          enable_storage_auto_ip:
            type: boolean
            description: "Enable automatic IP assignment for storage (ARM parameter: enableStorageAutoIp). Must be FALSE for switchless storage."
            required: false
            default: true
      
          storage_connectivity_switchless:
            type: boolean
            description: "Use switchless storage topology (ARM parameter: storageConnectivitySwitchless). Max 4 nodes, requires manual IPs."
            required: false
            default: false
      
          # Storage Adapter IPs (for switchless or manual IP assignment)
          storage_adapter_ips:
            type: array
            description: "Manual IP assignment for storage adapters (ARM parameter: storageAdapterIPInfo). Required when enable_storage_auto_ip is false."
            required: false
            items:
              type: object
              properties:
                node_name:
                  type: string
                  description: "Cluster node name"
                  example: "azlc-node01"
                adapter_name:
                  type: string
                  description: "Physical adapter name"
                  example: "Slot 6 Port 1"
                ipv4_address:
                  type: string
                  description: "IPv4 address for this adapter"
                  format: ipv4
                  example: "10.71.212.1"
                subnet_mask:
                  type: string
                  description: "Subnet mask"
                  format: ipv4
                  example: "255.255.255.0"
            example:
              - node_name: "azlc-node01"
                adapter_name: "Slot 6 Port 1"
                ipv4_address: "10.71.212.1"
                subnet_mask: "255.255.255.0"
      
          # Adapter Property Overrides (Microsoft ARM parameter: adapterPropertyOverrides)
          jumbo_packet_size:
            type: integer
            description: "Jumbo packet (MTU) size (ARM parameter: adapterPropertyOverrides.jumboPacket)"
            required: false
            minimum: 1500
            maximum: 9014
            default: 9014
            example: 9014
      
          network_direct_enabled:
            type: boolean
            description: "Enable RDMA/NetworkDirect (ARM parameter: adapterPropertyOverrides.networkDirect)"
            required: false
            default: true
      
          network_direct_technology:
            type: string
            description: "RDMA technology (ARM parameter: adapterPropertyOverrides.networkDirectTechnology)"
            required: false
            allowedValues:
              - iWARP
              - RoCEv2
            default: "RoCEv2"
            example: "RoCEv2"
  
      # Example configurations (for reference - not part of the schema)
      # Three complexity levels: minimal, standard, complete
      examples:
        minimal:
          # Simplest valid configuration - single converged intent
          # Use case: Testing, POC, or simple lab environments
          - name: "Converged"
            traffic_types: ["Management", "Compute", "Storage"]
            adapter_names: ["Slot 2 Port 1", "Slot 2 Port 2"]
            subnet: "192.168.211.0/24"
            gateway: "192.168.211.1"
            vlan_id: 211
            dns_servers: ["192.168.211.10"]
            storage_networks:
              - subnet: "10.71.212.0/24"
                vlan_id: 712
            enable_storage_auto_ip: true
    
        standard:
          # Production-ready 2-intent deployment (most common)
          # Use case: Standard production deployments with separated storage
          - name: "MgmtCompute"
            traffic_types: ["Management", "Compute"]
            adapter_names: ["Slot 2 Port 1", "Slot 2 Port 2"]
            subnet: "192.168.211.0/24"
            gateway: "192.168.211.1"
            vlan_id: 211
            dns_servers: ["192.168.211.10", "192.168.211.11"]
      
          - name: "Storage"
            traffic_types: ["Storage"]
            adapter_names: ["Slot 6 Port 1", "Slot 6 Port 2"]
            storage_networks:
              - subnet: "10.71.212.0/24"
                vlan_id: 712
              - subnet: "10.71.213.0/24"
                vlan_id: 713
            enable_storage_auto_ip: true
            jumbo_packet_size: 9014
            network_direct_enabled: true
            network_direct_technology: "RoCEv2"
    
        complete:
          # Advanced configuration with all options (switchless storage)
          # Use case: High-performance clusters with manual IP control (1-4 nodes max)
          - name: "MgmtCompute"
            traffic_types: ["Management", "Compute"]
            adapter_names: ["Slot 2 Port 1", "Slot 2 Port 2"]
            subnet: "192.168.211.0/24"
            gateway: "192.168.211.1"
            vlan_id: 211
            dns_servers: ["192.168.211.10", "192.168.211.11"]
            jumbo_packet_size: 9014
      
          - name: "Storage"
            traffic_types: ["Storage"]
            adapter_names: ["Slot 6 Port 1", "Slot 6 Port 2", "Slot 6 Port 3", "Slot 6 Port 4"]
            storage_networks:
              - subnet: "10.71.212.0/24"
                vlan_id: 712
              - subnet: "10.71.213.0/24"
                vlan_id: 713
            enable_storage_auto_ip: false  # Required for switchless
            storage_connectivity_switchless: true
            jumbo_packet_size: 9014
            network_direct_enabled: true
            network_direct_technology: "RoCEv2"
            storage_adapter_ips:
              - node_name: "azlc-node01"
                adapter_name: "Slot 6 Port 1"
                ipv4_address: "10.71.212.1"
                subnet_mask: "255.255.255.0"
              - node_name: "azlc-node01"
                adapter_name: "Slot 6 Port 2"
                ipv4_address: "10.71.212.2"
                subnet_mask: "255.255.255.0"
              - node_name: "azlc-node02"
                adapter_name: "Slot 6 Port 1"
                ipv4_address: "10.71.212.3"
                subnet_mask: "255.255.255.0"
              - node_name: "azlc-node02"
                adapter_name: "Slot 6 Port 2"
                ipv4_address: "10.71.212.4"
                subnet_mask: "255.255.255.0"

    # =============================================================================
    # LOGICAL NETWORKS
    # =============================================================================
    # Logical network configurations for VM networking layer (1-16 networks supported)
    # Management-Compute network is primary and required (VLAN 211)
    # Additional workload networks are optional and scalable
    #
    # RELATED SECTIONS:
    #   - network_intents: (line 5391+) - Physical adapter layer (intents must exist first)
    #   - vlans: (line 3264+) - VLAN definitions and IP addressing
    #   - dhcp: (line 3675+) - DHCP scope configuration for each network
    #
    # ARM TEMPLATE MAPPING:
    #   logicalNetworks: [
    #     {
    #       name: string
    #       addressPrefix: string (CIDR)
    #       defaultGateway: string (IPv4)
    #       vlan: integer (0-4094)
    #       dnsServers: array
    #       ipAllocationMethod: "Static" | "Dynamic"
    #       ipPools: [ { name, start, end, type } ]
    #       dhcpOptions: { dnsServers, domainName, ntpServers }
    #       routes: [ { name, addressPrefix, nextHop } ]
    #     }
    #   ]
    #
    # EXAMPLES:
    #   1. Management-Compute network (PRIMARY - always required):
    #      - name: "ln-management-compute"
    #        address_prefix: "192.168.211.0/24"
    #        vlan_id: 211
    #        ip_pools: [{ start: "192.168.211.100", end: "192.168.211.200" }]
    #
    #   2. Multiple networks (management + workloads):
    #      - name: "ln-management-compute"
    #        vlan_id: 211
    #      - name: "ln-workload-web"
    #        vlan_id: 501
    #      - name: "ln-workload-app"
    #        vlan_id: 502
    #
    #   3. Advanced with DHCP options and routes:
    #      - name: "ln-management-compute"
    #        dhcp_options:
    #          dns_servers: ["192.168.211.10"]
    #          domain_name: "azlocal.cloud"
    #        routes:
    #          - name: "default-route"
    #            address_prefix: "0.0.0.0/0"
    #            next_hop: "192.168.211.1"
    # ─── logical_networks ───
    logical_networks:
      infrastructure_type: ["azure_local"]
      _meta:
        solutions: ["azure-local", "avd-azure-local"]
        tier: required
        description: "Azure Local logical networks (VM networking layer)"
      description: "Logical network configurations (VM networking layer). Management-Compute network is primary and required."
      required: true
      minItems: 1
      maxItems: 20
      items:
        type: object
        required:
          - name
          - address_prefix
          - default_gateway
          - vlan_id
        properties:
          enabled:
            type: boolean
            description: "Deploy this logical network. Set false to skip provisioning without removing from config."
            required: false
            default: true
            example: true

          # Network Identification
          name:
            type: string
            description: "Logical network name (ARM parameter: name)"
            required: true
            example: "ln-management-compute"

          display_name:
            type: string
            description: "Display name for Azure portal"
            required: false
            example: "Management-Compute Network"

          # Network Configuration (ARM parameters)
          address_prefix:
            type: string
            description: "Network address prefix in CIDR notation (ARM parameter: addressPrefix)"
            required: true
            format: cidr
            example: "192.168.211.0/24"

          default_gateway:
            type: string
            description: "Default gateway for the network (ARM parameter: defaultGateway)"
            required: true
            format: ipv4
            example: "192.168.211.1"

          vlan_id:
            type: integer
            description: "VLAN ID for network isolation (ARM parameter: vlan)"
            required: true
            minimum: 0
            maximum: 4094
            example: 211

          dns_servers:
            type: array
            description: "DNS servers for the network (ARM parameter: dnsServers)"
            required: false
            items:
              type: string
              format: ipv4
            example:
              - "192.168.211.10"
              - "192.168.211.11"

          # IP Allocation (ARM parameter: ipAllocationMethod and ipPools)
          ip_allocation_method:
            type: string
            description: "IP allocation method (ARM parameter: ipAllocationMethod)"
            required: false
            allowedValues:
              - Static
              - Dynamic
            default: "Static"
            example: "Static"

          ip_pools:
            type: array
            description: "IP address pools for VM allocation (ARM parameter: ipPools). Supports multiple pools per network."
            required: false
            items:
              type: object
              required:
                - start
                - end
              properties:
                name:
                  type: string
                  description: "IP pool name"
                  required: false
                  example: "default-pool"
                start:
                  type: string
                  description: "Starting IP address"
                  required: true
                  format: ipv4
                  example: "192.168.211.100"
                end:
                  type: string
                  description: "Ending IP address"
                  required: true
                  format: ipv4
                  example: "192.168.211.200"
                type:
                  type: string
                  description: "Pool type (vm, k8s, etc.)"
                  required: false
                  default: "vm"
                  example: "vm"
            minItems: 1
            example:
            - name: "vm-pool"
              start: "192.168.211.100"
              end: "192.168.211.200"
              type: "vm"

          # DHCP Options (ARM parameter: dhcpOptions)
          dhcp_options:
            type: object
            description: "DHCP configuration options (ARM parameter: dhcpOptions)"
            required: false
            properties:
              dns_servers:
                type: array
                description: "DHCP DNS servers"
                required: false
                items:
                  type: string
                  format: ipv4
                example:
                  - "192.168.211.10"
              domain_name:
                type: string
                description: "DHCP domain name"
                required: false
                example: "azlocal.cloud"
              ntp_servers:
                type: array
                description: "NTP servers for time sync"
                required: false
                items:
                  type: string
                example:
                  - "192.168.211.1"
            example:
              dns_servers: ["192.168.211.10"]
              domain_name: "azlocal.cloud"

          # Routes (ARM parameter: routes)
          routes:
            type: array
            description: "Static routes for the network (ARM parameter: routes)"
            required: false
            items:
              type: object
              required:
                - address_prefix
                - next_hop
              properties:
                name:
                  type: string
                  description: "Route name"
                  required: false
                  example: "default-route"
                address_prefix:
                  type: string
                  description: "Destination address prefix"
                  required: true
                  format: cidr
                  example: "0.0.0.0/0"
                next_hop:
                  type: string
                  description: "Next hop IP address"
                  required: true
                  format: ipv4
                  example: "192.168.211.1"
            example:
            - name: "default-route"
              address_prefix: "0.0.0.0/0"
              next_hop: "192.168.211.1"

          # Additional Settings
          immutable:
            type: boolean
            description: "Network configuration is immutable after creation"
            required: false
            default: false

          network_intent_binding:
            type: string
            description: "Bind to specific network intent (optional)"
            required: false
            example: "MgmtCompute"

      # Example configurations (for reference - not part of the schema)
      # Three complexity levels: minimal, standard, complete
      examples:
        minimal:
          # Simplest valid configuration - single management-compute network
          # Use case: Testing, POC, or simple lab environments
          - name: "ln-management-compute"
            address_prefix: "192.168.211.0/24"
            default_gateway: "192.168.211.1"
            vlan_id: 211
            dns_servers: ["192.168.211.10"]
            ip_allocation_method: "Static"
            ip_pools:
              - start: "192.168.211.100"
                end: "192.168.211.200"
    
        standard:
          # Production multi-network deployment (management + workloads)
          # Use case: Standard production with separated workload networks
      
          # Network 1: Management-Compute (PRIMARY - always required)
          - name: "ln-management-compute"
            display_name: "Management-Compute Network"
            address_prefix: "192.168.211.0/24"
            default_gateway: "192.168.211.1"
            vlan_id: 211
            dns_servers: ["192.168.211.10", "192.168.211.11"]
            ip_allocation_method: "Static"
            ip_pools:
              - name: "management-vm-pool"
                start: "192.168.211.100"
                end: "192.168.211.150"
                type: "vm"
              - name: "arc-vm-pool"
                start: "192.168.211.151"
                end: "192.168.211.200"
                type: "vm"
            dhcp_options:
              dns_servers: ["192.168.211.10", "192.168.211.11"]
              domain_name: "azlocal.cloud"
            network_intent_binding: "MgmtCompute"
      
          # Network 2: Workload-Web
          - name: "ln-workload-web"
            display_name: "Web Tier Network"
            address_prefix: "192.168.100.0/24"
            default_gateway: "192.168.100.1"
            vlan_id: 501
            dns_servers: ["192.168.211.10"]
            ip_allocation_method: "Static"
            ip_pools:
              - name: "web-vm-pool"
                start: "192.168.100.100"
                end: "192.168.100.200"
                type: "vm"
            network_intent_binding: "MgmtCompute"
      
          # Network 3: Workload-App
          - name: "ln-workload-app"
            display_name: "Application Tier Network"
            address_prefix: "192.168.51.0/24"
            default_gateway: "192.168.51.1"
            vlan_id: 502
            dns_servers: ["192.168.211.10"]
            ip_allocation_method: "Static"
            ip_pools:
              - name: "app-vm-pool"
                start: "192.168.51.100"
                end: "192.168.51.200"
                type: "vm"
            network_intent_binding: "MgmtCompute"
    
        complete:
          # Advanced configuration with all optional features
          # Use case: Enterprise production with routing, DHCP options, multiple IP pools
          - name: "ln-management-compute"
            display_name: "Management-Compute Network"
            address_prefix: "192.168.211.0/24"
            default_gateway: "192.168.211.1"
            vlan_id: 211
            dns_servers:
              - "192.168.211.10"
              - "192.168.211.11"
            ip_allocation_method: "Static"
            ip_pools:
              - name: "management-pool"
                start: "192.168.211.100"
                end: "192.168.211.130"
                type: "vm"
              - name: "arc-vm-pool"
                start: "192.168.211.131"
                end: "192.168.211.160"
                type: "vm"
              - name: "kubernetes-pool"
                start: "192.168.211.161"
                end: "192.168.211.200"
                type: "k8s"
            dhcp_options:
              dns_servers:
                - "192.168.211.10"
                - "192.168.211.11"
              domain_name: "azlocal.cloud"
              ntp_servers:
                - "192.168.211.1"
            routes:
              - name: "default-route"
                address_prefix: "0.0.0.0/0"
                next_hop: "192.168.211.1"
              - name: "azure-wire-server"
                address_prefix: "168.63.129.16/32"
                next_hop: "192.168.211.1"
              - name: "corp-network"
                address_prefix: "10.0.0.0/8"
                next_hop: "192.168.211.254"
            network_intent_binding: "MgmtCompute"
            immutable: false
    # ─── network_devices ───
    network_devices:
      infrastructure_type: []
      _meta:
        solutions: []
        tier: optional
        description: "Network infrastructure devices (switches, firewalls, routers)"

      # ─── Named device aliases (used in example file) ───
      opengear:
        type: object
        description: "OpenGear console server configuration"
        host:
          type: string
          description: "OpenGear hostname or IP"
        users:
          type: array
          description: "OpenGear users"
          items:
            type: string
        alerts:
          type: object
          description: "OpenGear alert configuration"
      powerswitch:
        type: object
        description: "Power switch/PDU configuration"
        host:
          type: string
          description: "Power switch hostname or IP"

      description: "Network infrastructure device configurations (switches, firewalls, routers, console servers). Optional and scalable."
      required: false
      minItems: 0
      maxItems: 32
      items:
        type: object
        required: [device_type, device_role, device_hostname, device_management_ip]
        properties:
        # -----------------------------------------------------------------------
        # DEVICE IDENTIFICATION
        # -----------------------------------------------------------------------
          device_type:
            type: string
            description: "Device type classification"
            required: true
            allowedValues:
              - switch
              - firewall
              - router
              - console_server
              - wireless_controller
              - load_balancer
            example: "switch"
      
          device_role:
            type: string
            description: "Device role in infrastructure"
            required: true
            allowedValues:
              - primary
              - secondary
              - standalone
            example: "primary"
      
          device_hostname:
            type: string
            description: "Device hostname"
            required: true
            maxLength: 15
            example: "switch01"
      
          device_management_ip:
            type: string
            description: "Device management IP address"
            format: ipv4
            required: true
            example: "192.168.211.10"
      
          device_management_vlan:
            type: integer
            description: "Device management VLAN ID"
            required: false
            minimum: 0
            maximum: 4094
            example: 211
      
        # -----------------------------------------------------------------------
        # HARDWARE DETAILS
        # -----------------------------------------------------------------------
          device_vendor:
            type: string
            description: "Device manufacturer/vendor"
            required: false
            allowedValues:
              - Dell
              - Fortinet
              - Cisco
              - Arista
              - Ubiquiti
              - OpenGear
              - HPE
              - Juniper
            example: "Dell"
      
          device_model:
            type: string
            description: "Device model number"
            required: false
            example: "S5248F-ON"
      
          device_serial_number:
            type: string
            description: "Device serial number"
            required: false
            example: "CN7942V1AB"
      
          device_firmware_version:
            type: string
            description: "Device firmware/OS version"
            required: false
            example: "10.5.5.5"
      
          device_mac_address:
            type: string
            description: "Device MAC address"
            format: mac
            required: false
            example: "AA:BB:CC:DD:EE:FF"
      
        # -----------------------------------------------------------------------
        # CREDENTIALS (Key Vault References)
        # -----------------------------------------------------------------------
          device_username_secret:
            type: string
            description: "Device username (Key Vault secret reference)"
            required: false
            sensitive: true
            pattern: "^keyvault://[a-z0-9-]+/.+$"
            example: "keyvault://kv-azlc-mgmt/switch-username"
      
          device_password_secret:
            type: string
            description: "Device password (Key Vault secret reference)"
            required: false
            sensitive: true
            pattern: "^keyvault://[a-z0-9-]+/.+$"
            example: "keyvault://kv-azlc-mgmt/switch-password"
      
          device_management_protocol:
            type: string
            description: "Device management protocol"
            required: false
            allowedValues:
              - SSH
              - HTTPS
              - Telnet
              - SNMP
            default: "SSH"
            example: "SSH"
      
        # -----------------------------------------------------------------------
        # HIGH AVAILABILITY CONFIGURATION
        # -----------------------------------------------------------------------
          device_ha_enabled:
            type: boolean
            description: "High availability enabled"
            required: false
            default: false
            example: true
      
          device_ha_mode:
            type: string
            description: "High availability mode"
            required: false
            allowedValues:
              - active-active
              - active-passive
              - stack
            example: "active-active"
      
          device_ha_priority:
            type: integer
            description: "HA priority (higher value = higher priority)"
            required: false
            minimum: 0
            maximum: 255
            example: 200
      
          device_ha_sync_interface:
            type: string
            description: "HA heartbeat/sync interface name"
            required: false
            example: "port5"
      
          device_ha_virtual_ip:
            type: string
            description: "HA virtual/cluster IP address"
            format: ipv4
            required: false
            example: "192.168.211.254"
      
        # -----------------------------------------------------------------------
        # CONSOLE SERVER SPECIFIC
        # -----------------------------------------------------------------------
          device_serial_ports:
            type: integer
            description: "Number of serial console ports"
            required: false
            minimum: 0
            maximum: 96
            example: 48
      
          device_network_ports:
            type: integer
            description: "Number of network switch ports"
            required: false
            minimum: 0
            maximum: 48
            example: 4
      
        # -----------------------------------------------------------------------
        # ROUTING & NETWORKING
        # -----------------------------------------------------------------------
          device_wan_ip:
            type: string
            description: "WAN/external IP address"
            format: ipv4
            required: false
            example: "203.0.113.1"
      
          device_gateway_ips:
            type: array
            description: "Gateway IP addresses managed by device"
            required: false
            items:
              type: string
              format: ipv4
            example:
              - "192.168.211.1"
      
          device_static_routes:
            type: array
            description: "Static routes configured on device"
            required: false
            items:
              type: object
              properties:
                destination:
                  type: string
                  description: "Destination network (CIDR)"
                  example: "10.0.0.0/8"
                gateway:
                  type: string
                  description: "Next-hop gateway IP"
                  format: ipv4
                  example: "192.168.211.1"
      
        # -----------------------------------------------------------------------
        # SWITCH SPECIFIC
        # -----------------------------------------------------------------------
          device_port_config:
            type: array
            description: "Port configuration for switches"
            required: false
            items:
              type: object
              properties:
                port:
                  type: string
                  description: "Port identifier"
                  example: "1/1"
                vlan:
                  type: integer
                  description: "VLAN ID"
                  minimum: 0
                  maximum: 4094
                  example: 211
                mode:
                  type: string
                  description: "Port mode"
                  allowedValues: [access, trunk]
                  example: "access"
      
        # -----------------------------------------------------------------------
        # FIREWALL SPECIFIC
        # -----------------------------------------------------------------------
          device_policy_name:
            type: string
            description: "Firewall policy/ruleset name"
            required: false
            example: "fp-azlc-AzureLocalCloud"
      
        # -----------------------------------------------------------------------
        # SUPPORT & DOCUMENTATION
        # -----------------------------------------------------------------------
          device_vendor_support:
            type: string
            description: "Vendor support contract information"
            required: false
            example: "Fortinet ProSupport - Contract #12345"
      
          device_rack_position:
            type: string
            description: "Physical rack location"
            required: false
            example: "RAL-Rack01-U1"
      
          device_notes:
            type: string
            description: "Additional device notes"
            required: false
            example: "Primary datacenter switch"
    # ─── absorbed from dissolved network_config ───
      management_nic_name:
        category: "networking"
        subcategory: "adapters"
        type: string
        description: "Management network adapter name (varies by Dell platform)"
        required: false
        example: "Embedded NIC 1"
        note: "Adapter name varies: 'Embedded NIC 1' for Intel onboard, 'Slot X Port Y' for Mellanox PCIe"
  
      jumbo_frames_mtu:
        category: "networking"
        subcategory: "adapters"
        type: integer
        description: "Jumbo frames MTU value for storage and RDMA traffic"
        required: false
        minimum: 1500
        maximum: 9014
        default: 9014
        example: 9014
  # ═══════════════════════════════════════
  # HYBRID NETWORKING
  # ═══════════════════════════════════════
  hybrid:
    _meta:
      solutions: ["all"]
      tier: optional
      description: "Hybrid networking (VPN gateways, ExpressRoute)"
    # ─── vpn ───
    vpn:
      vpn_gateways:
        type: array
        description: "VPN gateways per tenant"
        required: false
        items:
          type: object
        properties:
        name:
          type: string
        sku:
          type: string
        public_ip:
          type: string
        bgp_enabled:
          type: boolean
        bgp_asn:
          type: integer
        example:
        - name: "vpngw-tenant1"
          sku: "VpnGw1"
          public_ip: "pip-vpngw-tenant1"
          bgp_enabled: true
          bgp_asn: 65515

      vpn_gateway_name:
        type: string
        description: "VPN gateway name"
        required: false
        example: "vpngw-azlc-AzureLocalCloud-eus"

      vpn_gateway_type:
        type: string
        description: "VPN gateway type"
        required: false
        allowedValues:
        - Vpn
        - ExpressRoute
        default: "Vpn"

      vpn_gateway_vpn_type:
        type: string
        description: "VPN type for route-based or policy-based VPN"
        required: false
        allowedValues:
        - RouteBased
        - PolicyBased
        default: "RouteBased"

      vpn_gateway_sku:
        type: string
        description: "VPN gateway SKU"
        required: false
        allowedValues:
        - Basic
        - VpnGw1
        - VpnGw2
        - VpnGw3
        - VpnGw4
        - VpnGw5
        - VpnGw1AZ
        - VpnGw2AZ
        - VpnGw3AZ
        - VpnGw4AZ
        - VpnGw5AZ
        default: "VpnGw1"

      vpn_gateway_generation:
        type: string
        description: "VPN gateway generation"
        required: false
        allowedValues:
        - Generation1
        - Generation2
        default: "Generation2"

      vpn_gateway_active_active:
        type: boolean
        description: "Enable active-active mode for high availability"
        required: false
        default: false

      vpn_gateway_subnet_address_prefix:
        type: string
        description: "Gateway subnet address prefix (must be named GatewaySubnet)"
        required: false
        format: cidr
        example: "192.168.0.0/27"

      vpn_gateway_public_ip:
        type: string
        description: "VPN gateway public IP name"
        required: false
        pattern: "^pip-[a-z0-9-]+$"
        example: "pip-azlc-AzureLocalCloud-eus-vpngw"

      vpn_gateway_public_ip_address:
        type: string
        description: "VPN gateway public IP address"
        required: false
        format: ipv4
        example: "assigned by Azure"

      vpn_gateway_bgp_enabled:
        type: boolean
        description: "BGP enabled on VPN gateway"
        required: false
        default: false

      vpn_gateway_bgp_asn:
        type: integer
        description: "BGP ASN for VPN gateway"
        required: false
        minimum: 64512
        maximum: 65534
        example: 65515

      vpn_gateway_bgp_peering_address:
        type: string
        description: "BGP peering address"
        required: false
        format: ipv4
        example: "192.168.0.4"

      local_gateways:
        type: array
        description: "Local network gateways"
        required: false
        items:
          type: object
        properties:
        name:
          type: string
        ip_address:
          type: string
          format: ipv4
        address_prefixes:
          type: array
        bgp_asn:
          type: integer
        example:
        - name: "lng-onprem"
          ip_address: "203.0.113.1"
          address_prefixes:
          - "192.168.0.0/16"
          bgp_asn: 65001

      local_gateway_name:
        type: string
        description: "Local network gateway name"
        required: false
        example: "lng-azlc-AzureLocalCloud-onprem"

      local_gateway_device:
        type: string
        description: "Local gateway device model"
        required: false
        example: "Cisco ASA"

      local_gateway_ip:
        type: string
        description: "Local gateway IP address"
        required: false
        format: ipv4
        example: "203.0.113.1"

      local_gateway_address_prefixes:
        type: array
        description: "Local gateway address prefixes"
        required: false
        items:
          type: string
        format: cidr
        example:
        - "192.168.0.0/16"

      local_gateway_bgp_asn:
        type: integer
        description: "Local gateway BGP ASN"
        required: false
        example: 65001

      local_gateway_bgp_peering_address:
        type: string
        description: "Local gateway BGP peering address"
        required: false
        format: ipv4
        example: "192.168.0.1"

      vpn_connections:
        type: array
        description: "VPN connections"
        required: false
        items:
          type: object
          properties:
            name:
              type: string
            type:
              type: string
            local_gateway:
              type: string
            shared_key:
              type: string
              sensitive: true
            enable_bgp:
              type: boolean
        example:
          - name: "conn-to-onprem"
            type: "IPsec"
            local_gateway: "lng-onprem"
            shared_key: "secret"
            enable_bgp: true

      vpn_connection_name:
        type: string
        description: "VPN connection name"
        required: false
        example: "conn-azlc-to-onprem"

      vpn_connection_type:
        type: string
        description: "VPN connection type"
        required: false
        allowedValues:
        - IPsec
        - Vnet2Vnet
        - ExpressRoute
        default: "IPsec"

      vpn_connection_protocol:
        type: string
        description: "VPN connection protocol"
        required: false
        allowedValues:
        - IKEv2
        - IKEv1
        default: "IKEv2"

      vpn_connection_enable_bgp:
        type: boolean
        description: "Enable BGP on connection"
        required: false
        default: false

      vpn_connection_routing_weight:
        type: integer
        description: "Connection routing weight"
        required: false
        minimum: 0
        maximum: 32000
        default: 100

      vpn_connection_mode:
        type: string
        description: "VPN connection mode"
        required: false
        allowedValues:
        - Default
        - InitiatorOnly
        - ResponderOnly
        default: "Default"

      vpn_connection_dpd_timeout_seconds:
        type: integer
        description: "Dead Peer Detection timeout in seconds"
        required: false
        minimum: 9
        maximum: 3600
        default: 45

      vpn_connection_use_policy_based_traffic_selectors:
        type: boolean
        description: "Enable policy-based traffic selectors for compatibility with on-prem devices"
        required: false
        default: false

      vpn_connection_ipsec_policies:
        type: array
        description: "Custom IPsec/IKE policies for VPN connection"
        required: false
        items:
          type: object
          properties:
            ike_encryption:
              type: string
            ike_integrity:
              type: string
            dh_group:
              type: string
            ipsec_encryption:
              type: string
            ipsec_integrity:
              type: string
            pfs_group:
              type: string
            sa_lifetime_seconds:
              type: integer
            sa_data_size_kilobytes:
              type: integer
        example:
        - ike_encryption: "AES256"
          ike_integrity: "SHA256"
          dh_group: "DHGroup14"
          ipsec_encryption: "AES256"
          ipsec_integrity: "SHA256"
          pfs_group: "PFS2048"
          sa_lifetime_seconds: 27000
          sa_data_size_kilobytes: 102400000

      vpn_shared_key_secret:
        type: string
        description: "VPN shared key (Key Vault reference)"
        required: false
        sensitive: true
        pattern: "^keyvault://[a-z0-9-]+/.+$"
        example: "keyvault://kv-azlc-mgmt/vpn-shared-key"

      p2s_client_address_pool:
        type: string
        description: "Point-to-site client address pool (CIDR)"
        required: false
        format: cidr
        example: "172.16.0.0/24"

      p2s_vpn_client_protocols:
        type: array
        description: "Point-to-site VPN client protocols"
        required: false
        items:
          type: string
        allowedValues:
        - IkeV2
        - SSTP
        - OpenVPN
        example:
        - "IkeV2"
        - "OpenVPN"

      p2s_authentication_type:
        type: string
        description: "Point-to-site authentication type"
        required: false
        allowedValues:
        - Certificate
        - AAD
        - Radius
        default: "Certificate"

      vpn_client_root_certificate_name:
        type: string
        description: "VPN client root certificate name"
        required: false
        example: "P2SRootCert"

      bgp_enabled:
        type: boolean
        description: "Global BGP flag"
        required: false
        default: false

      bgp_asn:
        type: integer
        description: "Tenant BGP ASN"
        required: false
        minimum: 64512
        maximum: 65534
        example: 65515

      bgp_peering_addresses:
        type: array
        description: "BGP peering addresses"
        required: false
        items:
          type: string
        format: ipv4
        example:
        - "192.168.0.4"
        - "192.168.0.5"

      on_prem_networks:
        type: array
        description: "On-prem networks to advertise via BGP"
        required: false
        items:
          type: string
        format: cidr
        example:
        - "192.168.0.0/16"
        - "10.0.0.0/8"

      route_filters:
        type: array
        description: "BGP route filters"
        required: false
        items:
          type: object
        properties:
        name:
          type: string
        rules:
          type: array
        example:
        - name: "rf-onprem"
          rules:
          - name: "allow-all"
            access: "Allow"
            bgp_community: "*"

      vpn_connection_bgp_settings:
        type: object
        description: "BGP settings per connection"
        required: false
        properties:
          asn:
            type: integer
          peering_addresses:
            type: array
        example:
          asn: 65515
          peering_addresses:
            - "192.168.0.4"

# =============================================================================
# 9. COMPUTE
# =============================================================================
compute:
  # ═══════════════════════════════════════
  # VIRTUAL MACHINES
  # ═══════════════════════════════════════
  vms:
    # ─── management servers ───
    # These servers can be deployed anywhere: Azure IaaS, Azure Local VMs, or
    # on-premises physical/virtual machines. Common variables (hostname, ip, fqdn)
    # are always required. Platform-specific variables are conditional based on
    # deployment_target and only populated when relevant.
    management:
      _meta:
        solutions: ["all"]
        tier: required
        description: "Management server definitions (DCs, jumpbox/utility, WAC, syslog). Deployment-location agnostic — Azure IaaS, Azure Local VM, or on-premises."

      # DOMAIN CONTROLLERS
      # ---------------------------------------------------------------------------
      dc1:
        # --- Common (required regardless of deployment location) ---
        dc1_hostname:
          category: "compute"
          subcategory: "domain-controller"
          type: string
          description: "DC1 hostname (NetBIOS computer name, max 15 chars)"
          required: true
          maxLength: 15
          example: "DC01"

        dc1_ip:
          type: string
          description: "DC1 IP address"
          required: true
          format: ipv4
          example: "10.100.1.36"

        dc1_fqdn:
          type: string
          description: "DC1 fully qualified domain name"
          required: false
          example: "dc01.corp.local"

        dc1_deployment_target:
          type: string
          description: "Where DC1 is deployed"
          required: true
          enum: [azure, azurelocal, onprem]
          example: "azure"

        # --- Azure IaaS (when deployment_target: azure) ---
        azure_vm_dc1_vm_name:
          category: "compute"
          subcategory: "domain-controller"
          type: string
          description: "DC1 Azure VM resource name (azure deployment only)"
          required: false
          example: "vm-azlc-AzureLocalCloud-eus-dc01"

        azure_vm_dc1_vm_size:
          type: string
          description: "DC1 Azure VM size"
          required: false
          example: "Standard_D2s_v3"

        azure_vm_dc1_image_publisher:
          type: string
          description: "DC1 image publisher"
          required: false
          default: "MicrosoftWindowsServer"

        azure_vm_dc1_image_offer:
          type: string
          description: "DC1 image offer"
          required: false
          default: "WindowsServer"

        azure_vm_dc1_image_sku:
          type: string
          description: "DC1 image SKU"
          required: false
          default: "2025-datacenter-azure-edition"

        azure_vm_dc1_image_version:
          type: string
          description: "DC1 image version"
          required: false
          default: "latest"

        azure_vm_dc1_subnet:
          type: string
          description: "DC1 Azure subnet name"
          required: false
          example: "snet-azlc-AzureLocalCloud-eus-identity"

        azure_vm_dc1_os_disk_size_gb:
          type: integer
          description: "DC1 OS disk size (GB)"
          required: false
          default: 128

        azure_vm_dc1_os_disk_type:
          type: string
          description: "DC1 OS disk type"
          required: false
          default: "Premium_LRS"

        azure_vm_dc1_data_disks:
          type: array
          description: "DC1 data disks"
          required: false
          items:
            name: string
            size_gb: integer
            type: string
          example:
          - name: "disk-dc01-data-01"
            size_gb: 256
            type: "Premium_LRS"

        # --- Azure Local VM (when deployment_target: azurelocal) ---
        azurelocal_vm_dc1_vm_name:
          type: string
          description: "DC1 Azure Local VM resource name (azurelocal deployment only)"
          required: false
          example: "dc01"

        azurelocal_vm_dc1_cluster_name:
          type: string
          description: "Azure Local cluster hosting DC1"
          required: false
          example: "azl-corp-clus01"

      dc2:
        # --- Common ---
        dc2_hostname:
          type: string
          description: "DC2 hostname (NetBIOS computer name, max 15 chars)"
          required: true
          maxLength: 15
          example: "DC02"

        dc2_ip:
          type: string
          description: "DC2 IP address"
          required: true
          format: ipv4
          example: "10.100.1.37"

        dc2_fqdn:
          type: string
          description: "DC2 fully qualified domain name"
          required: false
          example: "dc02.corp.local"

        dc2_deployment_target:
          type: string
          description: "Where DC2 is deployed"
          required: true
          enum: [azure, azurelocal, onprem]
          example: "azure"

        # --- Azure IaaS (when deployment_target: azure) ---
        azure_vm_dc2_vm_name:
          type: string
          description: "DC2 Azure VM resource name (azure deployment only)"
          required: false
          example: "vm-azlc-AzureLocalCloud-eus-dc02"

        azure_vm_dc2_vm_size:
          type: string
          description: "DC2 Azure VM size"
          required: false
          example: "Standard_D2s_v3"

        azure_vm_dc2_image_publisher:
          type: string
          description: "DC2 image publisher"
          required: false
          default: "MicrosoftWindowsServer"

        azure_vm_dc2_image_offer:
          type: string
          description: "DC2 image offer"
          required: false
          default: "WindowsServer"

        azure_vm_dc2_image_sku:
          type: string
