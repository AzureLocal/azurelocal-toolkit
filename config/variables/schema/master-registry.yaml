          default: "22_04-lts-gen2"

        azure_vm_syslog_image_version:
          type: string
          description: "Syslog image version"
          required: false
          default: "latest"

        azure_vm_syslog_subnet:
          type: string
          description: "Syslog Azure subnet name"
          required: false
          example: "snet-azlc-AzureLocalCloud-eus-management"

        azure_vm_syslog_os_disk_size_gb:
          type: integer
          description: "Syslog OS disk size (GB)"
          required: false
          default: 64

        azure_vm_syslog_os_disk_type:
          type: string
          description: "Syslog OS disk type"
          required: false
          default: "StandardSSD_LRS"

        azure_vm_syslog_data_disks:
          type: array
          description: "Syslog data disks for log storage"
          required: false
          items:
            name: string
            size_gb: integer
            type: string
          example:
          - name: "disk-syslog-logs-01"
            size_gb: 512
            type: "StandardSSD_LRS"

        # --- Azure Local VM (when deployment_target: azurelocal) ---
        azurelocal_vm_syslog_vm_name:
          type: string
          description: "Syslog Azure Local VM resource name (azurelocal deployment only)"
          required: false
          example: "syslog"

        azurelocal_vm_syslog_cluster_name:
          type: string
          description: "Azure Local cluster hosting the syslog server"
          required: false
          example: "azl-corp-clus01"

      # SHARED AZURE IAAS VM SETTINGS
      # Applies only when deployment_target: azure. Ignored for azurelocal or onprem.
      # ---------------------------------------------------------------------------
      vm_shared:
        azure_vm_resource_group:
          type: string
          description: "Azure VMs resource group"
          required: true
          example: "rg-azlc-AzureLocalCloud-eus-management-compute"
    
        azure_vm_location:
          type: string
          description: "Azure VMs location"
          required: true
          default: "East US"
    
        azure_vm_availability_zones:
          type: array
          description: "Availability zones for VM deployment (regional HA)"
          required: false
          items:
            type: string
          example: ["1", "2", "3"]
    
        azure_vm_accelerated_networking:
          type: boolean
          description: "Enable accelerated networking (SR-IOV) for all VMs"
          required: false
          default: true
    
        azure_vm_license_type:
          type: string
          description: "Azure Hybrid Benefit license type"
          required: false
          options:
            - "Windows_Server"
            - "Windows_Client"
            - "RHEL_BYOS"
            - "SLES_BYOS"
            - "None"
          default: "None"
    
        azure_vm_security_type:
          type: string
          description: "VM security type (Gen2 VMs)"
          required: false
          options:
            - "TrustedLaunch"
            - "ConfidentialVM"
            - "Standard"
          default: "TrustedLaunch"
    
        azure_vm_secure_boot_enabled:
          type: boolean
          description: "Enable secure boot (Trusted Launch/Confidential VMs)"
          required: false
          default: true
    
        azure_vm_vtpm_enabled:
          type: boolean
          description: "Enable vTPM (Trusted Launch/Confidential VMs)"
          required: false
          default: true
    
        azure_vm_os_disk_caching:
          type: string
          description: "Default OS disk caching mode"
          required: false
          options:
            - "ReadWrite"
            - "ReadOnly"
            - "None"
          default: "ReadWrite"
    
        azure_vm_boot_diagnostics_enabled:
          type: boolean
          description: "Enable boot diagnostics for all VMs"
          required: false
          default: true
    
        azure_vm_managed_identity_enabled:
          type: boolean
          description: "Enable system-assigned managed identity for all VMs"
          required: false
          default: true
    
        azure_vm_tags:
          type: object
          description: "Default tags applied to all VMs"
          required: false
          example:
            Environment: "Production"
            ManagedBy: "Terraform"
            CostCenter: "IT-Infrastructure"
            Workload: "Infrastructure"
    # ─── arc_hybrid (placeholder for Arc-enabled hybrid VM onboarding) ───
    arc_hybrid:
      infrastructure_type: ["azure_local"]
      _meta:
        solutions: ["azure-local"]
        tier: optional
        description: "Arc-enabled hybrid VM onboarding (reserved for future use)"
  clusters:

    # ===========================================================================
    # AZURE LOCAL CLUSTER
    # ===========================================================================
    # Azure Local (formerly Azure Stack HCI) is Microsoft's hyper-converged
    # infrastructure solution that extends Azure services to on-premises
    # environments. Supports 1-16 node clusters with Storage Spaces Direct.

    azure_local:
      infrastructure_type: ["azure_local"]
      _meta:
        solutions: ["azure-local", "avd-azure-local", "sofs-azure-local"]
        tier: required
        description: "Azure Local (HCI) cluster configuration"
      # CLUSTER IDENTIFICATION
      # -------------------------------------------------------------------------
      azl_name:
        type: string
        description: "Azure Local cluster name (NetBIOS name, max 15 characters)"
        required: true
        maxLength: 15
        pattern: "^[a-zA-Z][a-zA-Z0-9-]*$"
        example: "azlc-clus01"

      azl_resource_group:
        type: string
        description: "Cluster resource group (function-based naming)"
        required: true
        pattern: "^rg-[a-z0-9]+-(AzureLocalCloud|demo|poc|lab)-[a-z0-9]+-(landingzone|management)-cluster$"
        example: "rg-azlc-AzureLocalCloud-eus-landingzone-cluster"

      azl_subscription:
        type: string
        description: "Azure subscription ID for cluster resources"
        required: true
        format: uuid
        example: "00000000-1111-2222-3333-444444444444"

      azl_location:
        type: string
        description: "Azure region for cluster registration"
        required: true
        allowedValues:
        - "East US"
        - "West Europe"
        - "Australia East"
        - "Southeast Asia"
        - "India Central"
        - "Canada Central"
        - "Japan East"
        - "South Central US"
        example: "East US"

      azl_rack:
        type: string
        description: "Physical rack location identifier"
        required: false
        example: "RAL-R001"

      azl_environment:
        type: string
        description: "Deployment environment type"
        required: false
        allowedValues:
        - production
        - development
        - testing
        - staging
        default: "production"

      azl_custom_location_name:
        category: "azure-local"
        subcategory: "cluster-config"
        type: string
        description: "Custom location name for Arc resource bridge"
        required: false
        example: "azlc-custom-location"

      # CLUSTER SIZE AND CONFIGURATION
      # ---------------------------------------------------------------------------
      azl_node_count:
        category: "azure-local"
        subcategory: "cluster-size"
        type: integer
        description: "Number of nodes in the cluster (Microsoft sweet spot: 6 nodes)"
        required: true
        minimum: 1
        maximum: 16
        example: 6

      # STORAGE TOPOLOGY (Switchless vs Switched)
      # ---------------------------------------------------------------------------
      azl_storage_topology:
        category: "azure-local"
        subcategory: "storage-topology"
        type: string
        description: "Storage network topology (switchless: 1-4 nodes only, switched: 4-16 nodes, scale-out requires switched)"
        required: true
        allowedValues:
        - switchless
        - switched
        example: "switched"

      azl_storage_switchless_node_limit:
        type: integer
        description: "Maximum nodes for switchless storage (read-only reference)"
        required: false
        minimum: 1
        maximum: 4
        default: 4

      azl_storage_rdma_enabled:
        type: boolean
        description: "Enable RDMA for storage traffic (requires 10Gbps+ adapters)"
        required: false
        default: true

      azl_storage_rdma_technology:
        type: string
        description: "RDMA technology for storage"
        required: false
        allowedValues:
        - RoCEv2
        - iWARP
        default: "RoCEv2"

      # CLUSTER IP & DEPLOYMENT SETTINGS
      # ---------------------------------------------------------------------------
      azl_cluster_ip:
        type: string
        description: "Cluster management IP address"
        required: false
        format: ipv4
        example: "10.100.1.100"

      azl_deployment_mode:
        type: string
        description: "Deployment mode (Deploy runs full deployment, Validate only validates)"
        required: false
        allowedValues:
        - Deploy
        - Validate
        default: "Deploy"

      azl_network_topology:
        type: string
        description: "Network topology for cluster (switchless: 1-4 nodes, switched: up to 16)"
        required: false
        allowedValues:
        - switchless
        - switched
        example: "switched"

      azl_witness_type:
        type: string
        description: "Cluster witness quorum type"
        required: false
        allowedValues:
        - cloud_witness
        - file_share_witness
        default: "cloud_witness"

      # IDENTITY PROVIDER (Active Directory vs Local Identity with Key Vault)
      # ---------------------------------------------------------------------------
      azl_identity_provider:
        type: string
        description: "Identity provider (active_directory: use active_directory section, local_identity: use per-cluster Key Vault)"
        required: true
        allowedValues:
        - active_directory
        - local_identity
        example: "active_directory"

      # NOTE: For active_directory provider, use variables from active_directory: section (ad_domain_fqdn, ad_ou_path)

      # Local Identity with Key Vault Settings
      azl_local_identity_key_vault_name:
        category: "security"
        subcategory: "keyvault"
        type: string
        description: "Key Vault name for local identity secrets (required for local_identity provider, one per cluster)"
        required: false
        depends_on:
        - variable: "azl_identity_provider"
          condition: "equals: local_identity"
          message: "Key Vault name required when using local_identity provider"
        minLength: 3
        maxLength: 24
        pattern: "^[a-z][a-z0-9]+(-[a-z0-9]+)*$"
        note: "No consecutive hyphens allowed"
        example: "kv-azlc-cluster01"

      azl_local_identity_key_vault_resource_group:
        type: string
        description: "Resource group for Key Vault (function-based naming: identity or management function)"
        required: false
        depends_on:
        - variable: "azl_identity_provider"
          condition: "equals: local_identity"
          message: "Key Vault resource group required when using local_identity provider"
        pattern: "^rg-[a-z0-9]+-(AzureLocalCloud|demo|poc|lab)-[a-z0-9]+-(identity|management)-keyvault$"
        example: "rg-azlc-AzureLocalCloud-eus-identity-keyvault"

      azl_local_identity_recovery_admin_username:
        type: string
        description: "Recovery admin username for local identity deployments (password stored in Key Vault)"
        required: false
        depends_on:
        - variable: "azl_identity_provider"
          condition: "equals: local_identity"
          message: "Recovery admin username only applies to local_identity provider"
        default: "RecoveryAdmin"

      azl_local_identity_zone_name:
        type: string
        description: "DNS zone name for local identity deployment (must be resolvable internally or externally)"
        required: false
        depends_on:
        - variable: "azl_identity_provider"
          condition: "equals: local_identity"
          message: "DNS zone name required when using local_identity provider"
        example: "azlocal.cloud"

      # NOTE: For network intents, use network_intents: array section (line 5578)

      # CLUSTER WITNESS (Quorum Configuration)
      # ─── Witness type and resource variables are SHARED across Azure Local, WSFC, and Hyper-V ───
      # ─── See: cluster_witness: section (shared, below cluster_nodes) ─────────────────────────
      # ─── Variables: cluster_witness_type, cluster_witness_file_share_path,                  ───
      # ───            cluster_witness_disk_resource                                            ───
      # ─── Storage account: storage_accounts.storage_accounts.cluster_witness.*               ───

      # AZURE ARC AND CONNECTIVITY
      # ---------------------------------------------------------------------------
      azl_arc_gateway_enabled:
        type: boolean
        description: "Use Arc gateway for proxy/restricted environments"
        required: false
        default: false

      azl_arc_gateway_name:
        category: "azure-local"
        subcategory: "arc-gateway"
        type: string
        description: "Arc gateway name (if using Arc gateway)"
        required: false
        depends_on:
        - variable: "azl_arc_gateway_enabled"
          condition: "equals: true"
          message: "Arc gateway name required when Arc gateway is enabled"
        example: "azlc-arc-gateway"

      azl_arc_gateway_resource_group:
        type: string
        description: "Arc gateway resource group (function-based naming: connectivity function)"
        required: false
        depends_on:
        - variable: "azl_arc_gateway_enabled"
          condition: "equals: true"
          message: "Arc gateway resource group required when Arc gateway is enabled"
        pattern: "^rg-[a-z0-9]+-(AzureLocalCloud|demo|poc|lab)-[a-z0-9]+-(connectivity|management)-arcgw$"
        example: "rg-azlc-AzureLocalCloud-eus-connectivity-arcgw"

      azl_arc_gateway_id:
        type: string
        description: "Arc gateway resource ID (required when azl_arc_gateway_enabled is true)"
        required: false
        depends_on:
        - variable: "azl_arc_gateway_enabled"
          condition: "equals: true"
          message: "Arc gateway resource ID required when Arc gateway is enabled"
        format: azure_resource_id
        example: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-AzureLocalCloud-eus-connectivity-arcgw/providers/Microsoft.HybridCompute/gateways/azlc-arc-gateway"

      # STORAGE SPACES DIRECT PHYSICAL DRIVES
      # ---------------------------------------------------------------------------
      # Physical storage configuration for Storage Spaces Direct (S2D).
      # Azure storage accounts for witness and diagnostics are in the storage: section.

      # Cache Tier Configuration
      azl_cache_drive_type:
        type: string
        description: "Physical cache drive type for Storage Spaces Direct"
        required: false
        allowedValues:
        - SSD
        - NVMe
        example: "SSD"

      azl_cache_drives_count:
        type: integer
        description: "Number of cache drives per node"
        required: false
        minimum: 1
        maximum: 16
        example: 2

      azl_cache_drives_size_gb:
        type: integer
        description: "Size of each cache drive in GB"
        required: false
        minimum: 128
        maximum: 8192
        example: 960

      # Capacity Tier Configuration
      azl_capacity_drive_type:
        type: string
        description: "Physical capacity drive type for Storage Spaces Direct"
        required: false
        allowedValues:
        - HDD
        - SSD
        - NVMe
        example: "HDD"

      azl_capacity_drives_count:
        type: integer
        description: "Number of capacity drives per node"
        required: false
        minimum: 4
        maximum: 64
        example: 8

      azl_capacity_drives_size_gb:
        type: integer
        description: "Size of each capacity drive in GB"
        required: false
        minimum: 1000
        maximum: 16384
        example: 4000

      # VM VIRTUAL SWITCH (Logical Network binding)
      # ---------------------------------------------------------------------------
      vm_switch_name:
        type: string
        description: "Hyper-V vSwitch name used when creating logical networks. Auto-discovered from the first cluster node via Get-VMSwitch if empty or not set."
        required: false
        default: ""
        example: "ConvergedSwitch(hci)"

      # ===========================================================================
      # WINDOWS SERVER FAILOVER CLUSTER (WSFC)
      # ===========================================================================
      # Windows Server Failover Clustering for non-Azure Local deployments.
      # Supports multiple storage architectures and Windows Server versions.
      #
      # STORAGE ARCHITECTURE OPTIONS:
      #   - S2D (Storage Spaces Direct): Hyper-converged storage using local drives
      #   - SAN: Traditional shared storage (iSCSI, Fibre Channel, FCoE)
      #   - Hybrid: Mix of local and shared storage
      #
      # SUPPORTED OS VERSIONS:
      #   - Windows Server 2019 (Build 17763)
      #   - Windows Server 2022 (Build 20348)
      #   - Windows Server 2025 (Build 26100)
      #
      # RELATED SECTIONS:
      #   - cluster_nodes: (line 5218+) - Physical node configurations
      #   - vlans: (line 3480+) - VLAN definitions for cluster networking
      #   - storage: (line 7800+) - Azure storage accounts for witness/diagnostics
      #   - failover_cluster: (line 8656+) - Legacy failover cluster variables

    wsfc:
      infrastructure_type: ["sofs_azure_local"]
      _meta:
        solutions: ["sofs-azure-local"]
        tier: required
        description: "Windows Server Failover Cluster (S2D or SAN) configuration"
      # -------------------------------------------------------------------------
      # CLUSTER IDENTIFICATION
      # -------------------------------------------------------------------------
      wsfc_cluster_name:
        type: string
        description: "Windows Server Failover Cluster name (NetBIOS name, 15 chars max)"
        required: true
        minLength: 1
        maxLength: 15
        pattern: "^[a-zA-Z0-9-]+$"
        example: "WSFC-CLUS01"

      wsfc_cluster_ip:
        type: string
        description: "Cluster IP address (static IP for cluster name object)"
        required: true
        format: ipv4
        example: "192.168.211.50"

      wsfc_domain_fqdn:
        type: string
        description: "Active Directory domain FQDN for cluster"
        required: true
        format: fqdn
        example: "corp.contoso.com"

      wsfc_ou_path:
        type: string
        description: "Active Directory OU path for cluster objects"
        required: false
        format: ldap_dn
        example: "OU=Clusters,OU=Servers,DC=corp,DC=contoso,DC=com"

      wsfc_description:
        type: string
        description: "Cluster description for documentation"
        required: false
        maxLength: 256
        example: "Production Hyper-V Failover Cluster"

      wsfc_environment:
        type: string
        description: "Environment type (production, staging, development, test)"
        required: false
        allowedValues:
        - production
        - staging
        - development
        - test
        default: "production"

      # ---------------------------------------------------------------------------
      # OPERATING SYSTEM VERSION
      # ---------------------------------------------------------------------------
      wsfc_os_version:
        type: string
        description: "Windows Server version for cluster nodes"
        required: true
        allowedValues:
        - Server2019
        - Server2022
        - Server2025
        example: "Server2022"
        references:
        - url: "https://learn.microsoft.com/windows-server/get-started/editions-comparison"

      wsfc_os_build:
        type: string
        description: "Specific OS build number (optional, for tracking updates)"
        required: false
        pattern: "^[0-9]+\\.[0-9]+$"
        example: "20348.2227"

      wsfc_os_edition:
        type: string
        description: "Windows Server edition (Datacenter required for S2D)"
        required: true
        allowedValues:
        - Datacenter
        - Standard
        default: "Datacenter"
        note: "Datacenter edition required for Storage Spaces Direct and unlimited VMs"

      wsfc_os_installation_type:
        type: string
        description: "Installation type (ServerCore recommended for production)"
        required: false
        allowedValues:
        - ServerCore
        - DesktopExperience
        default: "ServerCore"

      wsfc_cluster_functional_level:
        type: integer
        description: "Cluster functional level (matches OS version: 2019=10, 2022=11, 2025=12)"
        required: false
        minimum: 10
        maximum: 12
        example: 11

      # ---------------------------------------------------------------------------
      # STORAGE ARCHITECTURE
      # ---------------------------------------------------------------------------
      wsfc_storage_type:
        type: string
        description: "Storage architecture type for cluster"
        required: true
        allowedValues:
        - s2d
        - san
        - hybrid
        example: "s2d"
      wsfc_network_priority:
        type: array
        description: "Network priority order for cluster communications (1=highest)"
        required: false
        items:
          type: string
        example:
          - "Management-Compute"
          - "Storage-1"

      wsfc_csv_network:
        type: string
        description: "Preferred network for CSV traffic"
        required: false
        example: "Storage-1"

      wsfc_network_encryption:
        type: boolean
        description: "Enable cluster network encryption (Windows Server 2022+)"
        required: false
        default: false

      # ---------------------------------------------------------------------------
      # CLUSTER SHARED VOLUMES (CSV)
      # ---------------------------------------------------------------------------
      wsfc_csv_enabled:
        type: boolean
        description: "Enable Cluster Shared Volumes"
        required: false
        default: true

      wsfc_csv_cache_enabled:
        type: boolean
        description: "Enable CSV in-memory read cache"
        required: false
        depends_on:
        - variable: "wsfc_csv_enabled"
          value: true
        default: false

      wsfc_csv_cache_size_mb:
        type: integer
        description: "CSV cache size in MB (512-8192)"
        required: false
        depends_on:
        - variable: "wsfc_csv_cache_enabled"
          value: true
        minimum: 512
        maximum: 8192
        default: 1024

      wsfc_csv_block_cache:
        type: boolean
        description: "Enable CSV block cache for ReFS volumes (Windows Server 2016+)"
        required: false
        depends_on:
          - variable: "wsfc_csv_enabled"
            value: true
        default: true

      wsfc_csv_volumes:
        type: array
        description: "Array of CSV volume configurations"
        required: false
        depends_on:
          - variable: "wsfc_csv_enabled"
            value: true
        items:
          type: object
          properties:
            volume_name:
              type: string
              description: "CSV volume name"
            size_gb:
              type: integer
              description: "Volume size in GB"
            filesystem:
              type: string
              description: "Filesystem (ReFS or NTFS)"
            resiliency:
              type: string
              description: "S2D resiliency type (Mirror, Parity)"
          example:
            - volume_name: "CSV01"
              size_gb: 2000
              filesystem: "ReFS"
              resiliency: "Mirror"

      # ---------------------------------------------------------------------------
      # QUORUM CONFIGURATION
      # ---------------------------------------------------------------------------
      wsfc_quorum_type:
        type: string
        description: "Cluster quorum configuration type"
        required: true
        allowedValues:
        - node_majority
        - node_and_disk_majority
        - node_and_file_share_majority
        - cloud_witness
        default: "cloud_witness"

      # Disk Witness / File Share Witness / Cloud Witness
      # ─── Witness resource variables are SHARED across Azure Local, WSFC, and Hyper-V ───────────
      # ─── See: cluster_witness: section (shared, below cluster_nodes) ─────────────────────────
      # ─── Variables: cluster_witness_type, cluster_witness_disk_resource,                    ───
      # ───            cluster_witness_file_share_path                                          ───
      # ─── Storage account: storage_accounts.storage_accounts.cluster_witness.*               ───
      # ─── wsfc_quorum_cloud_witness_key / wsfc_quorum_cloud_witness_endpoint remain here     ───
      # ─── because they are WSFC-specific Key Vault ref and endpoint override.                ───

      # Cloud Witness (Azure Storage Account)
      # Storage account defined ONCE under storage_accounts.storage_accounts.cluster_witness.*
      # Works for Azure Local, WSFC (S2D/SAN), and Hyper-V clusters.
      # Scripts read: storage_accounts.storage_accounts.cluster_witness.name

      wsfc_quorum_cloud_witness_key:
        type: string
        description: "Azure Storage Account access key (sensitive)"
        required: false
        depends_on:
        - variable: "wsfc_quorum_type"
          value: "cloud_witness"
        sensitive: true
        pattern: "^keyvault://[a-z0-9-]+/.+$"
        example: "keyvault://kv-wsfc-mgmt/cloud-witness-key"

      wsfc_quorum_cloud_witness_endpoint:
        type: string
        description: "Azure Storage endpoint (for Azure Government or China clouds)"
        required: false
        depends_on:
        - variable: "wsfc_quorum_type"
          value: "cloud_witness"
        format: url
        default: "core.windows.net"
        example: "core.usgovcloudapi.net"
      _meta_sofs:
        solutions: ["sofs-azure-local"]
        tier: required
        description: "Scale-Out File Server on Azure Local for FSLogix profile storage"

      wsfc_sofs_role_enabled:
        type: boolean
        description: "Enable Scale-Out File Server (SOFS) role"
        required: true
        default: false

      wsfc_sofs_name:
        type: string
        description: "SOFS cluster role name (client access point — NetBIOS name used by SMB clients)"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        maxLength: 15
        pattern: "^[a-zA-Z0-9-]+$"
        example: "FSLogixSOFS"

      wsfc_sofs_ip:
        type: string
        description: "SOFS cluster role IP address (free IP on compute network)"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        format: ipv4
        example: "192.168.211.60"

      wsfc_sofs_vm_ips:
        type: map
        description: "Per-VM static IP addresses keyed by zero-padded node index (e.g., '01', '02', '03'). Must be free IPs within the assigned logical network subnet."
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        keyType: string
        valueType: string
        valueFormat: ipv4
        example:
          "01": "192.168.220.201"
          "02": "192.168.220.202"
          "03": "192.168.220.203"

      wsfc_sofs_dns_servers:
        type: list
        description: "DNS server IP addresses for the SOFS guest cluster VMs (typically inherited from logical network but must be explicitly set for in-guest WSFC/AD configuration)"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        itemType: string
        itemFormat: ipv4
        minItems: 1
        maxItems: 3
        example:
          - "10.250.1.36"
          - "10.250.1.37"

      # --- SOFS VM CONFIGURATION ---
      wsfc_sofs_vm_count:
        type: integer
        description: "Number of SOFS guest cluster VMs (minimum 3 for S2D two-way mirror)"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        minimum: 3
        maximum: 16
        default: 3
        example: 3

      wsfc_sofs_vm_prefix:
        type: string
        description: "VM naming prefix — VMs named {prefix}-01, {prefix}-02, etc."
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        maxLength: 11
        pattern: "^[a-zA-Z0-9-]+$"
        example: "SOFS"

      wsfc_sofs_vm_processors:
        type: integer
        description: "Number of vCPUs per SOFS VM"
        required: false
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        minimum: 2
        maximum: 64
        default: 4
        example: 4

      wsfc_sofs_vm_memory_mb:
        type: integer
        description: "Memory in MB per SOFS VM"
        required: false
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        minimum: 4096
        maximum: 524288
        default: 8192
        example: 8192

      wsfc_sofs_vm_admin_username:
        type: string
        description: "Local administrator username for SOFS VMs"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        example: "LocalAdmin"

      wsfc_sofs_vm_admin_password:
        type: string
        description: "Local administrator password for SOFS VMs (Key Vault URI)"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        format: keyvault_uri
        sensitive: true
        example: "keyvault://kv-platform/sofs-vm-admin-password"

      # --- SOFS DATA DISKS ---
      wsfc_sofs_data_disk_count:
        type: integer
        description: "Number of data disks per SOFS VM (total S2D pool = vm_count × disk_count × disk_size)"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        minimum: 1
        maximum: 64
        default: 4
        example: 4

      wsfc_sofs_data_disk_size_gb:
        type: integer
        description: "Size of each data disk in GB (dynamic provisioning — grows as data is written)"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        minimum: 64
        maximum: 32767
        default: 1024
        example: 1024

      # --- SOFS AZURE LOCAL RESOURCE IDS ---
      wsfc_sofs_subscription_id:
        type: string
        description: "Azure subscription ID for SOFS resources"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        format: uuid
        example: "00000000-0000-0000-0000-000000000000"

      wsfc_sofs_resource_group:
        type: string
        description: "Azure resource group for SOFS VMs, NICs, and disks"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        pattern: "^[a-zA-Z0-9._-]+$"
        example: "rg-sofs-azl-eus-01"

      wsfc_sofs_location:
        type: string
        description: "Azure region for SOFS resources (must match Azure Local cluster region)"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        example: "eastus"

      wsfc_sofs_custom_location_id:
        type: string
        description: "Full ARM resource ID of the Azure Local custom location"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        format: arm_resource_id
        example: "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/rg-azl/providers/Microsoft.ExtendedLocation/customLocations/azl-cl"

      wsfc_sofs_logical_network_id:
        type: string
        description: "Full ARM resource ID of the Azure Local logical network for SOFS VMs (compute network)"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        format: arm_resource_id
        example: "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/rg-azl/providers/Microsoft.AzureStackHCI/logicalNetworks/compute-lnet"

      wsfc_sofs_gallery_image_name:
        type: string
        description: "Gallery image name for Windows Server 2025 Datacenter registered on Azure Local (Datacenter required for S2D)"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        example: "ws2025-datacenter"

      wsfc_sofs_storage_path_id:
        type: string
        description: "Default ARM resource ID of the Azure Local storage path for SOFS VM/disk placement (used when wsfc_sofs_storage_path_ids map is absent)"
        required: false
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        format: arm_resource_id
        example: "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/rg-azl/providers/Microsoft.AzureStackHCI/storageContainers/sofs-storagepath"

      wsfc_sofs_storage_path_ids:
        type: map
        description: "Per-VM storage path map — keys are zero-padded VM indices (01, 02, …), values are ARM resource IDs. Spreads I/O across CSV volumes. Falls back to wsfc_sofs_storage_path_id if absent."
        required: false
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        value_format: arm_resource_id
        example:
          "01": "/subscriptions/00000000/resourceGroups/rg-azl/providers/Microsoft.AzureStackHCI/storageContainers/sp-vmstore-prd-01"
          "02": "/subscriptions/00000000/resourceGroups/rg-azl/providers/Microsoft.AzureStackHCI/storageContainers/sp-vmstore-prd-02"
          "03": "/subscriptions/00000000/resourceGroups/rg-azl/providers/Microsoft.AzureStackHCI/storageContainers/sp-vmstore-prd-03"

      # --- SOFS SHARE AND S2D VOLUME ---
      wsfc_sofs_share_name:
        type: string
        description: "SMB share name on the SOFS role (e.g., FSLogix)"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        maxLength: 80
        pattern: "^[a-zA-Z0-9_-]+$"
        example: "FSLogix"

      wsfc_sofs_s2d_volume_name:
        type: string
        description: "S2D volume friendly name for FSLogix data"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        maxLength: 64
        example: "FSLogixData"

      wsfc_sofs_s2d_volume_size_gb:
        type: integer
        description: "S2D volume size in GB (usable space — two-way mirror doubles raw consumption)"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        minimum: 100
        maximum: 65536
        default: 5632
        example: 5632

      wsfc_sofs_s2d_data_copies:
        type: integer
        description: "S2D mirror data copies (2 = two-way mirror, 3 = three-way mirror)"
        required: false
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        minimum: 2
        maximum: 3
        default: 2
        example: 2

      # --- SOFS CLUSTER CONFIGURATION ---
      wsfc_sofs_anti_affinity_rule_name:
        type: string
        description: "Anti-affinity rule name ensuring SOFS VMs run on separate Azure Local physical nodes"
        required: false
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        default: "SOFS-AntiAffinity"
        example: "SOFS-AntiAffinity"

      wsfc_sofs_azl_cluster_name:
        type: string
        description: "Azure Local cluster resource name — used for anti-affinity rule creation via Azure CLI"
        required: false
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        default: "AzLocalCluster"
        example: "azl-lab-clus01"

      wsfc_sofs_cloud_witness_name:
        type: string
        description: "Azure Storage Account name for cloud witness quorum"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        maxLength: 24
        pattern: "^[a-z0-9]+$"
        example: "sofscloudwitness"

      wsfc_sofs_cloud_witness_key_uri:
        type: string
        description: "Key Vault URI (keyvault://vault/secret) for the cloud witness storage account access key. If empty, script falls back to Azure CLI to retrieve key."
        required: false
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        format: keyvault_uri
        example: "keyvault://kv-platform/sofs-witness-storage-key"

      wsfc_sofs_cloud_witness_kv_name:
        type: string
        description: "Key Vault name containing the cloud witness storage account key secret (used when key_uri is not set)"
        required: false
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        example: "kv-platform"

      wsfc_sofs_cloud_witness_key_secret:
        type: string
        description: "Secret name in Key Vault for the cloud witness storage account key (used with cloud_witness_kv_name)"
        required: false
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        example: "sofs-witness-storage-key"

      wsfc_sofs_domain_fqdn:
        type: string
        description: "Active Directory domain FQDN for SOFS guest cluster and share permissions"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        format: fqdn
        example: "contoso.local"

      wsfc_sofs_domain_netbios:
        type: string
        description: "NetBIOS domain name for NTFS and SMB share ACLs"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        maxLength: 15
        pattern: "^[A-Z0-9]+$"
        example: "IMPROBABLE"

      wsfc_sofs_cluster_ou_path:
        type: string
        description: "Active Directory OU path for the WSFC Cluster Name Object (CNO) — the guest failover cluster computer account"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        format: distinguished_name
        example: "OU=SOFS-Cluster,OU=SOFS,OU=Clusters,OU=Servers,OU=MGMT,DC=iic,DC=local"

      wsfc_sofs_nodes_ou_path:
        type: string
        description: "Active Directory OU path for SOFS node computer accounts (domain join target)"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        format: distinguished_name
        example: "OU=SOFS-Cluster,OU=SOFS,OU=Clusters,OU=Servers,OU=MGMT,DC=iic,DC=local"

      wsfc_sofs_domain_join_username:
        type: string
        description: "Domain user account for joining SOFS VMs to Active Directory (used by JsonADDomainExtension)"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        example: "svc.domainjoin"

      wsfc_sofs_domain_join_password:
        type: string
        description: "Key Vault URI for the domain join account password"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        format: keyvault_uri
        example: "keyvault://kv-platform/domain-join-password"

      # ---------------------------------------------------------------------------
      # SOFS DEPLOYMENT ENGINE (Phase 2 Guest Config)
      # ---------------------------------------------------------------------------


      wsfc_sofs_domain_join_account:
        type: string
        description: "Service account for domain join operations (UPN or DOMAIN\\user format)"
        required: true
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        example: "svc.azl.local"

      wsfc_sofs_domain_ou_cluster:
        type: string
        description: "Active Directory OU path for SOFS cluster computer objects"
        required: false
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        format: ldap_dn
        example: "OU=SOFS-Cluster,OU=Clusters,DC=corp,DC=contoso,DC=com"

      wsfc_sofs_domain_ou_nodes:
        type: string
        description: "Active Directory OU path for SOFS cluster node computer objects"
        required: false
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        format: ldap_dn
        example: "OU=SOFS-Nodes,OU=Clusters,DC=corp,DC=contoso,DC=com"

      wsfc_sofs_guest_config_engine:
        type: string
        description: "Phase 2 guest OS config engine: powershell (PSRemoting), ansible_create (new Linux controller VM), ansible_existing (reuse existing controller)"
        required: false
        depends_on:
        - variable: "wsfc_sofs_role_enabled"
          value: true
        default: "powershell"
        enum: ["powershell", "ansible_create", "ansible_existing"]
        example: "powershell"

      wsfc_sofs_ansible_controller_name:
        type: string
        description: "Name of the Ansible controller VM (only for ansible_create)"
        required: false
        depends_on:
        - variable: "wsfc_sofs_guest_config_engine"
          value: "ansible_create"
        default: "vm-ansible-sofs-eus-01"
        example: "vm-ansible-sofs-eus-01"

      wsfc_sofs_ansible_controller_size:
        type: string
        description: "Azure VM size for the Ansible controller VM"
        required: false
        depends_on:
        - variable: "wsfc_sofs_guest_config_engine"
          value: "ansible_create"
        default: "Standard_B2s"
        example: "Standard_B2s"

      wsfc_sofs_ansible_controller_admin_username:
        type: string
        description: "Linux admin username for the Ansible controller VM"
        required: false
        depends_on:
        - variable: "wsfc_sofs_guest_config_engine"
          value: "ansible_create"
        default: "ansibleadmin"
        example: "ansibleadmin"

      wsfc_sofs_ansible_controller_hub_subnet_id:
        type: string
        description: "Full ARM resource ID of the hub subnet for the Ansible controller VM"
        required: false
        depends_on:
        - variable: "wsfc_sofs_guest_config_engine"
          value: "ansible_create"
        format: arm_resource_id
        example: "/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/rg-hub/providers/Microsoft.Network/virtualNetworks/vnet-hub/subnets/snet-mgmt"

      wsfc_sofs_ansible_controller_hub_rg:
        type: string
        description: "Resource group containing the hub VNet for the Ansible controller VM"
        required: false
        depends_on:
        - variable: "wsfc_sofs_guest_config_engine"
          value: "ansible_create"
        example: "rg-hub-eus-01"

      wsfc_sofs_ansible_existing_controller_ip:
        type: string
        description: "Private IP of an existing Ansible controller VM (only for ansible_existing)"
        required: false
        depends_on:
        - variable: "wsfc_sofs_guest_config_engine"
          value: "ansible_existing"
        format: ipv4
        example: "10.250.1.50"

      wsfc_sofs_ansible_existing_controller_user:
        type: string
        description: "SSH username on the existing Ansible controller VM"
        required: false
        depends_on:
        - variable: "wsfc_sofs_guest_config_engine"
          value: "ansible_existing"
        default: "ansibleadmin"
        example: "ansibleadmin"

      # ---------------------------------------------------------------------------
      # CLUSTER HEALTH AND MONITORING
      # ---------------------------------------------------------------------------
      wsfc_health_check_interval:
        type: integer
        description: "Health check interval in seconds (default 60)"
        required: false
        minimum: 10
        maximum: 300
        default: 60

      wsfc_drain_on_shutdown:
        type: boolean
        description: "Automatically drain cluster node roles on shutdown"
        required: false
        default: true

      wsfc_quarantine_enabled:
        type: boolean
        description: "Enable automatic quarantine for misbehaving nodes"
        required: false
        default: true

      wsfc_quarantine_threshold:
        type: integer
        description: "Number of failures before quarantine (default 3)"
        required: false
        minimum: 1
        maximum: 10
        default: 3

      wsfc_cluster_log_level:
        type: integer
        description: "Cluster diagnostic log verbosity (1-5, 3=default)"
        required: false
        minimum: 1
        maximum: 5
        default: 3

      wsfc_cluster_log_size_mb:
        type: integer
        description: "Maximum cluster log file size in MB"
        required: false
        minimum: 8
        maximum: 1024
        default: 300

      # ---------------------------------------------------------------------------
      # SECURITY SETTINGS
      # ---------------------------------------------------------------------------
      wsfc_smb_signing_enforced:
        type: boolean
        description: "Enforce SMB signing for cluster communications"
        required: false
        default: true

      wsfc_smb_encryption_enabled:
        type: boolean
        description: "Enable SMB encryption for CSV traffic (Windows Server 2012 R2+)"
        required: false
        default: false

      wsfc_bitlocker_csv:
        type: boolean
        description: "Enable BitLocker encryption on CSV volumes"
        required: false
        default: false

      wsfc_credential_guard:
        type: boolean
        description: "Enable Credential Guard on cluster nodes (Windows Server 2016+)"
        required: false
        default: false

      # ---------------------------------------------------------------------------
      # PERFORMANCE TUNING
      # ---------------------------------------------------------------------------
      wsfc_same_subnet_delay:
        type: integer
        description: "Heartbeat delay for same subnet in milliseconds (default 1000)"
        required: false
        minimum: 250
        maximum: 5000
        default: 1000

      wsfc_same_subnet_threshold:
        type: integer
        description: "Heartbeat threshold for same subnet (default 10)"
        required: false
        minimum: 3
        maximum: 20
        default: 10

      wsfc_cross_subnet_delay:
        type: integer
        description: "Heartbeat delay for cross subnet in milliseconds (default 1000)"
        required: false
        minimum: 250
        maximum: 5000
        default: 1000

      wsfc_cross_subnet_threshold:
        type: integer
        description: "Heartbeat threshold for cross subnet (default 20)"
        required: false
        minimum: 3
        maximum: 40
        default: 20

      # ---------------------------------------------------------------------------
      # CLUSTER MAINTENANCE
      # ---------------------------------------------------------------------------
      wsfc_cau_enabled:
        type: boolean
        description: "Enable Cluster-Aware Updating (CAU)"
        required: false
        default: false

      wsfc_cau_schedule:
        type: string
        description: "CAU maintenance window schedule (cron format)"
        required: false
        depends_on:
        - variable: "wsfc_cau_enabled"
          value: true
        example: "0 2 * * 0"

      wsfc_cau_max_retries:
        type: integer
        description: "Maximum CAU retry attempts per node"
        required: false
        depends_on:
        - variable: "wsfc_cau_enabled"
          value: true
        minimum: 1
        maximum: 10
        default: 3

      wsfc_cau_max_reboot_time:
        type: integer
        description: "Maximum reboot time in minutes during CAU"
        required: false
        depends_on:
        - variable: "wsfc_cau_enabled"
          value: true
        minimum: 5
        maximum: 120
        default: 30
      wsfc_tags:
        type: object
        description: "Custom tags for cluster resources"
        required: false
        additionalProperties:
          type: string
        example:
          environment: "production"
          owner: "infrastructure-team"
          cost_center: "IT-OPS-001"

      # ---------------------------------------------------------------------------
      # CLUSTER NETWORK CONFIGURATION
      # ---------------------------------------------------------------------------
      wsfc_cluster_network_roles:
        type: array
        description: "Network role assignments for cluster networks"
        required: false
        items:
          type: object
          properties:
            network_name:
              type: string
              description: "Name of cluster network"
            role:
              type: string
              description: "Network role"
              allowedValues:
                - ClusterAndClient
                - ClusterOnly
                - None
        example:
          - network_name: "Management"
            role: "ClusterAndClient"
          - network_name: "Storage"
            role: "ClusterOnly"
          - network_name: "Backup"
            role: "None"
        note: "ClusterAndClient = cluster + client traffic, ClusterOnly = cluster heartbeat only, None = excluded from cluster"

  # =============================================================================
  # CLUSTER WITNESS (SHARED — AZURE LOCAL, WSFC, HYPER-V)
  # =============================================================================
  # Cloud Witness is an Azure Storage Account blob container.
  # The SAME cmdlet works for every cluster type:
  #   Set-ClusterQuorum -CloudWitness -AccountName $name -AccessKey $key
  # These variables are defined ONCE here. Do NOT add witness type or resource
  # vars inside azure_local:, wsfc:, or any other platform-specific section.
  #
  # Storage account resource lives in:
  #   storage_accounts.storage_accounts.cluster_witness.*
  # Access key credential:
  #   credentials.cluster.cloud_witness_storage_key (keyvault:// URI)

  cluster_witness:
    infrastructure_type: ["azure_local"]
    _meta:
      solutions: ["azure-local"]
      tier: required
      description: "Cluster witness configuration (cloud witness, file share, or disk)"

    cluster_witness_type:
      type: string
      description: "Cluster witness type — applies to Azure Local, WSFC (S2D/SAN), and standalone Hyper-V clusters"
      required: true
      allowedValues:
      - cloud_witness
      - file_share_witness
      - disk_witness
      default: "cloud_witness"
      note: "cloud_witness: Azure Storage Account blob (see storage_accounts.cluster_witness); file_share_witness: UNC path; disk_witness: shared disk (not compatible with S2D)"

    # File Share Witness
    cluster_witness_file_share_path:
      type: string
      description: "UNC path for file share witness (minimum 5 MB free space, accessible from all cluster nodes)"
      required: false
      format: unc_path
      depends_on:
      - variable: "cluster_witness_type"
        value: "file_share_witness"
      example: "\\\\fileserver.contoso.cloud\\witness"

    # Disk Witness
    cluster_witness_disk_resource:
      type: string
      description: "Disk resource name for disk witness (NOT supported with Storage Spaces Direct)"
      required: false
      depends_on:
      - variable: "cluster_witness_type"
        value: "disk_witness"
      note: "Incompatible with S2D (azure_local). Use cloud_witness or file_share_witness instead."
      example: "Cluster Disk 3"

  # =============================================================================
  # CLUSTER NODES (GENERIC - SHARED BY AZURE LOCAL & WSFC)
  # =============================================================================
  # Generic cluster node configurations used by BOTH Azure Local and Windows
  # Server Failover Clustering (WSFC). This is the reusable infrastructure layer
  # containing physical hardware specifications, network adapters, and storage
  # configurations.
  #
  # USAGE:
  #   - Azure Local clusters: Use these nodes with azure_local: configuration
  #   - WSFC clusters: Use these nodes with wsfc: configuration
    # ─── absorbed from dissolved cluster_networking ───
      cluster_ip_pool_start:
        category: "networking"
        subcategory: "cluster-ip-pools"
        type: string
        description: "Start of static IP pool for cluster resources"
        required: false
        format: ipv4
        example: "192.168.211.100"
  
      cluster_ip_pool_end:
        category: "networking"
        subcategory: "cluster-ip-pools"
        type: string
        description: "End of static IP pool for cluster resources"
        required: false
        format: ipv4
        example: "192.168.211.150"
    # ─── NOTE: cloud_witness_storage_account removed (dissolved cluster_config artifact) ───
    # ─── Use storage_accounts.storage_accounts.cluster_witness.name instead ───
  # ─── cluster_nodes ───
  cluster_nodes:
    infrastructure_type: ["azure_local"]
    _meta:
      solutions: ["azure-local"]
      tier: required
      description: "Physical cluster node definitions (hostname, IPs, hardware)"
    description: "Array of cluster node configurations (generic, used by both Azure Local and WSFC)"
    type: array
    required: true
    minItems: 1
    maxItems: 16
    items:
      type: object
      required: [node_hostname, node_management_ip, node_idrac_ip]
      properties:
    # -----------------------------------------------------------------------
    # HARDWARE IDENTIFICATION
    # -----------------------------------------------------------------------
        node_hostname:
          type: string
          description: "Node hostname"
          required: true
          maxLength: 15
          example: "azlc-node01"
      
        node_fqdn:
          type: string
          description: "Node fully qualified domain name"
          required: false
          example: "azlc-node01.azlocal.cloud"
      
        node_model:
          type: string
          description: "Node server model"
          required: false
          example: "PowerEdge R750"
      
        node_serial_number:
          type: string
          description: "Node server serial number"
          required: false
          example: "J8KXM73"
      
        node_service_tag:
          type: string
          description: "Node Dell service tag"
          required: false
          example: "J8KXM73"
      
        node_bios_version:
          type: string
          description: "Node BIOS firmware version"
          required: false
          example: "2.4.8"
      
    # -----------------------------------------------------------------------
    # NETWORK CONFIGURATION
    # -----------------------------------------------------------------------
        node_management_ip:
          type: string
          description: "Node management network IP address"
          format: ipv4
          required: true
          example: "192.168.211.21"
      
        node_management_vlan:
          type: integer
          description: "Node management VLAN ID"
          required: false
          minimum: 1
          maximum: 4094
          example: 211
      
        node_idrac_ip:
          type: string
          description: "Node iDRAC/BMC IP address"
          format: ipv4
          required: true
          example: "192.168.215.21"
      
        node_bmc_ip:
          type: string
          description: "Node BMC IP address (alternative name for iDRAC IP)"
          format: ipv4
          required: false
          example: "192.168.215.21"
      
        node_mac_bmc:
          type: string
          description: "Node BMC/iDRAC MAC address"
          format: mac
          required: false
          example: "B0:7B:25:D7:8C:40"
      
        node_mac_port1:
          type: string
          description: "Node port 1 MAC address"
          format: mac
          required: false
          example: "B8:CE:F6:4C:5D:6E"
      
        node_mac_port2:
          type: string
          description: "Node port 2 MAC address"
          format: mac
          required: false
          example: "B8:CE:F6:4C:5D:6F"
      
        node_mac_port3:
          type: string
          description: "Node port 3 MAC address"
          format: mac
          required: false
          example: "B8:CE:F6:4C:5D:70"
      
        node_mac_port4:
          type: string
          description: "Node port 4 MAC address"
          format: mac
          required: false
          example: "B8:CE:F6:4C:5D:71"
      
        node_slot3_port1_mac:
          type: string
          description: "Node slot 3 port 1 MAC address"
          format: mac
          required: false
          example: "B8:CE:F6:4C:5D:72"
      
        node_slot6_port1_mac:
          type: string
          description: "Node slot 6 port 1 MAC address"
          format: mac
          required: false
          example: "B8:CE:F6:73:F2:D0"
      
        node_slot6_port2_mac:
          type: string
          description: "Node slot 6 port 2 MAC address"
          format: mac
          required: false
          example: "B8:CE:F6:73:F2:D1"
      
        node_network_ports:
          type: integer
          description: "Node total number of network ports"
          required: false
          minimum: 1
          maximum: 16
          example: 4
      
    # -----------------------------------------------------------------------
    # CPU SPECIFICATIONS
    # -----------------------------------------------------------------------
        node_cpu:
          type: string
          description: "Node CPU model (short name)"
          required: false
          example: "Intel Xeon Gold 6248"
      
        node_cpu_model:
          type: string
          description: "Node CPU model (detailed string)"
          required: false
          example: "Intel(R) Xeon(R) Gold 6248 CPU @ 2.50GHz"
      
        node_cpu_count:
          type: integer
          description: "Node number of physical CPU sockets"
          required: false
          minimum: 1
          maximum: 4
          example: 2
      
        node_cpu_cores:
          type: integer
          description: "Node cores per CPU socket"
          required: false
          minimum: 1
          maximum: 64
          example: 20
      
        node_cpu_max_clock_mhz:
          type: integer
          description: "Node maximum CPU clock speed in MHz"
          required: false
          minimum: 1000
          maximum: 10000
          example: 3700
      
        node_total_cores:
          type: integer
          description: "Node total physical cores (cpu_count × cpu_cores)"
          required: false
          minimum: 1
          maximum: 256
          example: 40
      
        node_total_logical_procs:
          type: integer
          description: "Node total logical processors (with hyperthreading)"
          required: false
          minimum: 1
          maximum: 512
          example: 80
      
    # -----------------------------------------------------------------------
    # MEMORY SPECIFICATIONS
    # -----------------------------------------------------------------------
        node_memory_type:
          type: string
          description: "Node memory type (DDR4, DDR5)"
          required: false
          allowedValues:
            - "DDR4"
            - "DDR5"
          example: "DDR4"
      
        node_memory_speed_mhz:
          type: integer
          description: "Node memory speed in MHz"
          required: false
          minimum: 1600
          maximum: 8000
          example: 2933
      
        node_memory_gb:
          type: integer
          description: "Node memory per DIMM in GB"
          required: false
          minimum: 4
          maximum: 256
          example: 32
      
        node_total_memory_gb:
          type: integer
          description: "Node total system memory in GB"
          required: false
          minimum: 32
          maximum: 6144
          example: 512
      
    # -----------------------------------------------------------------------
    # STORAGE SPECIFICATIONS
    # -----------------------------------------------------------------------
        node_boot_drive_size_gb:
          type: integer
          description: "Node boot drive size in GB (typically SSD/NVMe)"
          required: false
          minimum: 100
          maximum: 2000
          example: 480
      
        node_data_drive_count:
          type: integer
          description: "Node number of data drives (for Storage Spaces Direct)"
          required: false
          minimum: 0
          maximum: 24
          example: 8
      
        node_data_drive_size_gb:
          type: integer
          description: "Node size of each data drive in GB"
          required: false
          minimum: 100
          maximum: 10000
          example: 1920
      
    # -----------------------------------------------------------------------
    # PHYSICAL LOCATION & CABLING
    # -----------------------------------------------------------------------
        node_rack_position:
          type: string
          description: "Node physical rack location (rack ID and U position)"
          required: false
          example: "RAL-Rack01-U10"
      
        node_cabling_idrac:
          type: string
          description: "Node iDRAC cabling documentation"
          required: false
          example: "Port 1 to Switch A Port 1"
      
        # Hardware Platform Configuration
        hardware_platform:
          type: object
          description: "Node hardware configuration (platform model, adapters, GPUs)"
          required: false
          properties:
            platform_model:
              type: string
              description: "Dell AX platform model"
              required: true
              allowedValues:
                - "AX-4510c"
                - "AX-660"
                - "AX-760"
              example: "AX-760"
          
            # Onboard NICs (AX-660/760 only, typically disabled)
            onboard_nics:
              type: object
              description: "Onboard 1GbE/10GbE NICs (AX-660/760 only)"
              required: false
              properties:
                enabled:
                  type: boolean
                  description: "Whether onboard NICs are enabled (typically disabled)"
                  default: false
                adapters:
                  type: array
                  description: "Onboard NIC adapter configurations"
                  required: false
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: "Adapter name as seen by Windows/ARM template"
                        example: "Embedded LOM 1"
                      mac_address:
                        type: string
                        format: mac
                        description: "Adapter MAC address"
                        example: "AA:BB:CC:DD:EE:01"
                      speed_gbps:
                        type: integer
                        description: "Port speed in Gbps"
                        allowedValues: [1, 10]
                        example: 10
          
            # PCIe Network Adapters (main data path)
            pcie_network_adapters:
              type: array
              description: "PCIe network adapter cards installed in node"
              required: false
              items:
                type: object
                properties:
                  slot:
                    type: integer
                    description: "PCIe slot number"
                    minimum: 1
                    maximum: 8
                    example: 2
                  vendor:
                    type: string
                    description: "NIC card vendor"
                    allowedValues:
                      - "Mellanox"
                      - "NVIDIA"
                      - "Intel"
                      - "Broadcom"
                    example: "Mellanox"
                  model:
                    type: string
                    description: "NIC card model"
                    example: "ConnectX-6 Dx"
                  ports:
                    type: array
                    description: "Physical ports on this NIC card"
                    minItems: 1
                    maxItems: 4
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          description: "Port name as seen by Windows/ARM template (Mellanox: 'Slot X Port Y', Intel: 'Embedded NIC X')"
                          example: "Slot 2 Port 1"
                        mac_address:
                          type: string
                          format: mac
                          description: "Port MAC address"
                          example: "B8:CE:F6:4C:5D:6E"
                        speed_gbps:
                          type: integer
                          description: "Port speed in Gbps"
                          allowedValues: [10, 25, 40, 50, 100, 200]
                          example: 25
                        rdma_capable:
                          type: boolean
                          description: "Whether port supports RDMA"
                          default: true
                        rdma_technology:
                          type: string
                          description: "RDMA technology (if rdma_capable)"
                          allowedValues:
                            - "RoCEv2"
                            - "iWARP"
                            - "InfiniBand"
                          example: "RoCEv2"
      
    # PCIe GPU Accelerators (optional)
            pcie_gpus:
              type: array
              description: "PCIe GPU accelerator cards installed in node"
              required: false
              items:
                type: object
                properties:
                  slot:
                    type: integer
                    description: "PCIe slot number"
                    minimum: 1
                    maximum: 8
                    example: 5
                  vendor:
                    type: string
                    description: "GPU vendor"
                    allowedValues:
                      - "NVIDIA"
                      - "AMD"
                    example: "NVIDIA"
                  model:
                    type: string
                    description: "GPU model"
                    example: "A40"
                  memory_gb:
                    type: integer
                    description: "GPU memory in GB"
                    example: 48
                  partition_capable:
                    type: boolean
                    description: "Whether GPU supports partitioning (vGPU or MIG)"
                    default: false
                  partition_type:
                    type: string
                    description: "GPU partition technology"
                    allowedValues:
                      - "vGPU"
                      - "MIG"
                      - "none"
                    example: "vGPU"
                  vgpu_profiles:
                    type: array
                    description: "Available vGPU profiles (if partition_type is vGPU)"
                    required: false
                    items:
                      type: string
                    example: ["A40-1Q", "A40-2Q", "A40-4Q", "A40-8Q", "A40-12Q", "A40-24Q"]
                  mig_profiles:
                    type: array
                    description: "Available MIG profiles (if partition_type is MIG)"
                    required: false
                    items:
                      type: string
                    example: ["1g.10gb", "2g.20gb", "3g.40gb"]

        # ARC INTEGRATION (per-node)
        arc_node_resource_ids:
          type: array
          description: "Azure Arc resource IDs for this node"
          required: false
          items:
            type: string
            format: azure_resource_id

  # ─── cluster_arm_deployment ───
  cluster_arm_deployment:
    infrastructure_type: ["azure_local"]
    _meta:
      solutions: ["azure-local"]
      tier: required
      description: "ARM deployment parameters for Azure Local cluster provisioning"
    arm_key_vault_name:
      type: string
      description: "Key Vault name for ARM deployment"
      required: false
      minLength: 3
      maxLength: 24
      pattern: "^[a-z][a-z0-9]+(-[a-z0-9]+)*$"
      note: "No consecutive hyphens allowed"
      example: "kv-azlc-mgmt"

    arm_logs_retention_days:
      type: integer
      description: "Logs retention days"
      required: false
      minimum: 30
      maximum: 730
      default: 90

    arm_cluster_name:
      type: string
      description: "Cluster name for ARM deployment"
      required: false
      maxLength: 15
      pattern: "^[a-zA-Z][a-zA-Z0-9-]*$"
      example: "azlc-clus01"

    # arm_witness_type removed — duplicate of azl_witness_type / wsfc_quorum_type.
    # Storage account: storage_accounts.storage_accounts.cluster_witness.name

    arm_domain_fqdn:
      type: string
      description: "Domain FQDN"
      required: false
      example: "azlocal.cloud"

    arm_ou_path:
      type: string
      description: "OU path"
      required: false
      example: "OU=AzureLocal,DC=azlocal,DC=cloud"

    arm_naming_prefix:
      type: string
      description: "Naming prefix"
      required: false
      maxLength: 8
      pattern: "^[a-z0-9-]+$"
      example: "azlc"

    arm_subnet_mask:
      type: string
      description: "Subnet mask"
      required: false
      format: ipv4
      example: "255.255.255.0"

    arm_default_gateway:
      type: string
      description: "Default gateway"
      required: false
      format: ipv4
      example: "192.168.211.1"

    arm_starting_ip:
      type: string
      description: "Starting IP address"
      required: false
      format: ipv4
      example: "192.168.211.20"

    arm_ending_ip:
      type: string
      description: "Ending IP address"
      required: false
      format: ipv4
      example: "192.168.211.25"

    arm_service_principal_app_id:
      category: "identity"
      subcategory: "service-principal"
      type: string
      description: "ARM deployment service principal app ID (Azure Local cluster deployments)"
      required: false
      format: uuid
      example: "00000000-aaaa-bbbb-cccc-333333333333"

    arm_service_principal_object_id:
      category: "identity"
      subcategory: "service-principal"
      type: string
      description: "ARM deployment service principal object ID (Azure Local cluster deployments)"
      required: false
      format: uuid
      example: "12345678-1234-1234-1234-123456789012"

    arm_service_principal_secret_ref:
      category: "identity"
      subcategory: "service-principal"
      type: string
      description: "ARM deployment service principal secret reference (Azure Local cluster deployments)"
      required: false
      sensitive: true
      pattern: "^keyvault://[a-z0-9-]+/.+$"
      example: "keyvault://kv-azlc-mgmt/spn-client-secret"

    arm_resource_provider_object_id:
      type: string
      description: "Resource provider object ID"
      required: false
      format: uuid
      example: "12345678-1234-1234-1234-123456789012"

    arm_mode:
      type: string
      description: "ARM template deployment mode (validate_only: validate config without deploying, deploy: actual deployment)"
      required: false
      allowedValues:
        - validate_only
        - deploy
      default: "deploy"

    arm_storage_configuration_mode:
      type: string
      description: "Storage configuration mode in ARM template (express: automated storage config, advanced: manual storage config)"
      required: false
      allowedValues:
        - express
        - advanced
      default: "express"

    # ---------------------------------------------------------------------------
    # AZURE ARC INTEGRATION
    # ---------------------------------------------------------------------------
    arc_node_resource_ids:
      type: array
      description: "Azure Arc resource IDs for cluster nodes (Arc machines that are part of the cluster) - ARM template parameter"
      required: false
      items:
        type: string
        format: azure_resource_id
      minItems: 1
      maxItems: 16
      example:
        - "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-AzureLocalCloud-eus-landingzone-cluster/providers/Microsoft.HybridCompute/machines/azlc-node01"
        - "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-AzureLocalCloud-eus-landingzone-cluster/providers/Microsoft.HybridCompute/machines/azlc-node02"

    arm_cluster_telemetry_setting:
      type: string
      description: "Telemetry collection level for ARM deployment (full: all telemetry, basic: essential only, minimal: errors only)"
      required: false
      allowedValues:
        - full
        - basic
        - minimal
      default: "full"

    arm_cluster_telemetry_eu_location:
      type: boolean
      description: "Use EU data residency for telemetry in ARM deployment"
      required: false
      default: false

    arm_diagnostics_logs_retention_days:
      type: integer
      description: "Diagnostic logs retention period for ARM deployment (days)"
      required: false
      minimum: 30
      maximum: 730
      default: 90

    # Security Settings (ARM Template Deployment Parameters)
    arm_security_level:
      type: string
      description: "Security configuration profile applied during ARM deployment"
      required: false
      allowedValues:
        - recommended
        - customized
      default: "recommended"

    arm_credential_guard_enforced:
      type: boolean
      description: "Credential Guard enforced during ARM deployment"
      required: false
      default: true

    arm_smb_signing_enforced:
      type: boolean
      description: "SMB signing enforced during ARM deployment"
      required: false
      default: true

    arm_smb_cluster_encryption:
      type: boolean
      description: "SMB cluster encryption during ARM deployment"
      required: false
      default: false

    arm_bitlocker_boot_volume:
      type: boolean
      description: "BitLocker boot volume encryption during ARM deployment"
      required: false
      default: true

    arm_bitlocker_data_volumes:
      type: boolean
      description: "BitLocker data volumes encryption during ARM deployment"
      required: false
      default: true

    arm_wdac_enforced:
      type: boolean
      description: "WDAC (Application Control) enforced during ARM deployment"
      required: false
      default: true

    arm_eu_location:
      type: boolean
      description: "EU location for telemetry data during ARM deployment"
      required: false
      default: false

    # ---------------------------------------------------------------------------
    # CLUSTER TOPOLOGY & RACK AWARENESS
    # ---------------------------------------------------------------------------
    arm_cluster_pattern:
      type: string
      description: "Cluster deployment pattern (Standard: single rack, RackAware: multi-rack with zone awareness)"
      required: false
      allowedValues:
        - Standard
        - RackAware
      default: "Standard"
      references:
      - url: "https://learn.microsoft.com/azure/azure-local/deploy/rack-aware-cluster-deployment-via-template"

    arm_local_availability_zones:
      type: array
      description: "Local availability zones for rack-aware deployments - maps nodes to physical racks"
      required: false
      items:
        type: object
        properties:
          localAvailabilityZoneName:
            type: string
            description: "Zone name (e.g., Zone1, Zone2)"
          nodes:
            type: array
            description: "Node hostnames in this zone"
            items:
              type: string
      example:
        - localAvailabilityZoneName: "Zone1"
          nodes: ["node1", "node2"]
        - localAvailabilityZoneName: "Zone2"
          nodes: ["node3", "node4"]

    # ---------------------------------------------------------------------------
    # NETWORK CONFIGURATION (EXTENDED)
    # ---------------------------------------------------------------------------
    arm_dns_servers:
      type: array
      description: "List of DNS server IP addresses"
      required: false
      items:
        type: string
        format: ipv4
      example:
        - "192.168.211.10"
        - "192.168.211.11"

    arm_use_dhcp:
      type: boolean
      description: "Use DHCP for hosts and cluster IPs (if true, gateway and DNS not required)"
      required: false
      default: false

    arm_physical_nodes_settings:
      type: array
      description: "Array of physical nodes with their IP addresses"
      required: false
      items:
        type: object
        properties:
          name:
            type: string
            description: "Node hostname"
          ipv4Address:
            type: string
            format: ipv4
            description: "Node IPv4 address"
      example:
      - name: "azlc-node01"
        ipv4Address: "192.168.211.21"
      - name: "azlc-node02"
        ipv4Address: "192.168.211.22"

    arm_networking_type:
      type: string
      description: "Type of networking deployment"
      required: false
      allowedValues:
        - switchedMultiServerDeployment
        - switchlessMultiServerDeployment
      example: "switchedMultiServerDeployment"

    arm_networking_pattern:
      type: string
      description: "Network deployment pattern"
      required: false
      allowedValues:
        - hyperConverged
        - disaggregated
      example: "hyperConverged"

    arm_intent_list:
      type: array
      description: "List of deployment network intents"
      required: false
      items:
        type: object
        properties:
          name:
            type: string
          trafficType:
            type: array
            items:
              type: string
          adapter:
            type: array
            items:
              type: string
          overrideVirtualSwitchConfiguration:
            type: boolean
          virtualSwitchConfigurationOverrides:
            type: object

    # ---------------------------------------------------------------------------
    # STORAGE CONFIGURATION (EXTENDED)
    # ---------------------------------------------------------------------------
    arm_storage_network_list:
      type: array
      description: "List of storage networks for cluster"
      required: false
      items:
        type: object
        properties:
          name:
            type: string
          networkAdapterName:
            type: string
          vlanId:
            type: integer

    arm_storage_connectivity_switchless:
      type: boolean
      description: "Storage connectivity configured without network switches"
      required: false
      default: false

    arm_enable_storage_auto_ip:
      type: boolean
      description: "Enable automatic IP assignment for storage network"
      required: false
      default: false

    # ---------------------------------------------------------------------------
    # CREDENTIALS & ADMIN ACCOUNTS
    # ---------------------------------------------------------------------------
    arm_local_admin_password:
      type: string
      description: "Password for local administrator on all cluster machines"
      required: false
      sensitive: true
      pattern: "^keyvault://[a-z0-9-]+/.+$"
      example: "keyvault://kv-azlc-mgmt/local-admin-password"

    arm_lcm_admin_username:
      type: string
      description: "Username for LCM (Lifecycle Manager) admin"
      required: false
      example: "azurestackadmin"

    arm_lcm_admin_password:
      type: string
      description: "Password for LCM deployment account"
      required: false
      sensitive: true
      pattern: "^keyvault://[a-z0-9-]+/.+$"
      example: "keyvault://kv-azlc-mgmt/lcm-deployment-password"

    # ---------------------------------------------------------------------------
    # OBSERVABILITY & DIAGNOSTICS (EXTENDED)
    # ---------------------------------------------------------------------------
    arm_episodic_data_upload:
      type: boolean
      description: "Collect log data and upload to Microsoft for troubleshooting (crash dumps)"
      required: false
      default: true

    arm_streaming_data_client:
      type: boolean
      description: "Enable telemetry data streaming from cluster to Microsoft"
      required: false
      default: true

    arm_drift_control_enforced:
      type: boolean
      description: "Reapply security defaults regularly to prevent drift"
      required: false
      default: true

    # ---------------------------------------------------------------------------
    # SOLUTION BUILDER EXTENSION (SBE) - OEM/PARTNER
    # ---------------------------------------------------------------------------
    arm_sbe_version:
      type: string
      description: "Version of Solution Builder Extension (SBE) for deployment"
      required: false
      example: "1.0.0"

    arm_sbe_family:
      type: string
      description: "Family or category of SBE package"
      required: false
      example: "Dell"

    arm_sbe_publisher:
      type: string
      description: "Publisher or vendor of SBE"
      required: false
      example: "Dell"

    arm_sbe_manifest_source:
      type: string
      description: "Source location of SBE manifest file"
      required: false
      format: url

    arm_sbe_manifest_creation_date:
      type: string
      description: "Creation date of SBE manifest"
      required: false
      format: date

    arm_partner_properties:
      type: array
      description: "List of partner-specific properties"
      required: false
      items:
        type: object

    arm_partner_credential_list:
      type: array
      description: "List of partner credentials"
      required: false
      items:
        type: object

    # ---------------------------------------------------------------------------
    # ADDITIONAL CONFIGURATION
    # ---------------------------------------------------------------------------
    arm_custom_location:
      type: string
      description: "Custom location for deployment (Arc custom location resource)"
      required: false
      format: azure_resource_id

    arm_storage_account_type:
      type: string
      description: "Type of Azure Storage Account for diagnostics"
      required: false
      allowedValues:
        - Standard_LRS
        - Standard_GRS
        - Standard_RAGRS
      default: "Standard_LRS"
    default: "Standard_LRS"

    arm_diagnostic_storage_account_name:
      type: string
      description: "Name of Azure Storage Account for Key Vault audit logs"
      required: false
      minLength: 3
      maxLength: 24
      pattern: "^[a-z0-9]+$"
      example: "stazlcAzureLocalCloudeus001"

    arm_soft_delete_retention_days:
      type: integer
      description: "Key Vault soft delete retention days (7-90)"
      required: false
      minimum: 7
      maximum: 90
      default: 90


  # =============================================================================
  # NETWORK INTENTS
  # =============================================================================
  # Network intents define which physical network adapters are used for different traffic types.
  # This section supports 1-16 intents for maximum flexibility:
  # - 1 intent: Fully converged (all traffic on same adapters)
  # - 2 intents: Management+Compute / Storage (most common)
  # - 3+ intents: Fully disaggregated or custom configurations
  #
  # RELATED SECTIONS:
  #   - logical_networks: (line 5658+) - VM networking layer built on top of intents
  #   - cluster_nodes: (line 4732+) - Physical adapters referenced by intents
  #   - vlans: (line 3264+) - VLAN IDs used by logical networks
  # ─── avd ───
  avd:
    azure:
      infrastructure_type: ["avd_azure"]
      _meta:
        solutions: ["avd-azure", "avd-azure-local"]
        tier: required
        description: "Azure Virtual Desktop cloud-side resources (host pools, workspaces, app groups)"
      # Host Pool Configuration
      avd_host_pool_name:
        type: string
        description: "Name of AVD host pool"
        required: false
        pattern: "^[a-zA-Z0-9-_]{1,64}$"
        example: "hp-avd-prod-pooled-eus"

      avd_host_pool_type:
        type: string
        description: "Host pool type (Pooled = multi-user shared, Personal = dedicated single-user)"
        required: false
        allowedValues:
        - Pooled
        - Personal
        default: "Pooled"
        reference: "https://learn.microsoft.com/azure/virtual-desktop/terminology"

      avd_host_pool_load_balancer:
        type: string
        description: "Load balancing algorithm for pooled host pools (BreadthFirst = distribute evenly, DepthFirst = fill one host before moving to next)"
        required: false
        allowedValues:
        - BreadthFirst
        - DepthFirst
        default: "BreadthFirst"
        applies_to: "Pooled host pools only"

      avd_max_session_limit:
        type: integer
        description: "Maximum concurrent sessions per session host (balance cost vs performance)"
        required: false
        minimum: 1
        maximum: 50
        default: 16
        applies_to: "Pooled host pools only"

      # Session Host Configuration
      avd_session_host_count:
        type: integer
        description: "Number of session hosts to deploy"
        required: false
        minimum: 1
        maximum: 1000
        default: 2

      avd_session_host_size:
        type: string
        description: "Azure VM SKU for session hosts"
        required: false
        default: "Standard_D4s_v5"
        example: "Standard_D4s_v5"
        note: "Common SKUs: D4s_v5 (4vCPU, 16GB), D8s_v5 (8vCPU, 32GB), D16s_v5 (16vCPU, 64GB)"

      avd_session_host_os:
        type: string
        description: "Operating system for session hosts (multi-session exclusive to AVD, reduces VM count)"
        required: false
        allowedValues:
        - Windows-11-Enterprise-Multi-Session
        - Windows-11-Enterprise
        - Windows-10-Enterprise-Multi-Session
        - Windows-10-Enterprise
        - Windows-Server-2025
        - Windows-Server-2022
        - Windows-Server-2019
        default: "Windows-11-Enterprise-Multi-Session"
        note: "Only 64-bit versions supported. Ultra disks NOT supported for OS disk."
        reference: "https://learn.microsoft.com/azure/virtual-desktop/prerequisites"

      avd_session_host_disk_type:
        type: string
        description: "OS disk type for session hosts (Premium_LRS recommended for production)"
        required: false
        allowedValues:
        - Standard_LRS
        - StandardSSD_LRS
        - Premium_LRS
        default: "Premium_LRS"

      # FSLogix Profile Configuration
      avd_fslogix_enabled:
        type: boolean
        description: "Enable FSLogix profile containers (required for pooled environments to persist user profiles)"
        required: false
        default: true
        applies_to: "Pooled host pools only"

      avd_fslogix_storage_type:
        type: string
        description: "Storage backend for FSLogix profiles"
        required: false
        allowedValues:
        - AzureFiles
        - AzureNetAppFiles
        default: "AzureFiles"
        note: "Azure Files = SMB shares with AD DS or Entra ID auth, NetApp Files = high-performance NFS"

      avd_fslogix_storage_account:
        type: string
        description: "Azure Storage account name for FSLogix profiles"
        required: false
        pattern: "^[a-z0-9]{3,24}$"
        example: "stavdprofileseus001"

      avd_fslogix_share_name:
        type: string
        description: "File share name for FSLogix profiles"
        required: false
        default: "profiles"
        example: "avd-profiles"

      # Application Group & Workspace
      avd_app_group_type:
        type: string
        description: "Application group type (Desktop = full desktop, RemoteApp = individual apps)"
        required: false
        allowedValues:
        - Desktop
        - RemoteApp
        default: "Desktop"
        note: "Multiple RemoteApp groups allowed per host pool"
        reference: "https://learn.microsoft.com/azure/virtual-desktop/terminology#application-groups"

      avd_workspace_name:
        type: string
        description: "AVD workspace name (logical grouping of application groups)"
        required: false
        example: "ws-avd-prod-eus"

      # RDP Shortpath
      avd_rdp_shortpath_enabled:
        type: boolean
        description: "Enable RDP Shortpath for direct UDP transport (provides lower latency, requires UDP port open)"
        required: false
        default: false

    azure_local:
      infrastructure_type: ["avd_azure_local"]
      _meta:
        solutions: ["avd-azure-local"]
        tier: required
        description: "AVD session host variables for Azure Local deployments"
      # Prerequisites & Enablement
      avd_azl_enabled:
        type: boolean
        description: "Enable Azure Virtual Desktop on Azure Local (requires 23H2+, cluster registered with Azure, AD DS domain)"
        required: false
        default: false
        prerequisites:
        - Azure Local version 23H2 or later
        - Cluster registered with Azure
        - Active Directory Domain Services (AD DS) domain
        note: "Generally available (GA) feature. Requires Azure Local service fee + per-vCPU AVD fee."
        reference: "https://learn.microsoft.com/azure/virtual-desktop/azure-stack-hci-overview"

      # Host Pool Configuration
      avd_azl_host_pool_name:
        type: string
        description: "AVD host pool name for Azure Local session hosts"
        required: false
        example: "hp-avd-azl-prod-pooled"
        critical_limitation: "Host pools CANNOT mix Azure and Azure Local session hosts. Must be 100% Azure or 100% Azure Local."

      avd_azl_session_host_count:
        type: integer
        description: "Number of AVD session hosts on Azure Local"
        required: false
        minimum: 1
        maximum: 100
        default: 2

      avd_azl_session_host_os:
        type: string
        description: "Operating system for Azure Local session hosts (only 64-bit versions supported)"
        required: false
        allowedValues:
        - Windows-11-Enterprise-Multi-Session
        - Windows-11-Enterprise
        - Windows-10-Enterprise-Multi-Session
        - Windows-10-Enterprise
        - Windows-Server-2025
        - Windows-Server-2022
        - Windows-Server-2019
        default: "Windows-11-Enterprise-Multi-Session"

      # Azure Connected Machine Agent (REQUIRED)
      avd_azl_connected_machine_agent_required:
        type: boolean
        description: "Azure Connected Machine agent required for IMDS (auto-installed via Azure portal, enables Arc VM extensions)"
        required: false
        default: true
        immutable: true

      # Storage Configuration
      avd_azl_storage_path:
        type: string
        description: "CSV path for AVD session host VHDXs"
        required: false
        pattern: "^C:\\\\ClusterStorage\\\\Volume\\d+\\\\.+$"
        example: "C:\\ClusterStorage\\Volume01\\AVD"

      avd_azl_profile_storage_type:
        type: string
        description: "FSLogix profile storage type for Azure Local"
        required: false
        allowedValues:
        - StorageSpacesDirect
        - LocalSMB
        - AzureFiles
        default: "StorageSpacesDirect"
        note: "Microsoft recommends Storage Spaces Direct VM-based file share cluster for optimal performance"
        reference: "https://learn.microsoft.com/azure/virtual-desktop/azure-stack-hci-overview#fslogix-profile-storage"

      # Licensing & Activation
      avd_azl_licensing_method:
        type: string
        description: "OS licensing/activation method for Azure Local VMs"
        required: false
        allowedValues:
        - AzureVerification
        - TraditionalActivation
        default: "AzureVerification"
        note: "AzureVerification = Windows 11/10 multi-session, Server 2022 Datacenter: Azure Edition. TraditionalActivation = other OS images."
        reference: "https://learn.microsoft.com/azure-stack/hci/deploy/azure-verification"

      # ─────────────────────────────────────────────────────────────────────────
      # SESSION HOST VM CONFIGURATION
      # ─────────────────────────────────────────────────────────────────────────
      avd_azl_vm_naming_prefix:
        type: string
        description: "Naming prefix for AVD session host VMs on Azure Local (e.g., avd-sh → avd-sh-001, avd-sh-002)"
        required: false
        maxLength: 11
        pattern: "^[a-zA-Z][a-zA-Z0-9-]*$"
        example: "avd-sh"
        note: "Max 11 chars — Azure appends 3-digit index (e.g., -001). Total hostname max is 15 chars."

      avd_azl_vm_processors:
        type: integer
        description: "Number of virtual processors per AVD session host VM"
        required: false
        minimum: 2
        maximum: 64
        default: 4
        example: 4

      avd_azl_vm_memory_mb:
        type: integer
        description: "Memory in MB per AVD session host VM"
        required: false
        minimum: 4096
        maximum: 131072
        default: 16384
        example: 16384
        note: "16384 MB = 16 GB recommended for multi-session Windows 11"

      avd_azl_vm_admin_username:
        type: string
        description: "Local administrator username for AVD session host VMs"
        required: false
        example: "demoadmin"

      avd_azl_vm_admin_password:
        type: string
        description: "Local administrator password for AVD session host VMs (Key Vault reference)"
        required: false
        sensitive: true
        pattern: "^keyvault://[a-z0-9-]+/.+$"
        example: "keyvault://kv-azlc-mgmt/avd-local-admin-password"

      # ─────────────────────────────────────────────────────────────────────────
      # AZURE LOCAL RESOURCE IDS
      # ─────────────────────────────────────────────────────────────────────────
      avd_azl_custom_location_id:
        type: string
        description: "Azure Resource ID of the Azure Local custom location for VM placement"
        required: false
        format: azure_resource_id
        example: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-cluster/providers/Microsoft.ExtendedLocation/customLocations/azlc-cl"

      avd_azl_logical_network_id:
        type: string
        description: "Azure Resource ID of the Azure Local logical network for session host NICs"
        required: false
        format: azure_resource_id
        example: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-cluster/providers/Microsoft.AzureStackHCI/logicalNetworks/lnet-tenant-vlan"

      avd_azl_gallery_image_id:
        type: string
        description: "Azure Resource ID of the marketplace gallery image for session host OS"
        required: false
        format: azure_resource_id
        example: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-cluster/providers/Microsoft.AzureStackHCI/marketplaceGalleryImages/img-win11-avd"

      avd_azl_storage_path_id:
        type: string
        description: "Azure Resource ID of the storage container (storage path) for session host VHDXs"
        required: false
        format: azure_resource_id
        example: "/subscriptions/00000000-1111-2222-3333-444444444444/resourceGroups/rg-azlc-cluster/providers/Microsoft.AzureStackHCI/storageContainers/sp-vmstore-prd-01"

      # ─────────────────────────────────────────────────────────────────────────
      # RESOURCE GROUP & SUBSCRIPTION (CROSS-SUB DEPLOYMENT)
      # ─────────────────────────────────────────────────────────────────────────
      avd_azl_resource_group:
        type: string
        description: "Resource group in AZL subscription where Arc machine and AzureStackHCI resources are created"
        required: false
        example: "rg-avd-azl-sessionhost-001"

      avd_azl_subscription_id:
        type: string
        description: "AVD subscription ID (host pool lives here — may differ from Azure Local subscription for cross-sub deployments)"
        required: false
        format: uuid
        example: "00000000-aaaa-bbbb-cccc-dddddddddddd"
        note: "Cross-subscription: session hosts deploy to AZL sub, host pool + workspace live in AVD sub"

      # ─────────────────────────────────────────────────────────────────────────
      # DOMAIN JOIN CONFIGURATION
      # ─────────────────────────────────────────────────────────────────────────
      avd_azl_domain_join_type:
        type: string
        description: "Domain join method for AVD session hosts on Azure Local"
        required: false
        allowedValues:
        - ActiveDirectory
        - AzureAD
        default: "ActiveDirectory"
        note: "Azure Local AVD requires AD DS domain join (Entra-only join not supported as of 23H2)"

      avd_azl_domain_join_username:
        type: string
        description: "Domain join service account username (UPN or sAMAccountName)"
        required: false
        example: "svc.azl.local"

      avd_azl_domain_join_password:
        type: string
        description: "Domain join service account password (Key Vault reference)"
        required: false
        sensitive: true
        pattern: "^keyvault://[a-z0-9-]+/.+$"
        example: "keyvault://kv-azlc-mgmt/domain-join-password"

      avd_azl_domain_join_ou_path:
        type: string
        description: "LDAP OU path for computer account placement during domain join (empty = default Computers container)"
        required: false
        default: ""
        example: "OU=AVD,OU=Servers,DC=azlocal,DC=cloud"

      # ─────────────────────────────────────────────────────────────────────────
      # HOST POOL CONFIGURATION (CROSS-SUB)
      # ─────────────────────────────────────────────────────────────────────────
      avd_azl_host_pool_type:
        type: string
        description: "Host pool type for Azure Local AVD (Pooled = shared multi-user, Personal = dedicated 1:1)"
        required: false
        allowedValues:
        - Pooled
        - Personal
        default: "Pooled"

      avd_azl_host_pool_resource_group:
        type: string
        description: "Resource group in AVD subscription containing the host pool and workspace"
        required: false
        example: "rg-avd-hostpools-001"
        note: "This RG lives in the AVD subscription (avd_azl_subscription_id), not the Azure Local subscription"

      avd_azl_host_pool_load_balancer:
        type: string
        description: "Load balancing algorithm for pooled host pools (BreadthFirst = spread evenly, DepthFirst = fill one host first). Forced to Persistent for Personal host pools."
        required: false
        allowedValues:
        - BreadthFirst
        - DepthFirst
        default: "BreadthFirst"
        applies_to: "Pooled host pools only — Personal host pools always use Persistent"
        reference: "https://learn.microsoft.com/azure/virtual-desktop/host-pool-load-balancing"

      avd_azl_max_session_limit:
        type: integer
        description: "Maximum concurrent sessions per session host (Pooled host pools only)"
        required: false
        minimum: 1
        maximum: 999999
        default: 16
        applies_to: "Pooled host pools only — Personal host pools are always 1"

      avd_azl_personal_assignment_type:
        type: string
        description: "How personal desktops are assigned to users (Automatic = first available, Direct = admin assigns)"
        required: false
        allowedValues:
        - Automatic
        - Direct
        default: "Automatic"
        applies_to: "Personal host pools only"
        reference: "https://learn.microsoft.com/azure/virtual-desktop/configure-host-pool-personal-desktop-assignment-type"

      avd_azl_preferred_app_group_type:
        type: string
        description: "Preferred application group type — required by Azure API even when only one app group exists"
        required: false
        allowedValues:
        - Desktop
        - RailApplications
        - None
        default: "Desktop"
        note: "RailApplications = RemoteApp. Desktop is the default for most deployments."

      avd_azl_start_vm_on_connect:
        type: boolean
        description: "Enable Start VM on Connect — automatically powers on session hosts when users connect"
        required: false
        default: false
        note: "Requires 'Desktop Virtualization Power On Contributor' RBAC role on the session host resource group"
        reference: "https://learn.microsoft.com/azure/virtual-desktop/start-virtual-machine-connect"

      avd_azl_validation_environment:
        type: boolean
        description: "Mark host pool as validation environment to receive AVD service updates before production"
        required: false
        default: false
        note: "Validation host pools receive agent, stack, and service updates ~1 week before production"

      avd_azl_custom_rdp_properties:
        type: string
        description: "Custom RDP properties string (semicolon-delimited key:type:value pairs)"
        required: false
        default: ""
        example: "audiocapturemode:i:1;redirectclipboard:i:1;use multimon:i:1"
        reference: "https://learn.microsoft.com/azure/virtual-desktop/customize-rdp-properties"

      avd_azl_host_pool_friendly_name:
        type: string
        description: "Friendly display name for the host pool shown in Azure portal and AVD client"
        required: false
        example: "Production Desktop Pool"

      avd_azl_host_pool_description:
        type: string
        description: "Description of the host pool purpose and configuration"
        required: false
        example: "Personal desktops for engineering team on Azure Local"

      # ─────────────────────────────────────────────────────────────────────────
      # APPLICATION GROUP CONFIGURATION
      # ─────────────────────────────────────────────────────────────────────────
      avd_azl_app_group_name:
        type: string
        description: "Name of the AVD application group"
        required: false
        pattern: "^[A-Za-z0-9@.\\-_ ]{3,64}$"
        example: "ag-avd-azl-desktop-personal"

      avd_azl_app_group_type:
        type: string
        description: "Application group type (Desktop = full desktop session, RemoteApp = individual published apps)"
        required: false
        allowedValues:
        - Desktop
        - RemoteApp
        default: "Desktop"
        note: "One Desktop app group per host pool max. Multiple RemoteApp groups allowed."
        reference: "https://learn.microsoft.com/azure/virtual-desktop/terminology#application-groups"

      avd_azl_app_group_friendly_name:
        type: string
        description: "Friendly display name for the application group in Azure portal"
        required: false
        example: "Engineering Desktops"

      # ─────────────────────────────────────────────────────────────────────────
      # WORKSPACE CONFIGURATION
      # ─────────────────────────────────────────────────────────────────────────
      avd_azl_workspace_name:
        type: string
        description: "Name of the AVD workspace (logical grouping of application groups visible to users)"
        required: false
        pattern: "^[A-Za-z0-9@.\\-_ ]{3,64}$"
        example: "ws-avd-azl-prod"
        reference: "https://learn.microsoft.com/azure/virtual-desktop/terminology#workspaces"

      avd_azl_workspace_friendly_name:
        type: string
        description: "Friendly display name for the workspace shown to end users in AVD client"
        required: false
        example: "contoso - Desktops"

# =============================================================================
# 10. STORAGE ACCOUNTS
# =============================================================================
storage_accounts:
  _meta:
    solutions: ["all"]
    tier: required
    description: "Azure Storage Accounts (diagnostics, cluster witness, bastion, firewall)"
  storage_name:
    type: string
    description: "Storage account name"
    required: false
    minLength: 3
    maxLength: 24
    pattern: "^[a-z0-9]+$"
    example: "stazlcAzureLocalCloudeus001"

  storage_tier:
    type: string
    description: "Storage account tier"
    required: false
    allowedValues:
    - Standard
    - Premium
    default: "Standard"

  storage_replication_type:
    type: string
    description: "Storage replication type"
    required: false
    allowedValues:
    - LRS
    - GRS
    - RAGRS
    - ZRS
    - GZRS
    - RAGZRS
    default: "LRS"

  storage_kind:
    type: string
    description: "Storage account kind"
    required: false
    allowedValues:
    - Storage
    - StorageV2
    - BlobStorage
    - FileStorage
    - BlockBlobStorage
    default: "StorageV2"

  storage_container_name:
    category: "storage"
    subcategory: "account"
    type: string
    description: "Storage container name"
    required: false
    pattern: "^[a-z0-9-]+$"
    example: "terraform-state"

  storage_enable_https_only:
    type: boolean
    description: "Enable HTTPS traffic only"
    required: false
    default: true

  storage_min_tls_version:
    type: string
    description: "Minimum TLS version for storage account access"
    required: false
    allowedValues:
    - TLS1_0
    - TLS1_1
    - TLS1_2
    default: "TLS1_2"
    note: "TLS1_2 is strongly recommended per Azure security best practices"

  # Monitoring Storage Account
  storage_monitoring_name:
    category: "storage"
    subcategory: "monitoring"
    type: string
    description: "Monitoring storage account name"
    required: false
    minLength: 3
    maxLength: 24
    pattern: "^[a-z0-9]+$"
    example: "stazlcAzureLocalCloudeusmon001"

  monitoring_storage_resource_group:
    type: string
    description: "Monitoring storage resource group"
    required: false
    pattern: "^rg-[a-z0-9-]+$"
    example: "rg-azlc-AzureLocalCloud-eus-management-monitoring"

  monitoring_storage_sku:
    type: string
    description: "Monitoring storage SKU (combines tier and replication)"
    required: false
    allowedValues:
    - Standard_LRS
    - Standard_GRS
    - Standard_RAGRS
    - Standard_ZRS
    - Premium_LRS
    default: "Standard_LRS"

  monitoring_storage_tier:
    type: string
    description: "Monitoring storage access tier"
    required: false
    allowedValues:
    - Hot
    - Cool
    default: "Hot"

  # NOTE: storage_min_tls_version already defined above (line ~9691) — removed duplicate

  # ─── CLUSTER WITNESS STORAGE ACCOUNT ──────────────────────────────────────────
  # Cloud Witness is an Azure Storage Account blob container.
  # Applies to: Azure Local, WSFC (S2D/SAN), Hyper-V — any Windows failover cluster.
  # Defined ONCE here. All cluster types reference storage_accounts.cluster_witness.*
  # Access key stored in Key Vault — see credentials.cluster.cloud_witness_storage_key
  # ────────────────────────────────────────────────────────────────────────────────
  cluster_witness:
    infrastructure_type: ["azure_local"]
    description: "Cloud witness storage account for cluster quorum — shared across all cluster types (Azure Local, WSFC, Hyper-V)"
    type: object
    required: false
    properties:
      name:
        type: string
        description: "Storage account name"
        required: true
        minLength: 3
        maxLength: 24
        pattern: "^[a-z0-9]+$"
        example: "stiicprodeus001wit"
      resource_group:
        type: string
        description: "Resource group containing the witness storage account"
        required: true
        pattern: "^rg-[a-z0-9-]+$"
        example: "rg-iic-prod-eus-management"
      subscription:
        type: string
        description: "Subscription key (references subscriptions section)"
        required: false
        example: "prod"
      purpose:
        type: string
        description: "Human-readable purpose label"
        required: false
        example: "Cloud witness for cluster quorum (Azure Local / WSFC)"
      sku:
        type: string
        description: "Storage SKU — Standard_ZRS recommended for quorum resilience"
        required: false
        allowedValues:
        - Standard_LRS
        - Standard_ZRS
        - Standard_GRS
        - Standard_RAGRS
        default: "Standard_ZRS"
      kind:
        type: string
        description: "Storage account kind"
        required: false
        allowedValues:
        - StorageV2
        - Storage
        default: "StorageV2"
      access_tier:
        type: string
        description: "Blob access tier"
        required: false
        allowedValues:
        - Hot
        - Cool
        default: "Hot"
      https_only:
        type: boolean
        description: "Require HTTPS traffic only"
        required: false
        default: true
      min_tls_version:
        type: string
        description: "Minimum TLS version"
        required: false
        allowedValues:
        - TLS1_2
        - TLS1_1
        - TLS1_0
        default: "TLS1_2"

  # Diagnostics Storage Account
  storage_diagnostics_name:
    type: string
    description: "Diagnostics storage account name for logs and metrics"
    required: false
    minLength: 3
    maxLength: 24
    pattern: "^[a-z0-9]+$"
    example: "stazlcAzureLocalCloudeusdiag"

  diagnostics_storage_resource_group:
    type: string
    description: "Resource group for diagnostics storage account"
    required: false
    pattern: "^rg-[a-z0-9-]+$"
    example: "rg-azlc-AzureLocalCloud-eus-management-monitoring"

  diagnostics_storage_sku:
    type: string
    description: "Diagnostics storage account SKU"
    required: false
    allowedValues:
    - Standard_LRS
    - Standard_GRS
    - Standard_RAGRS
    default: "Standard_LRS"

  # Network Flow Logs Storage Account
  storage_flowlogs_name:
    type: string
    description: "Storage account for Network Watcher and VNet flow logs"
    required: false
    minLength: 3
    maxLength: 24
    pattern: "^[a-z0-9]+$"
    example: "stazlcprodteceusflowlogs"

  flowlogs_storage_resource_group:
    type: string
    description: "Resource group for flow logs storage account"
    required: false
    pattern: "^rg-[a-z0-9-]+$"
    example: "rg-azlc-AzureLocalCloud-eus-connectivity-hub"

  flowlogs_storage_sku:
    type: string
    description: "Flow logs storage account SKU"
    required: false
    allowedValues:
    - Standard_LRS
    - Standard_GRS
    - Standard_RAGRS
    - Standard_ZRS
    default: "Standard_LRS"

  # Bastion Storage Account
  storage_bastion_name:
    type: string
    description: "Storage account for Bastion session recordings and diagnostics"
    required: false
    minLength: 3
    maxLength: 24
    pattern: "^[a-z0-9]+$"
    example: "stazlcAzureLocalCloudeusbastion"

  bastion_storage_resource_group:
    type: string
    description: "Resource group for Bastion storage account"
    required: false
    pattern: "^rg-[a-z0-9-]+$"
    example: "rg-azlc-AzureLocalCloud-eus-connectivity-hub"

  bastion_storage_sku:
    type: string
    description: "Bastion storage account SKU"
    required: false
    allowedValues:
    - Standard_LRS
    - Standard_GRS
    - Standard_RAGRS
    default: "Standard_LRS"

  # Firewall Storage Account
  fw_storage_account_name:
    type: string
    description: "Storage account for firewall diagnostic logs"
    required: false
    minLength: 3
    maxLength: 24
    pattern: "^[a-z0-9]+$"
    example: "stazlcprodteceusfw"

  fw_storage_resource_group:
    type: string
    description: "Resource group for firewall storage account"
    required: false
    pattern: "^rg-[a-z0-9-]+$"
    example: "rg-azlc-AzureLocalCloud-eus-connectivity-hub"

  fw_storage_sku:
    type: string
    description: "Firewall storage account SKU"
    required: false
    allowedValues:
    - Standard_LRS
    - Standard_GRS
    - Standard_RAGRS
    default: "Standard_LRS"

  # VM Boot Diagnostics Storage
  storage_vm_boot_diagnostics_uri:
    type: string
    description: "Storage account URI for VM boot diagnostics (leave empty for managed storage)"
    required: false
    example: "https://stazlcprodteceusdiag.blob.core.windows.net/"

# =============================================================================
# 11. CLUSTER SHARED VOLUMES
# =============================================================================
# Storage Spaces Direct (S2D) CSV volume definitions and Azure Local storage
# path registration. Applies only to Azure Local (infrastructure_type: azure_local).
# Storage path names are registered as Azure resources via:
#   az stack-hci-vm storagepath create
# YAML path: cluster_shared_volumes.*
# =============================================================================
cluster_shared_volumes:
  _meta:
    solutions: ["azure-local", "sofs-azure-local"]
    tier: required
    description: "S2D CSV volume definitions and Azure Local storage path registration"
  enabled:
    type: boolean
    description: "Enable Cluster Shared Volume creation and storage path registration"
    required: false
    default: true
    infrastructure_type: ["azure_local"]

  storage_pool_name:
    type: string
    description: "Friendly name of the S2D storage pool on the cluster. Used as -StoragePoolFriendlyName in New-Volume. If not set, the script derives it as 'S2D on <cluster_name>'."
    required: false
    pattern: "^[A-Za-z0-9 _-]+$"
    example: "SU1_Pool"
    note: "Find the actual pool name by running: Get-StoragePool -IsPrimordial $false | Select FriendlyName — on any cluster node. Azure Local deployment typically names it 'SU1_Pool'."
    infrastructure_type: ["azure_local"]

  volumes:
    type: array
    description: "Array of CSV (Cluster Shared Volume) definitions to create via New-Volume on the S2D cluster"
    required: false
    infrastructure_type: ["azure_local"]
    depends_on:
    - variable: "enabled"
      value: true
    items:
      type: object
      properties:
        volume_name:
          type: string
          description: "CSV volume friendly name (used as -FriendlyName in New-Volume and as the ClusterStorage folder name)"
          required: true
          pattern: "^[a-z0-9-]+$"
          note: "Lowercase, hyphens only — becomes C:\\ClusterStorage\\<volume_name>. Convention: csv-<prefix>-<cluster>-<resiliency>-<purpose>-<seq>"
          example: "csv-iic01-clus01-m2-vmstore-prd-01"
        size_gb:
          type: integer
          description: "Volume size in GB"
          required: true
          minimum: 100
          maximum: 65536
          example: 2000
        filesystem:
          type: string
          description: "Volume filesystem — ReFS strongly recommended for S2D resiliency and integrity"
          required: false
          allowedValues:
          - ReFS
          - NTFS
          default: "ReFS"
        resiliency:
          type: string
          description: "S2D resiliency setting name (passed as -ResiliencySettingName to New-Volume)"
          required: false
          allowedValues:
          - Mirror
          - Parity
          - MirrorAcceleratedParity
          default: "Mirror"
          note: "ThreeWay mirror is set via mirror_resiliency_type; Mirror here selects the resiliency class"
        path:
          type: string
          description: "Full UNC-style local path to the CSV mount point"
          required: false
          pattern: "^C:\\\\ClusterStorage\\\\[a-z0-9-]+$"
          example: "C:\\ClusterStorage\\csv-iic01-clus01-m2-vmstore-prd-01"
          note: "Auto-derived from volume_name if not set: C:\\ClusterStorage\\<volume_name>"
        purpose:
          type: string
          description: "Free-text purpose label for documentation and tagging"
          required: false
          example: "VM storage"
    example:
    - volume_name: "csv-iic01-clus01-m2-vmstore-prd-01"
      size_gb: 2000
      filesystem: "ReFS"
      resiliency: "Mirror"
      path: "C:\\ClusterStorage\\csv-iic01-clus01-m2-vmstore-prd-01"
      purpose: "VM storage"
    - volume_name: "csv-iic01-clus01-m2-vmstore-prd-02"
      size_gb: 2000
      filesystem: "ReFS"
      resiliency: "Mirror"
      path: "C:\\ClusterStorage\\csv-iic01-clus01-m2-vmstore-prd-02"
      purpose: "VM storage"

  storage_paths:
    type: object
    description: "Keyed map of Azure Local storage path registrations. Each key is a logical name (e.g. vmstore_1). Registered via az stack-hci-vm storagepath create under the cluster's custom location."
    required: false
    infrastructure_type: ["azure_local"]
    depends_on:
    - variable: "enabled"
      value: true
    additionalProperties:
      type: object
      description: "A single storage path registration entry"
      properties:
        name:
          type: string
          description: "Azure resource name for the storage path"
          required: true
          pattern: "^sp-[a-z0-9-]+$"
          note: "Convention: sp-<prefix>-<cluster>-<resiliency>-<purpose>-<seq>"
          example: "sp-iic01-clus01-m2-vmstore-prd-01"
        path:
          type: string
          description: "Local path on the cluster node where VMs are placed (subdirectory inside the CSV mount point)"
          required: true
          pattern: "^C:\\\\ClusterStorage\\\\[a-z0-9-]+\\\\[A-Za-z0-9]+$"
          example: "C:\\ClusterStorage\\csv-iic01-clus01-m2-vmstore-prd-01\\VMs"
    example:
      vmstore_1:
        name: "sp-iic01-clus01-m2-vmstore-prd-01"
        path: "C:\\ClusterStorage\\csv-iic01-clus01-m2-vmstore-prd-01\\VMs"
      vmstore_2:
        name: "sp-iic01-clus01-m2-vmstore-prd-02"
        path: "C:\\ClusterStorage\\csv-iic01-clus01-m2-vmstore-prd-02\\VMs"

  cache:
    type: object
    description: "CSV in-memory read cache settings"
    required: false
    infrastructure_type: ["azure_local"]
    properties:
      enabled:
        type: boolean
        description: "Enable CSV in-memory read cache"
        required: false
        default: false
        note: "Beneficial for read-heavy workloads (e.g. VDI). Consumes host RAM."
      size_mb:
        type: integer
        description: "Per-node CSV cache allocation in MB"
        required: false
        minimum: 512
        maximum: 32768
        default: 1024
        depends_on:
        - variable: "cache.enabled"
          value: true
      block_cache:
        type: boolean
        description: "Enable ReFS block cache for CSV volumes (Windows Server 2016+) — reduces repeat disk reads"
        required: false
        default: true
        depends_on:
        - variable: "cache.enabled"
          value: true
    example:
      enabled: true
      size_mb: 8192
      block_cache: true

  network:
    type: object
    description: "CSV network placement preferences"
    required: false
    infrastructure_type: ["azure_local"]
    properties:
      preferred_network:
        type: string
        description: "Cluster network name preferred for CSV traffic — should match the storage network intent name"
        required: false
        example: "Storage"
      csv_network_isolation:
        type: boolean
        description: "Isolate CSV redirect-mode traffic to the preferred network only"
        required: false
        default: true
    example:
      preferred_network: "Storage"
      csv_network_isolation: true

# =============================================================================
# 12. MARKETPLACE IMAGES
# =============================================================================
marketplace_images:
  _meta:
    solutions: ["azure-local", "avd-azure-local"]
    tier: required
    description: "Azure Marketplace VM images registered to Azure Local cluster"
  # Azure Marketplace VM images registered to the Azure Local cluster.
  # Images are downloaded from Azure Marketplace and stored on the cluster's
  # CSV storage as gallery images, making them available for Arc VM deployment.
  #
  # Custom image workflows (sysprep, upload, convert) are documented separately.
  # This section covers standard Marketplace image downloads only.
  #
  # infrastructure_type: ["azure_local"]

  enabled:
    type: boolean
    required: true
    default: true
    description: "When false, image download tasks are skipped entirely."
    infrastructure_type: ["azure_local"]
    example: true

  images:
    type: list
    required: false
    description: |
      List of Azure Marketplace VM images to register on the cluster.
      Each entry maps to one az stack-hci-vm image create call.
    infrastructure_type: ["azure_local"]
    items:
      name:
        type: string
        required: true
        pattern: "^img-[a-z0-9-]+$"
        description: |
          Azure resource name for the gallery image.
          Convention: img-<site-prefix>-<os-short>-<seq> (e.g. img-iic01-ws2025-azedition-g2)
        infrastructure_type: ["azure_local"]
        example: "img-iic01-ws2025-azedition-g2"

      display_name:
        type: string
        required: false
        description: "Human-readable image label used in portal and documentation."
        infrastructure_type: ["azure_local"]
        example: "Windows Server 2025 Datacenter Azure Edition Gen 2"

      publisher:
        type: string
        required: true
        description: |
          Azure Marketplace publisher identifier.
          Must be lowercase — the HCI Edge Marketplace catalog requires lowercase values.
          See: https://learn.microsoft.com/en-us/azure/azure-local/manage/virtual-machine-image-azure-marketplace
        infrastructure_type: ["azure_local"]
        example: "microsoftwindowsserver"

      offer:
        type: string
        required: true
        description: |
          Azure Marketplace offer identifier.
          Must be lowercase — the HCI Edge Marketplace catalog requires lowercase values.
        infrastructure_type: ["azure_local"]
        example: "windowsserver"

      sku:
        type: string
        required: true
        description: "Azure Marketplace SKU / image definition identifier."
        infrastructure_type: ["azure_local"]
        example: "2025-datacenter-azure-edition"

      version:
        type: string
        required: false
        default: "latest"
        description: |
          Image version to download. Use 'latest' to always pull the most recent
          publisher release. Pin to a specific version (e.g. 25393.1.250206) for
          reproducible deployments.
        infrastructure_type: ["azure_local"]
        example: "latest"

      os_type:
        type: string
        required: true
        enum: ["Windows", "Linux"]
        description: "Guest OS family for the image."
        infrastructure_type: ["azure_local"]
        example: "Windows"

      storage_path:
        type: string
        required: false
        description: "Local storage path for the downloaded image on the cluster."
        infrastructure_type: ["azure_local"]
        example: "C:\\ClusterStorage\\vmstore\\marketplace-images"

    example:
      - name: "img-iic01-ws2025-azedition-v1"
        display_name: "Windows Server 2025 Datacenter Azure Edition"
        publisher: "microsoftwindowsserver"
        offer: "windowsserver"
        sku: "2025-datacenter-azure-edition"
        version: "latest"
        os_type: "Windows"
      - name: "img-iic01-ws2022-azedition-hotpatch-v1"
        display_name: "Windows Server 2022 Datacenter Azure Edition Hotpatch"
        publisher: "microsoftwindowsserver"
        offer: "windowsserver"
        sku: "2022-datacenter-azure-edition-hotpatch"
        version: "latest"
        os_type: "Windows"
      - name: "img-iic01-win11-25h2-avd-m365-v1"
        display_name: "Windows 11 Enterprise Multi-Session 25H2 + Microsoft 365 Apps"
        publisher: "microsoftwindowsdesktop"
        offer: "office-365"
        sku: "win11-25h2-avd-m365"
        version: "latest"
        os_type: "Windows"

# =============================================================================
# 13. SECURITY
# =============================================================================
security:
  # ─── credentials (nested form used in example) ───
  credentials:
    type: object
    description: "Deployment credentials (nested alias for identity.accounts equivalents)"
    domain_join_username:
      type: string
      description: "Domain join username"
      sensitive: false
    domain_join_password:
      type: string
      description: "Domain join password (Key Vault reference)"
      sensitive: true
    local_admin_password:
      type: string
      description: "Local admin password (Key Vault reference)"
      sensitive: true
    password:
      type: string
      description: "Generic password reference"
      sensitive: true

  # ─── infrastructure_credentials ───
  infrastructure_credentials:
    type: object
    description: "Infrastructure device credentials"
    idrac:
      type: object
      description: "iDRAC credentials"
      username:
        type: string
        description: "iDRAC username"
      password_secret:
        type: string
        description: "iDRAC password Key Vault secret reference"
        sensitive: true

  # ─── key_vaults (nested form used in example) ───
  key_vaults:
    type: object
    description: "Key Vault configurations (nested alias form)"
    management:
      type: object
      description: "Management Key Vault"
      name:
        type: string
        description: "Key Vault name"
      resource_group:
        type: string
        description: "Key Vault resource group"
      subscription:
        type: string
        description: "Key Vault subscription ID"
      secrets:
        type: object
        description: "Key Vault secret references"
        azlocal_admin_password:
          type: string
          description: "Azure Local admin password secret"
          sensitive: true
        recovery_admin_password:
          type: string
          description: "Recovery admin password secret"
          sensitive: true
        vpn_shared_key:
          type: string
          description: "VPN shared key secret"
          sensitive: true
    platform:
      type: object
      description: "Platform Key Vault"
      name:
        type: string
        description: "Key Vault name"
      resource_group:
        type: string
        description: "Key Vault resource group"
      admin_object_id:
        type: string
        description: "Admin object ID for Key Vault access policies"
        format: uuid
    secrets:
      type: object
      description: "Secrets Key Vault"
      name:
        type: string
        description: "Key Vault name"

  # ─── keyvault ───
  keyvault:
    _meta:
      solutions: ["all"]
      tier: required
      description: "Key Vault configurations (CMP platform, customer platform, secrets)"
    # =============================================================================
    # CMP PLATFORM KEY VAULT (Management Tenant - Cross-Tenant Secrets)
    # =============================================================================
  
    cmp_platform:
      kv_cmp_platform_name:
        category: "security"
        subcategory: "keyvault"
        type: string
        description: "CMP platform Key Vault name (management tenant - cross-tenant secrets)"
        required: true
        minLength: 3
        maxLength: 24
        pattern: "^[a-z][a-z0-9]+(-[a-z0-9]+)*$"
        note: "No consecutive hyphens allowed"
        example: "kv-azlc-mgmt"

      kv_cmp_platform_resource_group:
        category: "security"
        subcategory: "keyvault"
        type: string
        description: "CMP platform Key Vault resource group (function-based naming)"
        required: true
        pattern: "^rg-[a-z0-9]+-(AzureLocalCloud|demo|poc|lab)-[a-z0-9]+-(identity|management)-[a-z0-9]+$"
        example: "rg-azlc-AzureLocalCloud-eus-identity-mgmt"

      kv_cmp_platform_location:
        category: "security"
        subcategory: "keyvault"
        type: string
        description: "CMP platform Key Vault Azure region"
        required: true
        allowedValues:
          - eastus
          - eastus2
          - westus
          - westus2
          - centralus
        example: "eastus"

      kv_cmp_platform_subscription_id:
        type: string
        description: "Management tenant subscription ID for CMP platform Key Vault"
        required: true
        format: uuid
        example: "00000000-1111-2222-3333-444444444444"

      kv_cmp_platform_tenant_id:
        type: string
        description: "Management tenant ID (azurelocalcloud)"
        required: true
        format: uuid
        example: "00000000-aaaa-bbbb-cccc-111111111111"

      kv_cmp_platform_sku:
        type: string
        description: "CMP platform Key Vault SKU"
        required: false
        allowedValues:
          - standard
          - premium
        default: "standard"

      kv_cmp_platform_enable_rbac:
        type: boolean
        description: "Enable RBAC authorization"
        required: false
        default: true

      kv_cmp_platform_enable_soft_delete:
        type: boolean
        description: "Enable soft delete"
        required: false
        default: true

      kv_cmp_platform_soft_delete_retention_days:
        type: integer
        description: "Soft delete retention days"
        required: false
        minimum: 7
