    # ─── sdn ───
    # SDN enabled by Arc: Network Controller runs as a Failover Cluster service.
    # Enables NSG management on logical networks and Azure Local VM NICs via
    # Azure portal, Azure CLI, and ARM templates. IRREVERSIBLE once enabled.
    # Requires Azure Local OS build 26100.x or later.
    # Reference: https://learn.microsoft.com/en-us/azure/azure-local/deploy/enable-sdn-integration
    sdn:
      sdn_enabled:
        description: "Whether SDN is enabled for this Azure Local cluster. IRREVERSIBLE — once true and applied, SDN cannot be disabled."
        type: boolean
        required: false
        default: false
        example: false

      sdn_prefix:
        description: "SDN prefix used to construct the Network Controller REST URL: https://<sdn_prefix>-NC.<domain>/. Must be 8 or fewer characters; alphanumeric and hyphens only; no consecutive hyphens; must not end with a hyphen. Must be unique per domain."
        type: string
        required: false
        pattern: "^[a-zA-Z0-9]([a-zA-Z0-9-]{0,6}[a-zA-Z0-9])?$"
        maxLength: 8
        example: "iic01"

      sdn_dns_mode:
        description: "DNS environment mode for Network Controller REST URL registration. 'dynamic' = Active Directory–integrated DNS auto-creates the A record. 'static' = manually pre-create the A record for <sdn_prefix>-NC before enabling SDN."
        type: string
        required: false
        enum: ["dynamic", "static"]
        default: "dynamic"
        example: "dynamic"

      sdn_nc_reserved_ip:
        description: "Reserved IP address for the Network Controller DNS A record. Must be the 5th IP in the management IP address range configured at cluster deployment. Required when sdn_dns_mode is 'static'."
        type: string
        required: false
        format: ipv4
        example: "192.168.211.14"

      sdn_intent_pattern:
        description: "Host networking intent pattern on this cluster. 1 = group all traffic on a single intent (switched storage required); 2 = management+compute in one intent with separate storage intent; 3 = fully disaggregated (management, compute, storage as separate intents). Three-intent pattern not supported on 2-node or 3-node switchless deployments."
        type: integer
        required: false
        enum: [1, 2, 3]
        example: 2

      sdn_network_controller:
        description: "Network Controller FQDN or REST endpoint — used post-deployment to reference the NC REST API. Derived value: <sdn_prefix>-NC.<domain>. Informational only; not a deployment input."
        type: string
        required: false
        example: "iic01-NC.contoso.cloud"

      sdn_gateway:
        description: "SDN RAS Gateway configuration — applicable only for SDN managed by on-premises tools (Windows Admin Center, SDN Express). Not supported with SDN enabled by Arc."
        type: string
        required: false

      sdn_load_balancer:
        description: "SDN Software Load Balancer configuration — applicable only for SDN managed by on-premises tools (Windows Admin Center, SDN Express). Not supported with SDN enabled by Arc."
        type: string
        required: false

      # ─── SDN aliases (nested form used in example) ───
      gateway:
        type: string
        description: "SDN gateway shorthand (alias for sdn_gateway)"
        alias_for: sdn_gateway

      load_balancer:
        type: string
        description: "SDN load balancer shorthand (alias for sdn_load_balancer)"
        alias_for: sdn_load_balancer

      network_controller:
        type: string
        description: "SDN network controller shorthand (alias for sdn_network_controller)"
        alias_for: sdn_network_controller

      nsgs:
        type: object
        description: "SDN Network Security Groups configuration"
        name:
          type: string
          description: "NSG name"
        description:
          type: string
          description: "NSG description"
        rules:
          type: array
          description: "NSG rules"
          items:
            type: object
            properties:
              name:
                type: string
                description: "Rule name"
              priority:
                type: integer
                description: "Rule priority"
              direction:
                type: string
                description: "Rule direction (Inbound/Outbound)"
              access:
                type: string
                description: "Rule access (Allow/Deny)"
              protocol:
                type: string
                description: "Rule protocol"
              source_address_prefix:
                type: string
                description: "Source address prefix"
              destination_port_range:
                type: string
                description: "Destination port range"

  # ─── Top-level networking aliases (nested form) ───
  dhcp:
    type: object
    description: "DHCP configuration shorthand (alias for onprem.dhcp)"
    server:
      type: string
      description: "DHCP server IP"

  network_intents:
    type: object
    description: "Network intents shorthand (alias for onprem.network_intents)"

  # ═══════════════════════════════════════
  # ON-PREMISES NETWORKING
  # ═══════════════════════════════════════
  onprem:
    # ─── vlans ───
    vlans:
      infrastructure_type: ["azure_local"]
      _meta:
        solutions: ["azure-local", "sofs-azure-local"]
        tier: required
        description: "VLAN assignments for on-premises networking"
      # ---------------------------------------------------------------------------
      vlan_management_compute_id:
        type: integer
        description: "Management-Compute VLAN ID (Azure Local nodes, management VMs)"
        required: true
        minimum: 1
        maximum: 4094
        example: 211

      vlan_management_compute_name:
        type: string
        description: "Management-Compute VLAN name"
        required: true
        example: "management-compute"

      vlan_management_compute_cidr:
        type: string
        description: "Management-Compute VLAN CIDR"
        required: true
        format: cidr
        example: "192.168.211.0/24"

      vlan_management_compute_gateway:
        type: string
        description: "Management-Compute VLAN gateway"
        required: true
        format: ipv4
        example: "192.168.211.1"

      vlan_management_compute_dns_primary:
        type: string
        description: "Management-Compute VLAN primary DNS"
        required: false
        format: ipv4
        example: "10.100.1.36"

      vlan_management_compute_dns_secondary:
        type: string
        description: "Management-Compute VLAN secondary DNS"
        required: false
        format: ipv4
        example: "10.100.1.37"

      # OUT-OF-BAND NETWORK (iDRACs, Switches, Firewalls, OpenGear)
      # ---------------------------------------------------------------------------
      vlan_oob_id:
        type: integer
        description: "Out-of-band VLAN ID (iDRACs, switches, firewalls, OpenGear)"
        required: true
        minimum: 1
        maximum: 4094
        example: 210

      vlan_oob_name:
        type: string
        description: "Out-of-band VLAN name"
        required: true
        example: "oob"

      vlan_oob_cidr:
        type: string
        description: "Out-of-band VLAN CIDR"
        required: true
        format: cidr
        example: "192.168.210.0/24"

      vlan_oob_gateway:
        type: string
        description: "Out-of-band VLAN gateway"
        required: true
        format: ipv4
        example: "192.168.210.1"

      # STORAGE VLANS (1-4, Non-Routable, East/West Traffic Only)
      # ---------------------------------------------------------------------------
      vlan_storage_networks:
        type: array
        description: "Storage VLANs for Azure Local cluster (non-routable, east/west traffic only)"
        required: false
        minItems: 1
        maxItems: 4
        items:
          type: object
          properties:
            vlan_id:
              type: integer
              minimum: 1
              maximum: 4094
            name:
              type: string
            cidr:
              type: string
              format: cidr
            routable:
              type: boolean
              default: false
        example:
        - vlan_id: 712
          name: "storage-1"
          cidr: "10.71.212.0/24"
          routable: false
        - vlan_id: 713
          name: "storage-2"
          cidr: "10.71.213.0/24"
          routable: false

      vlan_storage_1_id:
        type: integer
        description: "Storage VLAN 1 ID (non-routable)"
        required: false
        minimum: 1
        maximum: 4094
        example: 712

      vlan_storage_1_name:
        type: string
        description: "Storage VLAN 1 name"
        required: false
        example: "storage-1"

      vlan_storage_1_cidr:
        type: string
        description: "Storage VLAN 1 CIDR (non-routable, east/west only)"
        required: false
        format: cidr
        example: "10.71.212.0/24"

      vlan_storage_2_id:
        type: integer
        description: "Storage VLAN 2 ID (non-routable)"
        required: false
        minimum: 1
        maximum: 4094
        example: 713

      vlan_storage_2_name:
        type: string
        description: "Storage VLAN 2 name"
        required: false
        example: "storage-2"

      vlan_storage_2_cidr:
        type: string
        description: "Storage VLAN 2 CIDR (non-routable, east/west only)"
        required: false
        format: cidr
        example: "10.71.213.0/24"

      vlan_storage_3_id:
        type: integer
        description: "Storage VLAN 3 ID (non-routable)"
        required: false
        minimum: 1
        maximum: 4094
        example: 714

      vlan_storage_3_name:
        type: string
        description: "Storage VLAN 3 name"
        required: false
        example: "storage-3"

      vlan_storage_3_cidr:
        type: string
        description: "Storage VLAN 3 CIDR (non-routable, east/west only)"
        required: false
        format: cidr
        example: "10.71.214.0/24"

      vlan_storage_4_id:
        type: integer
        description: "Storage VLAN 4 ID (non-routable)"
        required: false
        minimum: 1
        maximum: 4094
        example: 715

      vlan_storage_4_name:
        type: string
        description: "Storage VLAN 4 name"
        required: false
        example: "storage-4"

      vlan_storage_4_cidr:
        type: string
        description: "Storage VLAN 4 CIDR (non-routable, east/west only)"
        required: false
        format: cidr
        example: "10.71.215.0/24"

      # WORKLOAD NETWORKS (Customer Workloads, Up to 6 Networks)
      # ---------------------------------------------------------------------------
      vlan_workload_networks:
        type: array
        description: "Workload VLANs for customer workloads (up to 6 networks)"
        required: false
        minItems: 0
        maxItems: 6
        items:
          type: object
          properties:
            vlan_id:
              type: integer
              minimum: 1
              maximum: 4094
            name:
              type: string
            cidr:
              type: string
              format: cidr
            gateway:
              type: string
              format: ipv4
            dns_servers:
              type: array
              items:
                type: string
                format: ipv4
            dhcp_enabled:
              type: boolean
            routable:
              type: boolean
              default: true
        example:
        - vlan_id: 501
          name: "workload-web"
          cidr: "192.168.100.0/24"
          gateway: "192.168.100.1"
          dns_servers: ["10.100.1.36", "10.100.1.37"]
          dhcp_enabled: true
          routable: true
        - vlan_id: 502
          name: "workload-app"
          cidr: "192.168.51.0/24"
          gateway: "192.168.51.1"
          dns_servers: ["10.100.1.36", "10.100.1.37"]
          dhcp_enabled: true
          routable: true

      vlan_workload_1_id:
        type: integer
        description: "Workload VLAN 1 ID"
        required: false
        minimum: 1
        maximum: 4094
        example: 501

      vlan_workload_1_name:
        type: string
        description: "Workload VLAN 1 name"
        required: false
        example: "workload-web"

      vlan_workload_1_cidr:
        type: string
        description: "Workload VLAN 1 CIDR"
        required: false
        format: cidr
        example: "192.168.100.0/24"

      vlan_workload_1_gateway:
        type: string
        description: "Workload VLAN 1 gateway"
        required: false
        format: ipv4
        example: "192.168.100.1"

      vlan_workload_2_id:
        type: integer
        description: "Workload VLAN 2 ID"
        required: false
        minimum: 1
        maximum: 4094
        example: 502

      vlan_workload_2_name:
        type: string
        description: "Workload VLAN 2 name"
        required: false
        example: "workload-app"

      vlan_workload_2_cidr:
        type: string
        description: "Workload VLAN 2 CIDR"
        required: false
        format: cidr
        example: "192.168.51.0/24"

      vlan_workload_2_gateway:
        type: string
        description: "Workload VLAN 2 gateway"
        required: false
        format: ipv4
        example: "192.168.51.1"

      vlan_workload_3_id:
        type: integer
        description: "Workload VLAN 3 ID"
        required: false
        minimum: 1
        maximum: 4094
        example: 503

      vlan_workload_3_name:
        type: string
        description: "Workload VLAN 3 name"
        required: false
        example: "workload-data"

      vlan_workload_3_cidr:
        type: string
        description: "Workload VLAN 3 CIDR"
        required: false
        format: cidr
        example: "192.168.52.0/24"

      vlan_workload_3_gateway:
        type: string
        description: "Workload VLAN 3 gateway"
        required: false
        format: ipv4
        example: "192.168.52.1"

      vlan_workload_4_id:
        type: integer
        description: "Workload VLAN 4 ID"
        required: false
        minimum: 1
        maximum: 4094
        example: 504

      vlan_workload_4_name:
        type: string
        description: "Workload VLAN 4 name"
        required: false
        example: "workload-dmz"

      vlan_workload_4_cidr:
        type: string
        description: "Workload VLAN 4 CIDR"
        required: false
        format: cidr
        example: "192.168.53.0/24"

      vlan_workload_4_gateway:
        type: string
        description: "Workload VLAN 4 gateway"
        required: false
        format: ipv4
        example: "192.168.53.1"

      vlan_workload_5_id:
        type: integer
        description: "Workload VLAN 5 ID"
        required: false
        minimum: 1
        maximum: 4094
        example: 505

      vlan_workload_5_name:
        type: string
        description: "Workload VLAN 5 name"
